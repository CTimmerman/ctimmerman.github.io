<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Gundam Card Game implementation by Cees Timmerman, 2026-05-11-30</title>
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%228 14 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>" />
	<style>
		a,
		button,
		html,
		input,
		select {
			--fgcolor: white;
			--bgcolor: black;
			--WHITE: #ffffff;
			--BLUE: #0077bb;
			--PURPLE: #884499;
			--RED: #bb0055;
			--GREEN: #669944;
			--BROWN: #664400;

			background-color: var(--bgcolor);
			color: var(--fgcolor);
			scrollbar-color: auto;
			font-family: monospace;
		}

		button:disabled {
			opacity: 75%;
		}

		input[type=number] {
			width: 4vmin;
		}

		input[type=range] {
			vertical-align: middle;
			width: 22vmin;
		}

		input[type=number]::-webkit-inner-spin-button,
		input[type=number]::-webkit-outer-spin-button {
			-webkit-appearance: visible;
			/* transform: rotate(90deg); */
			/* height: 40px; */
			/* opacity: 50%; */
			filter: invert(100%);
		}

		a:visited {
			color: grey;
		}

		body {
			margin: 0;
		}

		#battlefield {
			background-image: url(GundamPlayMat.png);
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			width: 100vmin;
			height: 100vmin;
		}

		#dlog {
			position: absolute;
			margin: 0 0 0 85vmin;
			width: stretch;
			height: 100vmin;
			overflow-y: scroll;
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			background-color: #08080888;
			border: 1px solid var(--fgcolor);
		}

		#overlay {
			display: none;
			position: absolute;
			font-size: xx-large;
			z-index: 9000;
			width: 100%;
			height: 100%;
		}

		#settings {
			z-index: 9001;
			position: absolute;
			left: 0.5vmin;
			top: 47vmin;
			width: 4vmin;
			height: 4vmin;
			text-align: center;
			overflow: hidden;
			transition: 0.3s;
		}

		#wheel {
			transition: 0.4s;
		}

		.open #wheel {
			transform: rotate(360deg);
		}

		.open {
			width: 30vmin !important;
			height: 20vmin !important;
			background-color: #08080888;
			border: 1px solid grey;
		}

		.card {
			background-size: contain;
			background-repeat: no-repeat;
			border: 1px solid var(--BROWN);
			border-radius: 0.6vmin;
			color: yellow;
			cursor: pointer;
			position: absolute;
			width: 10vmin;
			height: 13.96vmin;
			font-size: small;
			text-align: center;
			text-shadow: 1px 1px #08080888;
			transition: 0.3s;
		}

		.facedown {
			background-image: url(sleeve.webp) !important;
			background-color: white !important;
			border-color: black !important;
		}

		.facedown.resource {
			background-image: url(ResourceCardBack.webp) !important;
			background-color: white !important;
		}

		.rested {
			transform: rotate(90deg);
			margin-top: -1.4vmin;
		}

		.rested.resource {
			transform: rotate(70deg);
			margin: auto;
		}
	</style>
</head>

<body>
	<div id="overlay"></div>
	<div id="battlefield"></div>
	<div id="dlog">
		<a href="https://www.gundam-gcg.com/en/rules/">Gundam Card Game</a><br>
	</div>
	<audio id="pewpew" src="pewpew.opus"></audio>
	<audio id="boom" src="boom.opus"></audio>
	<div id="settings">
		<div id="wheel" title="Settings" onclick="toggleSettings()" style="cursor: pointer; font-size: 3vmin">⚙️</div>
		<br>
		<div>
			<label for="volume">Volume</label>
			<input id="volume" type="range" value="0.2" min="0" max="1" step="0.1"
				onchange="pewpew.volume = this.value; boom.volume = this.value" /><br>
		</div>
		<div>
			<button id="bstop"
				onclick="setGameOver(true); log(`⛔Stopping game ${game}/${games} by user input`)">Stop</button>
			<button id="bstart" disabled="true"
				onclick="if (game_over) {setGameOver(false); setTimeout(playGames, 0) } else alert('Game in progress')">Start</button>
			<label for="ngames">Games</label> <input id="ngames" type="number" value="1" min="1" max="999"
				onchange="games = this.value" oninput="clamp(this)" />
			<label for="ndelay">Speed</label> <input id="ndelay" type="number" value="50" min="0" max="100"
				onchange="setSpeed()" oninput="clamp(this)" />%
		</div><br>
		<div>
			<label for="p1deck">P1 deck</label>
			<select id="p1deck" value="-1"></select>
			<br>
			<label for="p2deck">P2 deck</label>
			<select id="p2deck" value="0"></select>
		</div><br>
		<div><button onclick="console.clear(); dlog.innerHTML=''">Clear logs</button></div>
	</div>
	<script>
		"use strict"

		function clamp(e) {
			let v = parseInt(e.value)
			e.value = parseInt(v > e.max ? e.max : e.value < e.min ? e.min : e.value)
		}

		volume.onchange()

		let active_player = null
		let defender = null

		let cards = {}
		// Why doesn't upstream list EXR promos like other promos?
		// "EXR-001_PR", "EXR-001_PR2", "EXR-001_PR3", "EXR-001_PR4", "EXR-001_PR5"
		const EX_RESOURCES = ["EXR-001", "EXRP-001", "EXRP-002"]

		function hasText(body, s) {
			return body.indexOf(s) > -1
		}

		function mySort(arr, fun) {
			return arr.toSorted((a, b) => fun(a) - fun(b))
		}

		function escapeHTML(unsafe) {
			return unsafe
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;")
		}
		function unescapeHTML(unsafe) {
			return unsafe
				.replaceAll("&amp;", "&")
				.replaceAll("&lt;", "<")
				.replaceAll("&gt;", ">")
				.replaceAll("&quot;", '"')
				.replaceAll("&#039;", "'")
		}

		function bounce(card) {
			log("🔙Bounced " + card)
			card.rested = false
			if (card.pilot) {
				card.pilot.rested = false
				card.pilot.unit = null
				card.owner.hand.push(card.pilot)
				card.pilot = null
			}
			card.owner.hand.push(card)
			card.owner.battle = card.owner.battle.filter(bc => bc != card && bc != card.pilot)
		}

		async function destroy(card) {
			if (!card) return false
			log("💥Destroy " + card)
			if (card.pilot) {
				card.pilot.unit = null
				card.owner.trash.push(card.pilot)
				card.pilot = null
			}
			if (card.type.indexOf("TOKEN") < 0 && card.type.indexOf("EX") != 0) card.owner.trash.push(card)
			if (hasText(card.type, "BASE")) {
				card.owner.base = null
			} else {
				card.owner.battle = card.owner.battle.filter(bc => bc != card)  // ??? && bc != card.pilot)
			}
			await run(card, "Destroyed")
			await render()
			boom.play().catch(ex => { })
			await sleep(900)
			return true
		}

		let delay = 1
		let maxDelay = 2
		function setSpeed() {
			delay = maxDelay - maxDelay * parseFloat(ndelay.value) / parseFloat(ndelay.max)
		}
		setSpeed()
		async function sleep(ms = 1000) {
			do {
				if (delay > 0) await new Promise(r => setTimeout(r, delay * ms))
			} while (delay == maxDelay)
		}

		function getel(card) {
			return document.getElementById("c" + card.cid)
		}

		function activate(card) {
			if (card.stunned) {
				card.stunned = false
				return
			}
			card.rested = false
			try {
				getel(card).classList.remove("rested")
			} catch (ex) {
				// Not rendered yet.
			}
			if (card.pilot) {
				card.pilot.rested = false
				getel(card.pilot).classList.remove("rested")
			}
		}

		function rest(card) {
			// log("💤Rest " + card)
			card.rested = true
			if (card.pilot) card.pilot.rested = true
			if (delay > 0) {
				try {
					getel(card).classList.add("rested")
					if (card.pilot) getel(card.pilot).classList.add("rested")
				} catch (ex) {
					// Not rendered yet.
				}
			}
		}

		async function battle(att, def) {
			if (delay == 0) return
			/* Too much hassle to move the pilots at well
			const e = getel(att)
			const old_top = e.style.top
			const old_left = e.style.left
			const e2 = getel(def)
			e.style.top = e2.style.top
			e.style.left = e2.style.left
			await sleep(800)
			e.style.top = old_top
			e.style.left = old_left
			*/
			const sa = getel(att).style
			const sd = getel(def).style
			let x1 = parseFloat(sa.left) + 5
			let y1 = parseFloat(sa.top) + 5
			let x2 = parseFloat(sd.left) + 5
			let y2 = parseFloat(sd.top) + 5
			// Laser time!
			overlay.style.display = "block"
			overlay.innerHTML = `<svg id="boardbg" style="height:100vmin;width:100vmin">
				<line x1="${x1}vmin" y1="${y1}vmin" x2="${x2}vmin" y2="${y2}vmin" stroke="white" stroke-width="4px" stroke-linecap="round">
					<animate attributeName="stroke" values="#880;#fff;#880;" dur="0.2s" repeatCount="indefinite"/>
					<animate attributeName="stroke-width" values="2px;8px;2px;" dur="0.2s" repeatCount="indefinite"/>
				</line>
			</svg>`
			pewpew.play().catch(ex => { })
			// vfx
			await sleep(400)
			overlay.style.display = "none"
			// sfx
			await sleep(200)
		}

		function showDeck(player) {
			window.pause = (window.pause || 0) + 1
			let html = `<div onclick="overlay.style.display = 'none'; window.pause = 0" style="width:100%; height:100%; background-color: #08080888">`
			overlay.style.display = "block"
			let deck = player.fulldeck.toSorted(
				(a, b) => {
					if (a.type > b.type) return 1
					if (a.type < b.type) return -1
					if (a.level > b.level) return 1
					if (a.level < b.level) return -1
					if (a.cost > b.cost) return 1
					if (a.cost < b.cost) return -1
					if (a.name > b.name) return 1
					if (a.name < b.name) return -1
					return 0
				}
			)
			let type = deck[0].type
			let left = 20
			let top = 10
			for (const c of deck) {
				if (c.type != type) {
					type = c.type
					left += 12
					top = 10
				}
				html += c.toHTML(left, top)
				top += 4
				if (top > 54) {
					left += 12
					top = 10
				}
			}
			overlay.innerHTML = html + "</div>"
		}

		function zoom(e) {
			event.preventDefault()
			event.stopPropagation()
			if (hasText(e.style.transform, "scale")) {
				e.style.transform = e.old_transform
				e.style.zIndex = e.old_zIndex
				e.style.top = e.old_top
				e.style.left = e.old_left
				if (window.pause && window.pause > 0) window.pause -= 1
			} else {
				e.old_transform = e.style.transform
				e.old_zIndex = e.style.zIndex
				e.old_top = e.style.top
				e.old_left = e.style.left

				e.style.transform = "scale(5)"
				e.style.zIndex = 9000
				e.style.top = "40vmin"
				e.style.left = "40vmin"
				window.pause = (window.pause || 0) + 1
			}
		}

		function log(s = "") {
			dlog.innerHTML += s + "<br>"
			dlog.scrollTop = dlog.scrollHeight
			// lags a lot in Edge
			// console.log(s)
		}

		function rnd(min, max) {
			return Math.floor(min + Math.random() * (1 + max - min))
		}

		function rndPick(arr) {
			return arr[Math.floor(Math.random() * arr.length)]
		}
		// var Type;
		// (function (Type) {
		// 	Type[Type["RESOURCE"] = 0] = "RESOURCE";
		//     Type[Type["BASE"] = 1] = "BASE";
		//     Type[Type["COMMAND"] = 2] = "COMMAND";
		//     Type[Type["PILOT"] = 3] = "PILOT";
		// 	Type[Type["UNIT"] = 4] = "UNIT";
		// 	Type[Type["UNITTOKEN"] = 5] = "UNITTOKEN";	
		// })(Type || (Type = {}));

		function getPilotName(card) {
			if (card.type == "PILOT") return card.name
			return getSectionText(card, "Pilot").slice(1, -1)
		}

		async function pair(unit, pilot) {
			log(`🧑‍✈️Pair ${pilot.AP()}/${pilot.HP()} ${getPilotName(pilot)} with ${unit}`)
			unit.pilot = pilot
			pilot.unit = unit
			await render()
			await run(unit, "When Paired")
			if (unit.link && linksWith(unit, pilot)) {
				log("🔗Link")
				unit.sick = false
				await run(unit, "When Linked")
			}
		}

		function linksWith(unit, pilot) {
			// TODO "Elan Ceres (Enhanced Person Number 5)" match as "Elan Ceres"
			if (!pilot) return false
			let pilot_name = getPilotName(pilot)
			for (let part of unit.link.split("/")) {
				if (part == `[${pilot_name}]`) return true
				if (part.indexOf(" Trait") > -1) part = part.slice(0, -6)
				if (unit.traits.includes(part.slice(1, -1))) return true
			}
			return false
		}

		class Card {
			constructor(type = "UNIT",
				name = "",
				ap = 0,
				hp = 0,
				level = 0,
				cost = 0,
				text = "",
				zones = [],
				traits = [],
				link = "",
				id = "",
				color = "BROWN") {
				this.id = id
				this.color = ["WHITE", "BLUE", "PURPLE", "RED", "GREEN"].indexOf(color) >= 0 ? color : "BROWN"
				this.level = parseInt(level) || 0
				this.cost = parseInt(cost) || 0
				// let type_num = parseInt(type) || type == 0? Type.RESOURCE : Type.UNITTOKEN
				// if (Type[type]) {
				// 	// number or string, we want number here
				// 	type_num = parseInt(type)? type : Type[type]
				// }
				this.type = type || ""
				this.name = name || ""
				this.text = unescapeHTML(text || "")
				this.zones = zones || []
				this.traits = traits || []  // new for each, unlike in Python
				this.traits_eob = []
				this.traits_eot = []
				this.link = link || ""
				this.ap = parseInt(ap) || 0
				this.ap_eob = 0
				this.ap_eot = 0
				this.hp = parseInt(hp) || 0
				this.damage = 0
				this.rested = false
				this.sick = false
				this.stunned = false
			}
			AP() {
				let rv = this.ap + this.ap_eob + this.ap_eot
				if (this.damage > 0 && hasText(this.text, "While this Unit is damaged, it gets AP+2.")) {
					rv += 2
				}
				if (this.pilot) {
					rv += this.pilot.ap
					if (linksWith(this, this.pilot)) {
						if (hasText(this.pilot.text, "【During Link】This Unit gets AP+1 and HP+1.<br>")) {
							rv += 1
						}
					}
				}
				if (hasText(this.text, "While you have another (Triple Ship Alliance) Unit in play, this Unit gets AP+1 and <Blocker>.")) {
					if (this.owner.battle.filter(c => c.hasTrait("Triple Ship Alliance")).length > 1) rv += 1
				}

				if (this.text == "During your turn, while you have a (CB) Pilot in play, this Unit gets AP+2.") {
					if (this.owner.battle.some(c => c.pilot && c.pilot.traits.includes("CB"))) rv += 2
				}

				if (active_player != this.owner && hasText(this.type, "TOKEN")) {
					// "Friendly" instead of "your" implies team base counts too.
					rv += this.owner.battle.filter(c => hasText(c.text, "All friendly Unit tokens get AP+1 during your opponent's turn.")).length
				}

				return rv
			}
			HP() {
				let rv = this.hp
				if (this.pilot) {
					rv += this.pilot.hp
					if (linksWith(this, this.pilot)) {
						if (hasText(this.pilot.text, "【During Link】This Unit gets AP+1 and HP+1.<br>")) {
							rv += 1
						}
					}
				}
				return rv - this.damage
			}
			canDamage(def) {
				if (hasText(def.text, "During your turn, while this Unit has <Breach>, it can't receive battle damage from enemy Units with 3 or less AP.") && active_player == def.owner && def.getBreach() && this.AP() <= 3) return false

				if (hasText(def.text, "During your turn, while you have a (CB) Link Unit in play, this Unit can't receive battle damage from enemy Units with 3 or less AP.") && this.AP() <= 3 && active_player == def.owner && def.battle.some(c => c.hasTrait("CB") && c.linked())) return false

				if (def.facedown && def.owner.battle.some(c => c.text == "While this Unit is rested, friendly Shields can't receive battle damage from enemy Units.")) return false

				if ((def.facedown || def == def.owner.base) && this.level <= 4 && def.owner.traits_eob.includes("noDmgShield enemy.unit.lv4min")) return false

				if (hasText(def.text, "While you have a rested (Zeon) Unit in play, this Base can't receive battle damage from enemy Units that are Lv.4 or lower.") && this.level <= 4 && def.owner.battle.some(c => c.rested && c.hasTrait("Zeon"))) return false

				if (def.traits_eob.some(txt => txt.match(new RegExp(`noDmg enemy.unit$`)))) return false

				if (def.traits_eot.some(txt => txt.match(new RegExp(`noDmg enemy.unit.lv[${this.level}-9]min`)))) return false
				return true
			}
			linked() {
				return this.pilot && linksWith(this, this.pilot)
			}
			recover(number) {
				if (this.damage < 1 || number < 1) return false
				log("🛠️Recover " + number + " " + this)
				this.damage -= parseInt(number)
				if (this.damage < 0) this.damage = 0
				if (this.linked && !window.once_per_turn.includes(this.text + this.cid) && hasText(this.text, "【During Link】【Once per Turn】During your turn, when this Unit recovers HP, if you have 4 or less cards in your hand, draw 1.") && this.owner.hand.length <= 4) {
					this.owner.draw()
					window.once_per_turn.push(this.text + this.cid)
				}
				return true
			}
			toString(simple = false) {
				let rv = simple ? "" : (this.type == "COMMAND" || hasText(this.type, "RESOURCE")) ? `#${this.cid} ` : `${this.AP()}/${this.HP()} #${this.cid} `
				if (this.type == "COMMAND" && this.unit) return rv + getSectionText(this, "Pilot").slice(1, -1)
				if (this.type == "PILOT" && simple) return this.name
				let pilot_name = ""
				if (this.pilot) pilot_name = this.pilot.toString(true)
				return rv + `${this.name}${pilot_name ? " + " + pilot_name : ""}`
			}
			toDict() {
				return {
					"id": this.id,
					"color": this.color,
					"level": this.level,
					"cost": this.cost,
					"type": this.type,
					"name": this.name,
					"text": this.text,
					"zones": this.zones,
					"traits": this.traits,
					"link": this.link,
					"ap": this.ap,
					"hp": this.hp,
				}
			}
			static fromDict(d) {
				// log("Returning new card from dict " + JSON.stringify(d))
				return new Card(d.type, d.name, d.ap, d.hp, d.level, d.cost, d.text, d.zones, d.traits, d.link, d.id, d.color)
			}
			toHTML(left, top, facedown = false, z = 0) {
				const id = this.id.split("_")[0]
				return `<div id="c${this.cid}" class="card ${this.rested ? "rested" : ""}${facedown ? " facedown" : ""}${this.type == "RESOURCE" ? " resource" : ""}" style="z-index:${z}; left:${left}vmin; top:${top}vmin; border-color: var(--${this.color}); background-color: var(--${this.color});background-image: url(https://exburst.dev/gundam/cards/sd/${id}.webp);" onclick='zoom(this)'>${this.cid} ${this.damage ? '<div style="color: red">' + this.damage + " DMG</div>" : ""} ${this.sick ? '<div style="color: red">not ready</div>' : ""}${this.AP()}/${this.HP()}</div>`
			}

			hasTrait(trait) {
				if (trait == "protection.enemy.units" && this.facedown && this.owner.battle.filter(c => c.rested && hasText(c.text, "While this Unit is rested, friendly Shields can't receive battle damage from enemy Units.")).length > 0) {
					return true
				}

				if (trait == "Blocker") {
					if (hasText(this.text, "While you have a (CB) Pilot in play, this Unit gains <Blocker>.")) {
						if (this.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) return true
					}
					if (hasText(this.text, "While you have another (Triple Ship Alliance) Unit in play, this Unit gets AP+1 and <Blocker>.")) {
						if (this.owner.battle.some(c => c !== this && c.hasTrait("Triple Ship Alliance"))) return true
					}

					if (this.owner.battle.filter(c => c.rested && hasText(c.text, "While this Unit is rested, all your (League Militaire) Unit tokens gain <Blocker>.")).length && this.traits.concat(this.traits_eot).includes("League Militaire")) return true
				}

				if (trait == "Suppression") {
					if (hasText(this.text, "While this is damaged, it gains <Suppression>.")) return this.damage > 0
					const mo = /Suppression/.exec(this.text)

		function shuffle(array) {
			let m = array.length, t, i
			while (m) {
				i = Math.floor(Math.random() * m--)
				t = array[m]
				array[m] = array[i]
				array[i] = t
			}
		}

				const lines = deck.split("\n")
				const colors = []
				for (const line of lines) {
					if (line.indexOf("# ") == 0) {
						this.deckname = line.slice(2)
						log(`🎴${name} deck: <a href="#" onclick="showDeck(p${this.pid}); event.preventDefault()">${this.deckname}</a>`)
					}
					const [count, id] = line.split(" ")
					if (count >= 1) {
						for (let i = 0; i < count; ++i) {
							const c = this.getCard(id)
							c.owner = this
							this.deck.push(c)
							this.fulldeck.push(this.getCard(id))
							if (!colors.includes(c.color)) colors.push(c.color)
						}
					}
				}
				if (colors > 2) throw Error("Deck colors > 2: " + colors)
				if (this.deck.length != 50) throw Error("Deck length not 50: " + this.deck.length)
				shuffle(this.deck)

				this.resource = []
				this.trash = []

				// Opening hand
				this.draw(5)

				for (let i = 0; i < 6; ++i) {
					const c = this.deck.pop()
					c.rested = true

			async breakShield() {
				const c = this.shield.pop()
				if (!c) return false
				log("💥Broke shield: " + c)
				activate(c)
				boom.play().catch(ex => { })
				const mo = /Burst】([^.]+)/.exec(c.text)
				let toTrash = true
				if (mo) {
					log("⚡Burst: " + mo[1])
					toTrash = !(await run(c, "Burst"))
					if (toTrash) {
						log("🚩🚩FIXME: fizzled " + c)
					}
				}
				if (toTrash) this.trash.push(c)
				await render()
				await sleep(1000)
				return true
			}

			async deploy(card) {
				if (card.type.indexOf("UNIT") < 0) throw Error("Not a unit: " + card)
				if (this.battle.length >= 6) {
					const weakest = mySort(this.battle, c => c.AP())[0]
					await destroy(weakest)
				}
				log(`🚀Deploy ${card.rested ? "rested " : ""}${card}`)
				card.sick = true
				card.damage = 0
				this.battle.push(card)
			}

			draw(number = 1) {
				number = parseInt(number)
				log("🎴" + this.name + " draws " + number)
				for (let i = 0; i < number; ++i) {
					if (this.deck.length < 1) {
						endGame(this == p1 ? p2 : p1)
						throw Error("💀" + this.name + " lost by empty deck")
					}
					this.hand.push(this.deck.pop())
				}
			}

			discard(number = 1) {
				number = parseInt(number)
				for (let i = 0; i < number; ++i) {
					const c = this.hand[Math.floor(Math.random() * this.hand.length)]
					if (!c) return
					log("🗑️" + this.name + " discards " + c)
					this.trash.push(c)
					this.hand = this.hand.filter(item => item !== c)
				}
			}

			getCard(id) {
				const d = cards[id]
				if (!d) {
					const msg = "Card not found: " + id
					log(msg)
					throw Error(msg)
				}
				const rv = Card.fromDict(d)
				// DeckPlanet bug workarounds. See also cards.json.
				rv.text = rv.text.replaceAll("[action]", "【Action】").replaceAll("[br]", "<br>").replaceAll("[burst]", "【Burst】").replaceAll("[breach 3]", "【Breach 3】").replaceAll("[deploy]", "【Deploy】").replaceAll("[main]", "【Main】").replaceAll("[pilot]", "【Pilot】").replaceAll("[when paired]", "【When Paired】")

				cid += 1
				rv.cid = cid
				rv.owner = this
				return rv
			}

			getPairableUnits() {
				return this.battle.filter(c => !c.pilot && !hasText(c.text, "This Unit can't be paired with a Pilot."))
			}

			getToken(name) {
				// Yes, names are not unique.
				for (const k in cards) if (cards[k].name == name && hasText(cards[k].type, "TOKEN")) return this.getCard(k)
			}

			async pay(cost) {
				// Log to debug; this payment can be rolled back if command has no target.
				cost = parseInt(cost)
				if (cost > this.resource.filter(r => !r.rested).length) return false
				// log("💲Paying " + cost)
				let paid = 0
				// EX last
				for (const r of mySort(this.resource.filter(c => !c.rested), c => c.type.indexOf("EX"))) {
					rest(r)
					paid += 1
					if (hasText(r.type, "EX")) {
						// log("💲Spending EX Resource " + r.id)
						this.resource = this.resource.filter(item => item !== r)
						// Wait for rest animation and show gone.
						await sleep(300)
						await render()
					}
					if (paid >= cost) break
				}
				return true
			}
		}

		// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf section 9.
		async function actionStep() {
			// log("Action step")
			let p = active_player
			let pass = 0
			while (pass < 2) {
				p = (p == p1 ? p2 : p1)
				let level = p.resource.length
				let ran = false
				for (const c of p.hand.filter(c => c.type == "COMMAND").concat(p.battle)) {
					if (c.level > level || c.cost > level) continue
					let free_res_count = p.resource.filter(c => c.type.indexOf("EX") < 0).length || 0
					let ex_res_count = p.resource.filter(c => hasText(c.type, "EX")).length || 0
					let refund = false
					if (c.type == "COMMAND") {
						if (await p.pay(c.cost)) {
							p.hand = p.hand.filter(item => item !== c)
							if (await run(c, "Action")) {
								ran = true
								log(`⚡Ran #${c.cid} ${c.toString(true)} Action: ${escapeHTML(c.text)}`)
								c.owner.trash.push(c)
								await render()
							} else {
								refund = true
							}
						}
					} else {
						await run(c, "Action")
					}
					if (refund) {
						// No useful target, so don't play this and roll back payment.
						ex_res_count -= p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
						for (let i = 0; i < ex_res_count; ++i) {
							p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
						}
						for (let i = 0; i < Math.max(free_res_count, c.cost); ++i) {
							activate(p.resource[i])
						}
						p.hand.push(c)
						continue
					}
				}
				if (ran) pass = 0
				else pass += 1
			}
		}

		function getDamage(att, def) {
			if (!att.canDamage(def)) return 0
			let damage = Math.max(0, att.AP())
			if (hasText(def.text, "If you have a (CB) Pilot in play, when this Unit receives damage from an enemy, reduce it by 1.") && def.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) {
				if (damage > 0) damage -= 1
			}
			return damage
		}

		async function doBattle(att, def) {
			defender = def
			await actionStep()
			def = defender
			// vfx
			await battle(att, def)
			let afs = att.hasTrait("First Strike")
			let dfs = def.hasTrait("First Strike")
			let dmg_to_def = getDamage(att, def)
			let dmg_to_att = getDamage(def, att)
			// TODO deathtouch
			if (dfs && !afs && dmg_to_att > att.HP()) {
			} else {
				if (dmg_to_def > 0) {
					def.damage += dmg_to_def
					if (dmg_to_att > 0) await run(def, "", "When this Unit deals battle damage")
				}
				// TODO Undying etc.
				if (def.owner.trash.includes(def) || def.HP() < 1) {
					def.traits_eob.push("dead")
					if (hasText(def.type, "UNIT")) {
						const breach = att.getBreach()
						if (breach) {
							if (def.owner.base) {
								log("➤Breach " + breach)
								await dealDamage(att, def.owner.base, breach)
							} else if (def.owner.shield.length > 0) {
								log("➤Breach " + breach)
								await def.owner.breakShield()
							}
						}
					}
					await destroy(def)
					await run(att, "", "During your turn, when this Unit destroys an enemy Unit with battle damage, ")
				}
			}
			if (afs && def.traits.includes("dead")) dmg_to_att = 0
			att.damage += dmg_to_att
			if (dmg_to_att > 0) await run(def, "", "When this Unit deals battle damage")
			if (att.HP() < 1 && !att.owner.trash.includes(att)) await destroy(att)

			// end of battle
			for (const c of p1.battle.concat(p2.battle)) {
				c.ap_eob = 0
				c.traits_eob = []
			}
			for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
				c.ap_eob = 0
				c.traits_eob = []
			}
			att.owner.traits_eob = []
			def.owner.traits_eob = []
			await render()
		}

		async function dealDamage(source, target, amount = 1) {
			if (!target) return false
			amount = parseInt(amount)
			log(`🎯${source} deals ${amount} effect damage to ${target}`)
			target.damage += amount
			if (target.HP() < 1) await destroy(target)
			return true
		}

		function getSectionText(card, act = "Main", clause = "") {
			const rex = new RegExp("(.*?)" + (clause ? clause : (act + "】")) + "([^.].+?)(<br|$)")
			const mo = card.text.match(rex)
			if (!mo) return ""
			const limits = mo[1]
			const text = mo[2]
			if (hasText(limits, "During Link") && !linksWith(card, card.pilot)) return ""
			if (hasText(limits, "During Pair") && !card.pilot) return ""
			return text
		}
		async function run(card, act = "Main", clause = "") {
			if (!card) return false
			if (card.type == "COMMAND") {
				// log("DEBUG Running " + card + " " + act + " " + clause)
			}
			let rv = await runCard(card, act, clause)
			if (card.pilot && card.pilot.type == "PILOT") rv = rv || await runCard(card.pilot, act, clause)
			return rv
		}
		async function runCard(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t) {
				// if (clause || hasText(card.text, act)) log(`🚩No act ${act} or clause "${escapeHTML(clause)}" found in ${card.id} ${escapeHTML(card.text)}`)
				return false
			}
			const p = card.owner
			const en = (p == p1 ? p2 : p1)
			const fu = p.battle
			const eu = en.battle

			if (hasText(card.text, " to an enemy Unit that is Lv.5 or lower, if you have a (CB) Pilot in play, destroy that enemy Unit.")) {
				if (!fu.some(c => c.pilot && c.pilot.hasTrait("CB"))) return false
				await destroy(defender)
				return true
			}
			if (t == "this Unit recovers 2 HP.") {
				return card.recover(2)
			}
			if (t == "【Once per Turn】②：Choose 1 of your Units. It recovers 2 HP.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				const target = mySort(fu.filter(c => c.damage > 0), c => -c.damage)[0]
				if (!target) return false
				if (!await p.pay(2)) return false
				window.once_per_turn.push(t + card.cid)
				target.recover(2)
				return true
			}
			// Battle Action
			if (t == "Choose 1 rested friendly (CB) Unit. Change the attack target of the battling enemy Unit to it.") {
				const target = fu.filter(c => c.rested && c.traits.includes("CB"))[0]
				if (!target) return false
				defender = target
				return true
			}
			if (t == "Choose 1 to 2 friendly (Clan) Units. They can't receive battle damage from enemy Units that are Lv.2 or lower during this turn.") {
				const targets = fu.filter(c => c.traits.includes("Clan")).slice(0, 2)
				const enemy_count = eu.filter(c => c.level <= 2 && active_player == p ? c.rested : (!c.rested && !c.sick)).length
				if (!targets.length > 0 || enemy_count < 1) return false
				for (const target of targets) target.traits_eot.push("noDmg enemy.unit.lv2min")
				return false
			}
			// If Burst is optional, why not Attack etc?
			if (t == "Activate this card's 【Main】.") {
				t = getSectionText(card, "Main")
			}
			if (t == "Deploy this card.") {
				card.rested = false
				p.base = card
				await render()
				await run(card, "Deploy")
				return true
			}
			if (t == "Add this card to your hand.") {
				card.rested = false
				card.pilot = null
				card.unit = null
				p.hand.push(card)
				return true
			}
			if (t.indexOf("Add 1 of your Shields to your hand.") == 0) {
				const target = p.shield.pop()
				if (target) {
					log(`🎴${p.name} took shield`)
					target.rested = false
					p.hand.push(target)
				}
			}
			if (t == "Add 1 of your Shields to your hand.") return true
			if (t == "Add 1 of your Shields to your hand. Then, choose 1 of your Units. It gets AP+2 during this turn.") {
				const target = mySort(fu, c => c.AP())[0]
				if (!target) return false
				target.ap_eot += 2
				return true
			}
			if (t == "Add 1 of your Shields to your hand. Then, choose 1 enemy Unit with 5 or less AP. Deal 1 damage to it.") {
				const target = eu.filter(c => c.AP() <= 5)[0]
				return await dealDamage(card, target)
			}
			if (t == "Add 1 of your Shields to your hand. Then, look at the top 2 cards of your deck and return 1 to the top and 1 to the bottom.") {
				// TODO
				const c = p.deck.pop()
				if (!c) return false
				if (c.type == "PILOT" && p.getPairableUnits().length < 1 && p.hand.filter(c => c.type == "UNIT").length < 1) {
					log(p.name + " puts top card on bottom")
					p.deck = [c].concat(p.deck)
				} else {
					log("🎴" + p.name + " leaves top card")
					p.deck.push(c)
				}
				return true
			}
			if (t == "Add 1 of your Shields to your hand. Then, if it is your turn, look at the top 2 cards of your deck and return 1 to the top. Place the remaining card into your trash.") {
				if (active_player != p) return false
				const c = p.deck.pop()
				if (!c) return false
				if (c.type == "PILOT" && p.getPairableUnits().length < 1 && p.hand.filter(c => c.type == "UNIT").length < 1) {
					log(p.name + " puts top card in trash")
					p.trash.push(c)
				} else {
					log("🎴" + p.name + " leaves top card")
					p.deck.push(c)
				}
				return true
			}
			if (hasText(t, "Add 1 of your Shields to your hand. Then, if it is your turn, deploy 1 rested [Char's Zaku Ⅱ]((Zeon)･AP3･HP1) Unit token.")) {
				if (active_player != p) return false
				const target = p.getToken("Char's Zaku Ⅱ")
				target.rested = true
				await p.deploy(target)
				return true
			}
			if (hasText(t, "Add 1 of your Shields to your hand. Then, during your turn, if a friendly (League Militaire) Unit is in play, deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.")) {
				if (active_player != p) return false
				if (fu.filter(c => c.traits.includes("League Militaire").length > 0)) {
					await p.deploy(p.getToken("Parts"))
				}
				return true
			}
			if (hasText(t, "Add 1 of your Shields to your hand. Then, if it is your turn, deploy 1 [Tallgeese]((OZ)･AP4･HP2) Unit token. If it is your turn and a card with \"Corsica Base\" in its card name is in your trash, deploy 2 [Leo]((OZ)･AP1･HP1) Unit tokens instead.")) {
				if (active_player != p) return false
				if (p.trash.filter(c => c.name.indexOf("Corsica Base")).length > 0) {
					await p.deploy(p.getToken("Leo"))
					await p.deploy(p.getToken("Leo"))
				} else {
					await p.deploy(p.getToken("Tallgeese"))
				}
				return true
			}
			if (t == "Rest this Base：All friendly Link Units get AP+1 during this turn.") {
				if (card.rested) return false
				// Main ability so check for can attack.
				const targets = fu.filter(c => !c.rested && !c.sick && c.linked())
				if (targets.length < 1) return false
				rest(card)
				log("🎯" + card + " " + t)
				targets.forEach(c => c.ap_eot += 1)
				await sleep(400)
				await render()
				return true
			}
			if (t == "Rest this Base：Choose 1 friendly Unit. It gets AP+1 during this turn.") {
				if (card.rested) return false
				const target = fu.filter(c => !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯" + card + " AP+1 " + target)
				target.ap_eot += 1
				return true
			}
			if (t == "Rest this Base：Choose 1 of your damaged Units. It gets AP+2 during this turn.") {
				if (card.rested) return false
				const target = fu.filter(c => c.damage > 0 && !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯" + card + " AP+2 " + target)
				target.ap_eot += 2
				return true
			}
			if (t == "Rest this Base：If a friendly (Clan) Link Unit is in play, choose 1 friendly Unit. It gets AP+2 during this turn.") {
				if (card.rested || !fu.some(c => c.hasTrait("Clan") && c.linked())) return false
				const target = fu.filter(c => !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯" + card + " AP+2 " + target)
				target.ap_eot += 2
				return true
			}
			if (t == "【Once per Turn】②：Deploy 1 [Gundam]((White Base Team)･AP3･HP3) Unit token if you have no Units in play, deploy 1 [Guncannon]((White Base Team)･AP2･HP2) Unit token if you have only 1 Unit in play, or deploy 1 [Guntank]((White Base Team)･AP1･HP1) Unit token if you have 2 or more Units in play.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				if (!await p.pay(2)) return false
				window.once_per_turn.push(t + card.cid)
				if (fu.length == 0) {
					await p.deploy(p.getToken("Gundam"))
				} else if (fu.length == 1) {
					await p.deploy(p.getToken("Guncannon"))
				} else {
					await p.deploy(p.getToken("Guntank"))
				}
				return true
			}
			if (t == "【Once per Turn】②：Choose 1 friendly Unit with <Blocker>. Set it as active. It can't attack during this turn.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				const target = fu.filter(c => c.rested && c.hasTrait("Blocker"))[0]
				if (!target || !await p.pay(2)) return false
				window.once_per_turn.push(t + card.cid)
				activate(target)
				target.sick = true
				return true
			}
			if (t == "Choose 1 active enemy Unit. It gains <Blocker> during this turn.") {
				const target = eu.filter(c => !c.rested).toSorted(c => c.AP())[0]
				if (!target) return false
				target.traits_eot.push("Blocker")
				return true
			}
			if (t == "Choose 1 of your (ZAFT) Units with 5 or more AP. It gains <First Strike> during this turn.") {
				const target = fu.filter(c => !c.rested && c.traits.includes("ZAFT") && c.AP() >= 5)[0]
				if (!target || eu.length < 1) return false
				target.traits_eot.push("First Strike")
				return true
			}
			if (t == "Deploy 1 rested [Zaku Ⅱ]((Zeon)･AP1･HP1) Unit token.") {
				const c = p.getToken("Zaku Ⅱ")
				c.rested = true
				c.sick = true
				await p.deploy(c)
				return true
			}
			if (t == "Choose 1 of your active (League Militaire) Units and 1 enemy Unit that is Lv.3 or lower. Rest them.") {
				const target = mySort(eu.filter(c => c.level <= 3), c => -c.AP())[0]
				if (!target) return false
				const friend = mySort(fu.filter(c => !c.rested && c.traits.includes("League Militaire")), c => c.AP())[0]
				if (!friend) return false
				rest(friend)
				rest(target)
				return true
			}
			if (t == "Deploy 1 rested [GQuuuuuuX (Omega Psycommu)]((Clan)･AP3･HP2) Unit token and 1 rested [Red Gundam]((Clan)･AP2･HP3) Unit token.") {
				if (fu.length >= 6) return false
				for (const token of ["GQuuuuuuX (Omega Psycommu)", "Red Gundam"]) {
					const c = p.getToken(token)
					c.rested = true
					c.sick = true
					await p.deploy(c)
				}
				return true
			}
			let mo = t.match(/^Draw (\d).$/)
			if (mo) {
				p.draw(mo[1])
				return true
			}
			mo = t.match(/^Draw (\d). Then, discard (\d).$/)
			if (mo) {
				p.draw(mo[1])
				p.discard(mo[2])
				return true
			}
			if (t == "Place 1 EX Resource.") {
				// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf?v#:~:text=You%20may%20have%20up%20to,view%20cards%20in%20this%20location.
				// TODO: Replace existing rested EX Resource?
				if (p.resource.filter(item => item.name == "EX Resource").length >= 5) return false
				p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
				await render()
				await sleep(500)
				for (const c of p.battle) {
					await run(c, "", "When you place an EX Resource, ")
				}
				return true
			}
			if (t == "【Once per Turn】Choose 1 of your Resources. Set it as active.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				window.once_per_turn.push(t + card.cid)
				for (const c of p.resource) {
					if (c.rested) {
						activate(c)
						return true
					}
				}
				return false
			}
			if (t == "This Unit gets AP+2 during this turn.") {
				card.ap_eot += 2
				return true
			}
			// Pilot Attack
			if (t == "This Unit gets AP+1 during this turn. If there are 7 or more (CB) cards in your trash, all your (CB) Units get AP+1 instead.") {
				if (p.trash.filter(c => c.traits.includes("CB")).length >= 7) {
					log("Boosting all my (CB) units")
					fu.filter(c => c.traits.includes("CB")).forEach(c => c.ap_eot += 1)
				} else {
					log("Boosting " + card.unit)
					card.ap_eot += 1
				}
				return true
			}
			if (t == "During this turn, this Unit gets AP+1 and, if it is a Link Unit, it gains <High-Maneuver>.") {
				card.unit.ap_eot += 1
				if (linksWith(card.unit, card)) card.unit.traits_eot.push("High-Maneuver")
				return true
			}
			if (t == "You may deploy 1 (Neo Zeon)/(Zeon) Unit card that is Lv.4 or lower from your hand.") {
				const target = mySort(p.hand.filter(item => item.level <= 4 && item.type == "UNIT" && (item.traits.includes("Neo Zeon") || item.traits.includes("Zeon"))), item => -item.cost)[0]
				if (!target || fu.length >= 6) return false
				log("🎯Deploying " + target)
				await p.deploy(target)
				p.hand = p.hand.filter(item => item !== target)
				return true
			}
			if (hasText(t, "During this battle, your shield area cards can't receive damage from enemy Units that are Lv.4 or lower.")) {
				p.traits_eob.push("noDmgShield enemy.unit.lv4min")
				return true
			}
			if (hasText(t, "Choose 1 friendly Unit. It recovers 3 HP.")) {
				const target = mySort(fu.filter(c => c.damage > 0), c => -c.damage)[0]
				if (!target) return false
				return target.recover(3)
			}
			if (hasText(t, "Choose 1 friendly Unit. It gets AP+2 during this turn.")) {
				const target = mySort(fu.filter(c => !c.rested && !c.sick), c => c.AP())[0]
				if (!target) return false
				const strongest_enemy = mySort(eu, c => -c.HP())[0]
				const enemy_hp = strongest_enemy && strongest_enemy.AP() || 0
				const enemy_base_hp = (en.base && en.base.HP()) || 0
				if (Math.max(enemy_hp, enemy_base_hp) <= target.AP()) return false
				log("🎯AP+2 " + target)
				target.ap_eot += 2
				return true
			}
			if (t == "Choose 1 friendly Link Unit. It gains <Breach 1> during this turn.") {
				const target = mySort(fu.filter(c => !c.rested && !c.sick && c.linked()), c => c.AP())[0]
				if (!target || (en.shield.length < 1 && !en.base)) return false
				log("🎯Breach+1 " + target)
				target.traits_eot.push("Breach 1")
				return true
			}
			if (hasText(t, "Choose 1 of your Units. It gains <Breach 3> during this turn.")) {
				const target = mySort(fu.filter(c => !c.rested && !c.sick), c => c.AP())[0]
				if (!target || (en.shield.length < 1 && !en.base)) return false
				log("🎯Breach+3 " + target)
				target.traits_eot.push("Breach 3")
				return true
			}
			// Attack ability is mandatory.
			if (hasText(t, "Choose 1 of your (Cyclops Team) Units. It gains <Breach 1> during this turn.")) {
				const target = mySort(fu.filter(c => c.traits.includes("Cyclops Team")), c => c.AP())[0]
				if (!target) return false
				log("🎯Breach+1 " + target)
				target.traits_eot.push("Breach 1")
				return true
			}
			if (hasText(t, "Choose 1 friendly Unit that is Lv.2 or lower. It gains <First Strike> during this turn.")) {
				const target = mySort(fu.filter(c => c.level <= 2 && !c.rested && !c.sick), c => c.AP())[0]
				if (!target) return false
				log("🎯First Strike " + target)
				target.traits_eot.push("First Strike")
				return true
			}
			// ST05-03 & ST05-013
			mo = t.match(/Choose 1 of your Units. Deal 1 damage to it. It gets AP\+(\d) during this turn.$/)
			if (mo) {
				const target = mySort(fu.filter(c => !c.rested && !c.sick && c.HP() > 1), c => c.AP())[0]
				if (!target) return false
				if (hasText(t, "Rest this Unit")) {
					if (card.rested) return false
					rest(card)
				}
				log("🎯AP+" + mo[1] + " " + target)
				dealDamage(card, target)
				target.ap_eot += parseInt(mo[1])
				return true
			}
			// ST05-001
			if (t == "Choose 1 of your other Units. Deal 1 damage to it. It gets AP+1 during this turn.") {
				const target = mySort(fu.filter(c => !c.rested && !c.sick && c.HP() > 1), c => c.AP())[0]
				if (!target) return false
				log("🎯Boosting " + target)
				dealDamage(card, target)
				target.ap_eot += 1
				return true
			}
			if (hasText(t, "Choose 1 friendly Unit. It can't receive battle damage from enemy Units with 2 or less AP during this battle.")) {
				const target = mySort(fu, c => -c.AP())[0]
				const enemies = eu.filter(c => c.AP() <= 2)
				if (!target && enemies.length < 1) return false
				log("🎯Protecting " + target)
				target.traits_eob.push("noDmg enemy.unit.lv2min")
				return true
			}
			if (hasText(t, "Choose 1 to 2 friendly (Clan) Units. They get AP+2 during this turn.")) {
				const targets = mySort(fu.filter(c => !c.sick && !c.rested && c.hasTrait("Clan")), c => c.AP()).slice(0, 2)
				if (targets.length < 1) return false
				log("🎯AP+2 " + targets)
				for (const target of targets) target.ap_eot += 2
				return true
			}
			if (t === "If you have 3 or more (League Militaire) Units in play, draw 1.") {
				if (fu.filter(c => c.traits.includes("League Militaire")).length < 3) return false
				p.draw(1)
				return true
			}
			// When Paired
			// Pilot
			if (t == "If this is a (Mafty) Unit, choose 1 of your (Mafty) Units. During this turn, it may choose a damaged active enemy Unit as its attack target.") {
				if (!card.unit.traits.includes("Mafty")) return false
				const target = fu.filter(c => !c.rested && !c.sick && c.traits.includes("Mafty"))[0]
				if (!target) return false
				target.traits_eot.push("canAttack active.unit.damaged")
				return true
			}
			if (t == "If this is a (CB) Unit, it may choose an active enemy Unit whose Lv. is equal to or lower than this Unit as its attack target during this turn.") {
				if (!card.unit.traits.includes("CB")) return false
				card.traits_eot.push(`canAttack active.unit.lv${card.level}min`)
				return true
			}
			if (hasText(t, "If this is a (League Militaire) Unit, deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.")) {
				if (!card.unit.traits.includes("League Militaire")) return false
				await p.deploy(p.getToken("Parts"))
				return true
			}
			if (t == "If this is a (Minerva Squad) Unit, choose 1 of your Resources. Set it as active.") {
				if (!card.unit.traits.includes("Minerva Squad")) return false
				const targets = p.resource.filter(c => c.rested)
				if (targets.length > 0) activate(targets[0])
				return true
			}
			if (hasText(t, "Deploy 1 [Hy-Gogg]((Cyclops Team)･AP2･HP1) Unit token.")) {
				if (fu.length >= 6) return false
				p.deploy(p.getToken("Hy-Gogg"))
				return true
			}
			// 【Main】/【Action】
			if (hasText(t, "Choose 1 active enemy Unit with 4 or less AP. Destroy it.")) {
				const target = eu.filter(c => !c.rested && c.AP() <= 4)[0]
				if (!target) return false
				await destroy(target)
				return true
			}
			if (t == "Choose 1 enemy Unit that is Lv.3 or lower. Destroy it.") {
				const target = eu.filter(c => c.level <= 3)[0]
				if (!target) return false
				await destroy(target)
				return true
			}
			mo = t.match(/Choose 1 enemy Unit that is Lv.(\d) or lower. It gets AP-(\d) during this turn./)
			if (mo) {
				const target = eu.filter(c => c.level <= parseInt(mo[1]))[0]

				target.ap_eot -= parseInt(mo[2])
				return true
			}
			if (t == "Choose 1 enemy Unit that is Lv.5 or lower. Deal damage to it equal to the number of friendly Unit tokens in play.") {
				const target = eu.filter(c => c.level <= 5)[0]
				const token_count = fu.filter(c => hasText(c.type, "TOKEN")).length
				if (!target || token_count < 1) return false
				dealDamage(card, target, token_count)
				return true
			}
			if (hasText(t, "If you have no (Earth Alliance) Unit tokens in play,")) {
				if (fu.filter(c => hasText(c.type, "TOKEN") && c.traits.includes("Earth Alliance")).length > 0) return false
				if (hasText(t, "deploy 1 [Sword Strike Gundam]((Earth Alliance)･AP4･HP2･<Blocker>) or 1 [Launcher Strike Gundam]((Earth Alliance)･AP2･HP4･<Blocker>) Unit token.")) {
					await p.deploy(p.getToken("Sword Strike Gundam"))
					return true
				}
				if (hasText(t, "deploy 1 [Aile Strike Gundam]((Earth Alliance)･AP3･HP3･<Blocker>) Unit token.")) {
					await p.deploy(p.getToken("Aile Strike Gundam"))
					return true
				}

				eu.forEach(item => item.ap_eot -= 1)

				if (!target) return false

				target.ap_eob -= 2
				return true

				return await dealDamage(card, target, mo[1])
			}
			if (hasText(t, "Choose 1 rested enemy Unit. Deal 1 damage to it.")) {
				const target = mySort(eu.filter(c => c.rested), c => -c.HP())[0]
				return await dealDamage(card, target, 1)
			}
			if (hasText(t, "Choose 1 enemy Unit. It gets AP-3 during this turn.")) {
				const target = mySort(eu, c => -c.AP())[0]

				log("🎯AP-3 EOT " + target)
				target.ap_eot -= 3
				return true

			if (t == "Choose 1 rested enemy Unit that is Lv.2 or lower. It won't be set as active during the start phase of your opponent's next turn.") {
				const target = mySort(eu.filter(c => c.level <= 2), c => c.HP())[0]

				if (eu.includes(defender)) return false

				return true

				const targets = mySort(eu, c => c.HP())

				return await dealDamage(card, target, 3)

				bounce(target)
				return true
			}
			if (hasText(t, "Choose 1 damaged enemy Unit. Deal 3 damage to it.")) {

				if (!target) return false
				return await dealDamage(card, target, 3)
			}
			mo = t.match(/Choose 1 enemy Unit with (\d) or less AP. Rest it./)

				const target = mySort(eu.filter(c => c.AP() <= mo[1]), c => -c.AP())[0]
				if (!target) return false
				log("🎯Resting " + target + " by " + card)
				rest(target)
				return true
			}
			mo = t.match(/Choose 1 enemy Unit with (\d) or less HP. Rest it./)

				const target = mySort(eu.filter(c => c.HP() <= mo[1]), c => -c.AP())[0]
				if (!target) return false
				log("🎯Resting " + target + " by " + card)

			if (t == "If you have 2 or more other (Gjallarhorn)/(Tekkadan) Units in play, choose 1 enemy Unit with 3 or less HP. Rest it.") {

				const target = mySort(eu.filter(c => c.HP() <= 3), c => -c.AP())[0]

				log("🎯Resting " + target + " by " + card)

				return true

			if (hasText(t, "During this turn, this Unit may choose an active enemy Unit with AP equal to or less than this Unit as its attack target.")) {

				return true

				if (!target || eu.filter(c => !c.rested && c.AP() <= 3).length < 1) return false
				card.traits_eot.push = "canAttack active.unit.ap3min"
				return true
			}
			if (t == "If another friendly (Clan) Unit is in play, choose 1 enemy Unit. Deal 1 damage to it.") {
				if (!eu.length || !fu.filter(c => c !== card && c.traits.includes("Clan")).length) return false
				dealDamage(card, mySort(eu, c => c.HP())[0])
				return true
			}
			if (t == "If another friendly (Clan) Unit is in play, this gains <First Strike> during this turn.") {
				if (!eu.length || !fu.filter(c => c !== card && c.traits.includes("Clan")).length) return false
				card.traits_eot.push("First Strike")
				return true
			}

				const top = p.deck.slice(-2)
				p.deck = p.deck.slice(0, -2)

				return true
			}
			if (t == `Choose 1 (Minerva Squad) Unit card without "Force Impulse Gundam" in its card name from your trash. Add it to your hand.`) {
				const target = p.trash.filter(c => !hasText(c.name, "Force Impulse Gundam"))[0]

				log(`🎴${card.owner} took ${target}`)
				target.damage = 0
				p.hand.push(target)
				p.trash = p.trash.filter(c => c !== target)
				return true
			}
			if (t == "Choose 1 Unit card that is Lv.5 or lower from your trash. Pay its cost to deploy it.") {
				const target = p.trash.filter(c => c.level <= 5 && c.type == "UNIT" && c.cost <= p.resource.filter(c => !c.rested).length)[0]

				if (await p.pay(target.cost)) {

					p.trash = p.trash.filter(c => c !== target)
					target.from_trash = true
					p.deploy(target)
					target.from_trash = false
					return true
				}
				log("🚩🚩FIXME: Refund " + target.cost)
				return false
			}
			if (t == "If you deploy this Unit from your trash, choose 1 enemy Unit that is Lv.3 or lower. Destroy it.") {
				if (!card.from_trash) return false
				const target = eu.filter(c => c.level <= 3).toSorted(c => -c.AP())[0]
				if (!target) return false
				log(t)
				destroy(target)
				return true
			}

			mo = t.match(/^Look at the top (\d) cards of your deck./)
			let look = mo && mo[1] || 0
			if (t.indexOf("Look at the top card of your deck.") == 0) look = 1
			if (look > 0) {
				if (hasText(t, "may deploy") && fu.length >= 6) return false
				let targets = p.deck.slice(-look)
				if (targets.length < 1) return false
				let target = null
				if (hasText(t, "If it is a (Clan) card, you may reveal it and add it to your hand. Return any remaining card to the bottom of your deck.")) {
					target = targets.filter(c => c.traits.includes("Clan"))
				}
				if (hasText(t, "If it is a (Zeon)/(Neo Zeon) Unit card, you may reveal it and add it to your hand.")) {
					target = targets.filter(c => c.type == "UNIT" && (c.traits.includes("Zeon") || c.traits.includes("Neo Zeon")))[0]
				}
				mo = t.match(/You may deploy 1 \((.+?)\) Unit card that is Lv.4 or lower among them./)
				if (mo) {
					target = targets.filter(c => c.level <= 4 && c.traits.includes(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type == "PILOT")[0]
				}
				else if (hasText(t, "You may reveal 1 (Academy) Unit card/Command card among them and add it to your hand.")) {
					target = targets.filter(c => (c.type == "UNIT" || c.type == "COMMAND") && c.traits.includes("Academy"))[0]
				}
				mo = t.match(/You may reveal 1 \((.+?)\) Unit card\/Pilot card among them and add it to your hand./)
				if (mo) {
					target = targets.filter(c => (c.type == "UNIT" || c.type == "PILOT") && c.traits.includes(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 (CB) Unit card that is Lv.5 or lower among them and add it to your hand.")) {
					target = targets.filter(c => c.type == "UNIT" && c.level <= 5 && c.traits.includes("CB"))[0]
				}
				else if (hasText(t, "You may reveal 1 green (Zeon) Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type == "PILOT" && c.color == "GREEN" && c.traits.includes("Zeon"))[0]
				}
				// TODO: /reveal (\d) (\(.*?\)) ((Unit|Pilot|Base|Command) card\/?)+/ card among them
				else if (hasText(t, "You may reveal 1 green (Earth Federation) Unit card/1 card with \"AGE Device\" in its card name among them and add it to your hand.")) {
					target = targets.filter(c => hasText(c.nme, "AGE Device") || (c.type == "UNIT" && c.color == "GREEN" && c.traits.includes("Earth Federation")))[0]
				}
				else if (hasText(t, "You may reveal 1 (Zeon)/(Neo Zeon) Unit card among them and add it to your hand.")) {
					target = targets.filter(c => c.traits.includes("Zeon") || c.traits.includes("Neo Zeon"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Clan) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.traits.includes("Clan") && (c.type == "UNIT" || c.type == "PILOT"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Operation Meteor)/(G Team) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => (c.traits.includes("Operation Meteor") || c.traits.includes("G Team")) && (c.type == "UNIT" || c.type == "PILOT"))[0]
				} else {
					log(`🚩🚩FIXME Not implemented ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
					return false
				}

				if (target) {
					log(`${p.name} reveals from top ${look}: ${target}`)
					if (hasText(t, "add it to your hand")) {
						log(`🎴${p.name} took ${target}`)
						p.hand.push(target)
					} else if (hasText(t, "You may deploy")) {
						p.deploy(target)
					}
					targets = targets.filter(c => c !== target)
				}
				shuffle(targets)
				p.deck = targets.concat(p.deck.slice(0, -look))
				return true
			}

			log(`🚩🚩FIXME Not implemented ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
			return false
		}

		let games = ngames.value
		let game = 0
		let game_over = false
		let p1 = null
		let p2 = null

		async function playGame() {
			game += 1
			log(`\n<br>🏁Game ${game}/${games} start`)
			setGameOver(false)
			pid = 0
			cid = 0
			p1 = new Player("Player 1")
			p2 = new Player("Player 2")
			let p = rndPick([p1, p2])
			active_player = p
			let enemy = p === p1 ? p2 : p1
			enemy.resource.push(enemy.getCard(rndPick(EX_RESOURCES)))
			await render()
			while (true) {
				active_player = p
				// Set active
				if (p.base != null) activate(p.base)

				for (const c of p.resource) {
					if (c.rested) activate(c)
				}
				for (const c of p.battle) {
					if (c.rested) activate(c)
					c.sick = false
				}
				await sleep(1000)
				log("")
				// Draw card
				try {
					p.draw()
					await render()
				} catch (ex) {
					log(ex)
					break
				}
				// Place resource
				let r = p.resource_deck.pop()
				if (r) {
					p.resource.push(r)
					await render()
					await sleep(1500)
				}
				let level = p.resource.length
				log("📈" + p.name + " level " + level)
				// Main phase
				let considered = []
				while (true) {
					let to_play = mySort(p.hand.filter(c => !considered.includes(c)), c => ["BASE", "UNIT", "PILOT", "COMMAND"].indexOf(c.type) * 10 + c.cost)
					if (to_play.length < 1) break
					const c = to_play[0]
					considered.push(c)

					// TODO: Discounts
					if (c.level > level || c.cost > level) continue
					// already have a base
					if (c.type == "BASE" && p.base != null) continue
					// no empty unit
					let empty_units = p.getPairableUnits()
					if (c.type == "PILOT" && empty_units.length < 1) continue
					// max 6 units
					if (c.type == "UNIT" && p.battle.length >= 6) continue
					// log("Consider L" + c.level + " C" + c.cost + " " + c)
					await sleep(400)
					// ensure cards have HTML elements
					await render()
					let free_res_count = p.resource.filter(bc => bc.type.indexOf("EX") < 0).length || 0
					let ex_res_count = p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
					// log(`🤔Considering ${c.type} #${c.cid} ${c.id} ${c.name}`)
					if (await p.pay(c.cost)) {
						// Remove card from hand
						p.hand = p.hand.filter(item => item !== c)
						await render()
						if (c.type == "COMMAND") {
							// Do pilot part of command 2/3 of the time.
							if ((!hasText(c.text, "【Pilot】") || rnd(1, 3) > 2) && await run(c)) {
								log(`💲Paid ${c.cost} for ${c.type} #${c.cid} ${c.id} ${c.name}`)
								log(`⚡Ran #${c.cid} ${c.toString(true)} Main: ${escapeHTML(c.text)}`)
								await sleep(400)
								p.trash.push(c)
								await render()
								continue
							} else {
								if (empty_units.length > 0 && hasText(c.text, "【Pilot】")) {
									await pair(empty_units[0], c)
									empty_units = p.getPairableUnits()
									continue
								}
								// No useful target, so don't play this and roll back payment.
								ex_res_count -= p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
								for (let i = 0; i < ex_res_count; ++i) {
									p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
								}
								for (let i = 0; i < Math.max(free_res_count, c.cost); ++i) {
									activate(p.resource[i])
								}
								p.hand.push(c)
								continue
							}
						}
						log(`💲Paid ${c.cost} for ${c.type} #${c.cid} ${c.id} ${c.name}`)
						if (c.type == "BASE") {
							log("🟨Deploy base " + c)
							c.rested = false
							p.base = c
							await render()
							await run(c, "Deploy")
						} else if (c.type == "UNIT") {
							await p.deploy(c)
							await render()
							await run(c, "Deploy")
						} else if (c.type == "PILOT") {
							await pair(empty_units[0], c)
							empty_units = p.getPairableUnits()
						}
						await sleep(800)
					}
				}

				await run(p.base, "Main")

				// attack
				// TODO: Actions of defender, attacker, defender, etc.  Or not but then how are rest commands useful?
				considered = []
				while (true) {
					const can_attack = mySort(p.battle.filter(bc => !bc.rested && !bc.sick && !considered.includes(bc)), bc => -bc.AP())
					if (can_attack.length < 1) break
					const att = can_attack[0]
					considered.push(att)
					if (att.AP() < 1) {
						// TODO: Might get boosted later
						att.sick = true
						continue
					}
					enemy = p === p1 ? p2 : p1

					// Battle Area
					let prone = mySort(enemy.battle.filter(bc => bc.rested), def => def.HP())
					if (att.traits_eot.includes("canAttack active.unit.damaged")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.damage > 0)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}
					if (att.traits_eot.includes("canAttack active.unit.apEqmin")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.ap <= att.ap)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}
					if (att.traits_eot.includes("canAttack active.unit.ap3min")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.AP() <= 3)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}
					if (att.traits_eot.includes("canAttack active.unit.lv5min")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.level <= 5)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}

					// Base and shields also count as enemy player: https://www.gundam-gcg.com/en/cards/index.php?freeword=GD04-016#cards
					let must_attack_unit = hasText(att.text, "This Unit can't choose the enemy player as its attack target")

					if (prone.length > 0 && (must_attack_unit || enemy.shield.length > can_attack.length || (att.getBreach() && prone.some(def => att.AP() >= def.HP())))) {
						const def = prone[0]
						log("🔫" + att + " attacks " + def)
						rest(att)
						await sleep(500)
						defender = def
						await run(att, "Attack")
						await doBattle(att, def)
						continue
					}
					if (must_attack_unit) {
						continue
					}

					// Shield Area
					if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`noDmgShield enemy.unit.lv[${att.level}-9]`)))) {
						log("🛡️Shield area damage prevented.")
						continue
					}
					if (enemy.base) {
						let target = enemy.base
						log("🔫" + att + " attacks " + target)
						rest(att)
						await sleep(500)
						defender = target
						await run(att, "Attack")
						await doBattle(att, target)
					} else {
						log("🔫" + att + " attacks " + enemy.name)
						if (enemy.shield.length < 1) {
							rest(att)
							let blocked = false
							for (const bc of enemy.battle) {
								if (!bc.rested && bc.hasTrait("Blocker") && !att.hasTrait("High-Maneuver")) {

									rest(bc)
									if (hasText(att.text, "When this Unit is blocked by an enemy Unit that is Lv.4 or lower, it can't receive battle damage during this battle.")) att.traits_eob.push("noDmg enemy.unit")
									await sleep(500)
									await run(att, "Attack")
									defender = bc
									await run(att, "", "blocked")
									await doBattle(att, bc)
									blocked = true
									break
								}
							}
							if (blocked) continue
							await battle(att, enemy.hand[0] || enemy.resource[0])
							log("💀" + enemy.name + " kill by " + att)
							boom.playbackRate = 0.5
							boom.play().catch(ex => { })
							await sleep(2000)
							boom.playbackRate = 1
							endGame(att.owner)
							await render()
							break
						}
						if (enemy.shield.slice(-1)[0].hasTrait("protection.enemy.units")) {
							log("🛡️Shield protected from enemy units")
							continue
						}
						rest(att)
						await battle(att, enemy.shield.slice(-1)[0])
						let sup = att.hasTrait("Suppression")
						if (sup) {
							log("❌Suppression")
						}
						for (let i = 0; i < (sup ? 2 : 1); ++i) {
							await enemy.breakShield()
						}
					}
					// Battle End
					for (const c of p1.battle.concat(p2.battle)) {
						c.ap_eob = 0
						c.traits_eob = []
					}
					for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
						c.ap_eob = 0
						c.traits_eob = []
					}
					p.traits_eob = []
					await render()
				}
				if (game_over) break

				// End phase
				await actionStep()
				while (p.hand.length > 10) p.discard()
				for (const c of p1.battle.concat(p2.battle)) {
					const mo = c.text.match(/<Repair (\d)>/)
					if (mo && c.damage > 0) {
						log("🛠️Repair " + mo[1] + " " + c)
						c.damage -= mo[1]
						if (c.damage < 0) c.damage = 0
					}
					c.ap_eot = 0
					c.traits_eot = []
				}
				for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
					c.ap_eot = 0
					c.traits_eot = []
				}

				p.traits_eot = []
				window.once_per_turn = []
				// wait for untap animation
				await sleep(400)
				await render()
				// log(structuredClone(p))  // clone to keep current lists state
				p = p == p1 ? p2 : p1
			}
		}

		function setGameOver(b) {
			game_over = b
			bstart.disabled = !game_over
			bstop.disabled = game_over
		}

		let deck_stats = {}
		let player_wins = [0, 0]
		function endGame(winner) {
			setGameOver(true)
			let loser = (winner == p1 ? p2 : p1)
			if (winner) {
				player_wins[winner == p1 ? 0 : 1] += 1

				let wdl = deck_stats[winner.deckname] || [0, 0, 0]
				wdl[0] += 1
				deck_stats[winner.deckname] = wdl

				wdl = deck_stats[loser.deckname] || [0, 0, 0]
				wdl[2] += 1
				deck_stats[loser.deckname] = wdl
			}
			let stats = Object.entries(deck_stats).sort((a, b) => a[1] > b[1] ? -1 : a[1] < b[1] ? 1 : 0)
			log(`🏁Game ${game}/${games} over. ${winner.name} beat ${loser.name}.<br>\n${p1.name}: ${player_wins[0]}; ${p2.name}: ${player_wins[1]}<br>\nDecks ranked by W/D/L:`)
			for (let i = 0; i < stats.length; ++i) {
				log(`${1 + i}. ${stats[i][0]}: ${stats[i][1]}`)
			}
			log()
		}

		async function playGames() {
			if (Object.keys(cards).length < 1) await loadCards()
			while (game < games) {
				setSpeed()
				await playGame()
				log(`Finished game ${game}/${games}.`)
				delay = 1
				await render()
				await sleep(400)
			}
			game = 0
		}

		function toggleSettings() {
			if (settings.classList.contains("open")) {
				settings.classList.remove("open")
				return
			}
			settings.classList.add("open")
		}

		playGames()
	</script>
