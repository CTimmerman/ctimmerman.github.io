<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Gundam Card Game implementation by Cees Timmerman, 2026-05-11 - 2026-06-28</title>
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%228 14 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>" />
	<style>
		button,
		html,
		input,
		select {
			--fgcolor: white;
			--bgcolor: black;
			--WHITE: #ffffff;
			--BLUE: #0077bb;
			--PURPLE: #764A92;
			--RED: #bb0055;
			--GREEN: #62A43E;
			--BROWN: #C6A474;
			background-color: var(--bgcolor);
			color: var(--fgcolor);
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			font-family: monospace;
			height: 1.5em;
		}

		a {
			color: var(--fgcolor);
			font-family: monospace;
		}

		button:disabled {
			opacity: 75%;
		}

		input[type=range] {
			vertical-align: middle;
			width: 150px;
		}

		input[type=number]::-webkit-inner-spin-button,
		input[type=number]::-webkit-outer-spin-button {
			-webkit-appearance: visible;
			/* transform: rotate(90deg); */
			/* height: 40px; */
			/* opacity: 50%; */
			filter: invert(100%);
		}

		a:visited {
			color: grey;
		}

		body {
			margin: 0;
		}

		#battlefield {
			background-image: url(GundamPlayMat.png);
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			width: 100vmin;
			height: 100vmin;
		}

		#dlog {
			position: absolute;
			margin: 0 0 0 85vmin;
			width: stretch;
			height: 100vmin;
			overflow-y: scroll;
			scrollbar-width: thin;
			background-color: #08080888;
			border: 1px solid grey;
		}

		#overlay {
			display: none;
			position: absolute;
			font-size: 4vmin;
			z-index: 9000;
			width: 100%;
			height: 100%;
		}

		.pricecheck {
			float: right;
			cursor: help;
			width: 1vmin;
			height: 0.5vmin;
		}

		#settings {
			z-index: 9001;
			position: absolute;
			border: 0px solid #00000000;
			left: 0.5vmin;
			top: 47vmin;
			width: 4vmin;
			height: 4vmin;
			text-align: center;
			overflow: hidden;
			transition: 0.2s;
		}

		#search {
			z-index: 9001;
			position: absolute;
			width: 120vmin;
			/* https://caniuse.com/?search=width%3Astretch */
			height: 100vmin;
			text-align: center;
			overflow: auto;
			transition: 0.1s;
			background-color: #08080888;
			border: 1px solid grey;
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			top: 0vmin;
		}

		#searchtext {
			width: 42vmin;
		}

		#tadecklist {
			width: 65vmin;
			height: 20vmin;
			position: absolute;
			top: 70vmin;
			left: 10vmin;
			scrollbar-width: thin;
			color: var(--fgcolor);
			background-color: #08080888;
		}

		.searchsmall {
			height: 4vmin !important;
			width: 4vmin !important;
			overflow: hidden !important;
			border: 0px solid grey !important;
			top: 47vmin !important;
			left: 5vmin !important;
		}

		.icon {
			cursor: pointer;
			font-size: 3vmin;
		}

		#wheel {
			transition: 0.3s;
		}

		.open #wheel {
			transform: rotate(360deg);
		}

		.open {
			width: auto !important;
			height: auto !important;
			background-color: #08080888;
			border: 1px solid grey !important;
			padding: 0 1em 1em 1em;
		}

		.card {
			background-size: contain;
			background-repeat: no-repeat;
			border: 1px solid var(--BROWN);
			border-radius: 0.6vmin;
			color: yellow;
			cursor: pointer;
			position: absolute;
			width: 10vmin;
			height: 13.96vmin;
			font-size: small;
			text-align: center;
			text-shadow: 1px 1px #08080888;
			transition: 0.1s;
		}

		.facedown {
			background-image: url(sleeve.webp) !important;
			background-color: white !important;
			border-color: black !important;
		}

		.facedown.resource {
			background-image: url(ResourceCardBack.webp) !important;
			background-color: white !important;
		}

		.rested {
			transform: rotate(90deg);
			margin-top: -1.4vmin;
		}

		.rested.resource {
			transform: rotate(70deg);
			margin: auto;
		}
	</style>
</head>

<body>
	<div id="overlay"></div>
	<div id="search" class="searchsmall">
		<div onclick="toggleSearch()" class="icon" title="Search">🔎<label for="searchtext">Search</label></div>
		<input id="searchtext" onchange="findCards(this.value)" placeholder="Supports AND, OR, and NOT.">
		<div id="searchresults"></div>
	</div>
	<div id="battlefield"></div>
	<div id="dlog">
		<a href="https://www.gundam-gcg.com/en/rules/">Gundam Card Game</a><br>
	</div>
	<audio id="pewpew" src="pewpew.opus"></audio>
	<audio id="boom" src="boom.opus"></audio>
	<div id="settings">
		<div id="wheel" class="icon" title="Settings" onclick="toggleSettings()">⚙️</div>
		<div>
			<label for="volume">Volume</label>
			<input id="volume" type="range" value="0.1" min="0" max="1" step="0.1" onchange="setVolume()" /><br>
		</div>
		<div>
			<button id="bstop" onclick="stop = true; setGameOver(true); log(`⛔Stop by user input`)">Stop</button>
			<button id="bstart" disabled="true"
				onclick="if (game_over) { setTimeout(playGames, 0) } else alert('Game in progress')">Start</button>
			<label for="ngames">Games</label> <input id="ngames" type="number" value="1" min="1" max="9999"
				style="width: 45px;" onchange="games = this.value" oninput="clamp(this)" />
			<label for="ndelay">Speed</label> <input id="ndelay" type="number" value="50" min="0" max="100"
				style="width: 40px;" onchange="setSpeed()" oninput="clamp(this)" />%
		</div><br>
		<div>
			<label for="p1deck">P1 deck</label>
			<select id="p1deck" value="-1"></select>
			<br>
			<label for="p2deck">P2 deck</label>
			<select id="p2deck" value="0"></select>
			<br>
			<label for="deckOrder">Decklist order</label>
			<select id="deckOrder" value="TLCN">
				<option value="TLCN">Type, Level, Cost, Name</option>
				<option value="LTCN">Level, Type, Cost, Name</option>
				<option value="CTLN">Cost, Type, Level, Name</option>
			</select>
		</div><br>
		<div><button onclick="dlog.innerHTML=''">Clear log</button></div>
	</div>
	<script>
		"use strict"
		let zoomed = ""

		function dict2str(d) {
			let s = ""
			for (const k in d) s += "" + k + ": " + d[k] + ", ";
			return s
		}

		function clamp(e) {
			let v = parseInt(e.value)
			e.value = parseInt(v > e.max ? e.max : e.value < e.min ? e.min : e.value)
		}

		function setVolume() {
			// complete silence pauses execution while screen is locked
			boom.volume = Math.max(0.005, parseFloat(volume.value))
			pewpew.volume = boom.volume
		}
		setVolume()

		let active_player = null
		let active_unit = null
		let active_text = ""
		let active_cost = 0
		let spent = []
		let attacker = null
		let defender = null
		let destroyer = null
		let once_per_turn = []

		let cards = {}
		// Why doesn't upstream list EXR promos like other promos?
		// "EXR-001_PR", "EXR-001_PR2", "EXR-001_PR3", "EXR-001_PR4", "EXR-001_PR5"
		const EX_RESOURCES = ["EXR-001", "EXRP-001", "EXRP-002"]

		function hasText(body, s) {
			if (!body) return false
			return body.indexOf(s) > -1
		}

		function mySort(arr, fun) {
			return arr.toSorted((a, b) => fun(a) - fun(b))
		}

		function escapeHTML(unsafe) {
			return (unsafe || "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;")
		}
		function unescapeHTML(unsafe) {
			return (unsafe || "")
				.replaceAll("&amp;", "&")
				.replaceAll("&lt;", "<")
				.replaceAll("&gt;", ">")
				.replaceAll("&quot;", '"')
				.replaceAll("&#039;", "'")
		}

		function clear(card) {
			card.ap_eob = 0
			card.ap_eot = 0
			card.damage = 0
			card.hp_eob = 0
			card.hp_eot = 0
			card.rested = false
			card.sick = false
			card.stunned = false
			card.traits_eob = []
			card.traits_eot = []
			card.pilot = null
			card.unit = null
		}

		function toHand(card, fromTrash = false) {
			log(`🎴${card.owner.name} took ${card}`)
			if (fromTrash) card.owner.trash = card.owner.trash.filter(c => c !== card)
			clear(card)
			card.owner.hand.push(card)
			return true
		}

		function bounce(card) {
			// log("🔙Bounce " + card)
			card.owner.battle = card.owner.battle.filter(c => c !== card && c !== card.pilot)
			if (card.pilot) toHand(card.pilot)
			toHand(card)
		}

		function exile(cards) {
			for (const card of cards) {
				const p = card.owner
				log(`♻️${card.owner.name} exiles ${card} from trash`)
				p.trash = p.trash.filter(c => !cards.includes(c))
			}
		}

		function trash(card) {
			clear(card)
			card.owner.trash.push(card)
		}

		async function destroy(card) {
			if (!card) return false
			log("💥Destroy " + card)
			if (hasText(card.type, "BASE")) {
				card.owner.base = null
			} else {
				card.owner.battle = card.owner.battle.filter(c => c !== card)
			}
			await run(card, "Destroyed")
			if (card.pilot) trash(card.pilot)
			// tokens don't go to trash
			if (card.type.indexOf("TOKEN") < 0 && card.type.indexOf("EX") !== 0) trash(card)
			await render()
			await boom.play().catch(ex => { })
			await sleep(500)
			return true
		}

		let delay = 1
		let maxDelay = 2
		function setSpeed() {
			delay = maxDelay - maxDelay * parseFloat(ndelay.value) / parseFloat(ndelay.max)
			boom.playbackRate = Math.max(1, 2 * parseFloat(ndelay.value) / parseFloat(ndelay.max))
			pewpew.playbackRate = boom.playbackRate
		}
		setSpeed()
		async function sleep(ms = 1000) {
			do {
				await new Promise(r => setTimeout(r, delay * ms))
			} while (delay === maxDelay)
		}

		function getel(card) {
			return document.getElementById("c" + card.cid)
		}

		function activate(card, effect = false) {
			if (card.stunned) {
				card.stunned = false
				return
			}
			card.rested = false
			if (card.pilot) card.pilot.rested = false
			if (effect) {
				log("🎯Activate " + card)
				run(card, "", " is set as active by an effect, ")
			}

			if (delay === 0) return
			try {
				getel(card).classList.remove("rested")
				if (card.pilot) getel(card.pilot).classList.remove("rested")
			} catch (ex) {
				// Not rendered yet.
			}
		}

		function rest(card, effect = true) {
			if (effect) log("💤Rest " + card)
			card.rested = true
			if (card.pilot) card.pilot.rested = true
			if (delay === 0) return
			try {
				getel(card).classList.add("rested")
				if (card.pilot) getel(card.pilot).classList.add("rested")
			} catch (ex) {
				// Not rendered yet.
			}
		}

		async function battle(att, def) {
			if (delay === 0) return
			await render()
			/* Too much hassle to move the pilots at well
			const e = getel(att)
			const old_top = e.style.top
			const old_left = e.style.left
			const e2 = getel(def)
			e.style.top = e2.style.top
			e.style.left = e2.style.left
			await sleep(800)
			e.style.top = old_top
			e.style.left = old_left
			*/
			const sa = getel(att).style
			const sd = getel(def).style
			let x1 = parseFloat(sa.left) + 5
			let y1 = parseFloat(sa.top) + 5
			let x2 = parseFloat(sd.left) + 5
			let y2 = parseFloat(sd.top) + 5
			// Laser time!
			overlay.style.display = "block"
			overlay.innerHTML = `<svg id="boardbg" style="height:100vmin;width:100vmin">
				<line x1="${x1}vmin" y1="${y1}vmin" x2="${x2}vmin" y2="${y2}vmin" stroke="white" stroke-width="4px" stroke-linecap="round">
					<animate attributeName="stroke" values="#880;#fff;#880;" dur="0.2s" repeatCount="indefinite"/>
					<animate attributeName="stroke-width" values="2px;8px;2px;" dur="0.2s" repeatCount="indefinite"/>
				</line>
			</svg>`
			// vfx
			await sleep(400)
			// sfx
			await pewpew.play().catch(ex => { })
			overlay.style.display = "none"
		}

		function showDeck(name) {
			window.pause = (window.pause || 0) + 1
			let html = `<div onclick="overlay.style.display = 'none'; window.pause = 0" style="width:100%; height:100%; background-color: #08080888">`
			overlay.style.display = "block"
			let decklist = ""
			for (decklist of decks) {
				if (hasText(decklist.split("\n")[0], name)) {
					break
				}
			}
			let oldcid = cid
			let fulldeck = []
			let deckname = "Anonymous deck"

			const lines = decklist.split("\n")
			const colors = []
			for (const line of lines) {
				if (line.indexOf("# ") === 0) {
					deckname = line.slice(2)
				}
				const [count, id] = line.split(" ")
				if (count >= 1) {
					for (let i = 0; i < count; ++i) {
						const c = p1.getCard(id)
						fulldeck.push(p1.getCard(id))
						if (!colors.includes(c.color)) colors.push(c.color)
					}
				}
			}
			html += deckname
			if (colors.length > 2) alert("Deck colors > 2: " + colors)
			if (fulldeck.length !== 50) alert("Deck length not 50: " + fulldeck.length)

			let deck = fulldeck.toSorted(
				(a, b) => {
					for (const c of deckOrder.value) {
						if (c === "T") {
							if (a.type > b.type) return 1
							if (a.type < b.type) return -1
						} else if (c === "L") {
							if (a.level > b.level) return 1
							if (a.level < b.level) return -1
						} else if (c === "C") {
							if (a.cost > b.cost) return 1
							if (a.cost < b.cost) return -1
						} else if (c === "N") {
							if (a.name > b.name) return 1
							if (a.name < b.name) return -1
						}
					}
					return 0
				}
			)
			const cols = deckOrder.value[0]
			let spliton = cols === "T" ? deck[0].type : cols === "L" ? deck[0].level : deck[0].cost
			let left = 10
			let top = 10
			let sumCost = 0
			let sumLevel = 0
			let text = ""
			let idcount = 0
			let oldc = null
			for (const c of deck) {
				if (!oldc || c.id !== oldc.id) {
					if (oldc && oldc.id !== c.id) text += `${idcount} ${oldc.id} ${oldc.name}\n`
					idcount = 1
					oldc = c
				} else idcount += 1
				sumCost += c.cost
				sumLevel += c.level
				if ((cols === "T" && spliton !== c.type)
					|| (cols === "L" && spliton !== c.level)
					|| (cols === "C" && spliton !== c.cost)) {
					spliton = cols === "T" ? c.type : cols === "L" ? c.level : c.cost
					left += 11
					top = 10
				}
				html += c.toHTML(left, top, false, 0, true)
				top += 4
				if (top > 54) {
					left += 11
					top = 10
				}
			}
			overlay.innerHTML = html + `<br>avg cost ${(sumCost / 50).toFixed(2)}; avg level ${(sumLevel / 50).toFixed(2)}
<textarea id="tadecklist" onclick="event.stopPropagation()">${text}${idcount} ${oldc.id} ${oldc.name}\n</textarea></div>`
		}

		function zoom(e) {
			zoomed = e
			event.preventDefault()
			event.stopPropagation()
			if (hasText(e.style.transform, "scale")) {
				e.style.transform = e.old_transform
				e.style.zIndex = e.old_zIndex
				e.style.top = e.old_top
				e.style.left = e.old_left
				if (window.pause && window.pause > 0) window.pause -= 1
			} else {
				e.old_transform = e.style.transform
				e.old_zIndex = e.style.zIndex
				e.old_top = e.style.top
				e.old_left = e.style.left

				e.style.transform = "scale(5)"
				e.style.zIndex = 9000
				if (parseInt(e.old_top) < 40) e.style.top = "40vmin"
				e.style.left = "40vmin"
				window.pause = (window.pause || 0) + 1
			}
		}

		function log(s = "") {
			if (delay > 0 || hasText(s, " start:")) {
				dlog.innerHTML += s + "<br>"
				dlog.scrollTop = dlog.scrollHeight
			}
			if (hasText("" + s, "FIXME")
				|| hasText("" + s, "o link")
			) console.log(s)
		}

		function rnd(min, max) {
			return Math.floor(min + Math.random() * (1 + max - min))
		}

		function rndPick(arr) {
			return arr[Math.floor(Math.random() * arr.length)]
		}
		// var Type;
		// (function (Type) {
		// 	Type[Type["RESOURCE"] = 0] = "RESOURCE";
		//     Type[Type["BASE"] = 1] = "BASE";
		//     Type[Type["COMMAND"] = 2] = "COMMAND";
		//     Type[Type["PILOT"] = 3] = "PILOT";
		// 	Type[Type["UNIT"] = 4] = "UNIT";
		// 	Type[Type["UNITTOKEN"] = 5] = "UNITTOKEN";	
		// })(Type || (Type = {}));

		function getPilotName(card) {
			if (card.type === "PILOT") {
				let brace = card.name.indexOf(" (")
				if (brace > -1) return card.name.slice(0, brace)
				return card.name
			}
			let rv = getSectionText(card, "Pilot")
			return rv.slice(1, rv.indexOf(" ("))
		}

		async function pair(unit, pilot) {
			log(`🧑‍✈️Pair ${pilot.AP()}/${pilot.HP()} #${pilot.cid} ${getPilotName(pilot)} with ${unit}`)
			unit.pilot = pilot
			pilot.unit = unit
			await render()
			await run(unit, "When Paired")
			await publish("When you pair ", active_player.battle)
			// await run(unit, "During Pair")
			if (unit.link && linksWith(unit, pilot)) {
				log("🔗Link")
				unit.sick = false
				await run(unit, "When Linked")
				active_unit = unit
				await run(unit.owner.base, "", " Unit links, ")
				// await run(unit, "During Link")
			}
		}

		function linksWith(unit, pilot) {
			if (!pilot) return false
			let pilot_name = getPilotName(pilot)
			for (let part of unit.link.split(" / ")) {
				if (part === `[${pilot_name}]`) return true // (Neil)
				if (part === `[${pilot.name}]`) return true // (Machu)
				if (pilot_name === "Quattro Bajeena" && part === "Char Aznable") return true
				if (hasText(part, " Trait")) part = part.slice(0, -6)
				if (unit.hasTrait(part.slice(1, -1))) return true
			}
			return false
		}

		class Card {
			constructor(type = "UNIT",
				name = "",
				ap = 0,
				hp = 0,
				level = 0,
				cost = 0,
				text = "",
				zones = [],
				traits = [],
				link = "",
				id = "",
				color = "BROWN") {
				this.id = id
				this.color = ["WHITE", "BLUE", "PURPLE", "RED", "GREEN"].indexOf(color) >= 0 ? color : "BROWN"
				this.level = parseInt(level) || 0
				this.cost = parseInt(cost) || 0
				// let type_num = parseInt(type) || type === 0? Type.RESOURCE : Type.UNITTOKEN
				// if (Type[type]) {
				// 	// number or string, we want number here
				// 	type_num = parseInt(type)? type : Type[type]
				// }
				this.type = type || ""
				this.name = name || ""
				this.text = unescapeHTML(text || "")
				this.zones = zones || []
				this.traits = traits || []  // new for each, unlike in Python
				this.traits_eob = []
				this.traits_eot = []
				this.link = link || ""
				this.ap = parseInt(ap) || 0
				this.ap_eob = 0
				this.ap_eot = 0
				this.hp_eob = 0
				this.hp_eot = 0
				this.hp = parseInt(hp) || 0
				this.damage = 0
				this.rested = false
				this.sick = false
				this.stunned = false
			}
			LEVEL() {
				let rv = this.level
				if (this.owner.hand.includes(this)) {
					if (this.text === "While you have no Units that are Lv.6 or higher in play, this card in your hand gets Lv. -1 and cost -1 for each enemy Unit in play." && !this.owner.battle.some(c => c.level >= 6)) {

						rv -= this.owner.trash.filter(c => c.type === "COMMAND" && c.hasTrait("UN") || c.hasTrait("Superpower Bloc")).length
					}
					if (this.text === "While you have a (CB) Link Unit in play, this card in your hand gets cost -1." && this.owner.battle.some(c => c.hasTrait("CB") && c.linked())) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Titans) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.hasTrait("Titans")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Earth Federation) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.hasTrait("Earth Federation")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Superpower Bloc)/(UN) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.hasTrait("Superpower Bloc") || c.hasTrait("UN")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have no Units that are Lv.6 or higher in play, this card in your hand gets Lv. -1 and cost -1 for each enemy Unit in play." && !this.owner.battle.some(c => c.level >= 6)) {
						rv -= (this.owner === p1 ? p2 : p1).battle.length
					}
				} else if (this.owner.trash.includes(this)) {
					if (this.text === "This card in your trash gets cost -1.") {
						rv -= 1
					}
				}
				return Math.max(0, rv)
			}
			AP() {
				let rv = this.ap + this.ap_eob + this.ap_eot
				const t = this.text + (this.pilot && this.pilot.text || "")
				
				if (this.owner.resource.length >= 7 && hasText(t, "While you are Lv.7 or higher, this Unit gets AP+2.")) rv += 2
				if (this.damage > 0 && hasText(t, "While this Unit is damaged, it gets AP+2.")) {
					rv += 2
				}
				if (this.pilot) {
					rv += this.pilot.ap
					if (this.linked()) {
						if (hasText(t, "【During Link】 This Unit gets AP+2.")) rv += 2
						if (hasText(t, "【During Link】 This Unit gets AP+1 and HP+1.")) rv += 1
					}
				}

				if (hasText(t, "While you have another (Titans) Unit in play, this gets AP+1.") && this.owner.battle.some(c => c !== this && c.hasTrait("Titans"))) rv += 1
				if (hasText(t, "While you have another (Triple Ship Alliance) Unit in play, this Unit gets AP+1 and <Blocker>.") && this.owner.battle.some(c => c !== this && c.hasTrait("Triple Ship Alliance"))) rv += 1
				if (hasText(t, "While you have another Unit with <High-Maneuver> in play, this Unit gets AP+1.") && this.owner.battle.some(c => c !== this && c.hasTrait("High-Maneuver"))) rv += 1
				if (hasText(t, "While there is a friendly white Base in play, this Unit gets AP+2.") && this.owner.base && this.owner.base.color === "WHITE") rv += 2
				if (hasText(t, "While no enemy Base is in play, this Unit gets AP+1.") && !(this.owner == p1 ? p2 : p1).base) rv += 1
				if (hasText(t, "While you have another (Jupitris) Unit in play, this Unit gets AP+1 and <Repair 1>.") && this.owner.battle.some(c => c !== this && c.hasTrait("Jupitris"))) rv += 1
				if (t === "During your turn, while you have a (CB) Pilot in play, this Unit gets AP+2." && active_player === this.owner && this.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) rv += 2
				if (hasText(t, "【During Link】This Unit gets AP+2 for each of your rested (CB) Units.") && this.linked()) rv += this.owner.battle.filter(c => c.rested && c.hasTrait("CB")).length * 2
				if (hasText(t, "While you have a Unit token in play, this Unit gets AP+1.") && this.owner.battle.some(c => hasText(c.type, "TOKEN"))) rv += 1
				if (active_player === this.owner && hasText(this.type, "UNIT")) {

				}

				for (const c of this.owner.battle) {
					if (active_player == this.owner && this.owner.trash.length >= 7 && c !== this && this.hasTrait("Vulture") && hasText(t, "【During Link】During your turn, while there are 7 or more cards in your trash, all your other (Vulture) Units get AP+2.") && c.linked()) rv += 2
				}

				if (def.traits_eob.some(txt => txt.match(new RegExp(`noDmg enemy.unit.lv[${this.level}-9]min`)))) return false
				if (def.traits_eot.some(txt => txt.match(new RegExp(`noDmg enemy.unit.ap[${this.level}-9]min`)))) return false
				if (def.traits_eot.some(txt => txt.match(new RegExp(`noDmg enemy.unit.lv[${this.level}-9]min`)))) return false
				return true

					if (hasText(t, "While you have a (CB) Pilot in play, this Unit gains <Blocker>.")) {

					if (hasText(t, "While 3 or more enemy Units are in play, this Unit gains <Blocker>.") && (this.owner == p1 ? p2 : p1).battle.length >= 3) return true
					if (hasText(t, "While this Unit has 5 or more AP, it gains <Blocker>.") && this.AP() >= 5) return true

				}
				if (trait === "First Strike") {

		function shuffle(array) {
			let m = array.length, t, i
			while (m) {
				i = Math.floor(Math.random() * m--)
				t = array[m]
				array[m] = array[i]
				array[i] = t
			}
		}

		let pid = 0
		class Player {
			loadDeck(deck) {
				this.deckname = "Anonymous deck"
				this.deck = []
				this.fulldeck = []
				const lines = deck.split("\n")
				const colors = []
				const counts = {}
				for (const line of lines) {
					if (line.indexOf("# ") === 0) {
						this.deckname = line.slice(2)
						log(`🎴${this.name} deck: <a href="#" onclick='showDeck(\"${escapeHTML(this.deckname)}\"); event.preventDefault()'>${this.deckname}</a>`)
					}
					const [count, id] = line.split(" ")
					if (count >= 1) {
						for (let i = 0; i < count; ++i) {
							const c = this.getCard(id)
							c.owner = this
							this.deck.push(c)
							this.fulldeck.push(this.getCard(id))
							if (!colors.includes(c.color)) colors.push(c.color)
							counts[id] = (counts[id] || 0) + 1
							if (counts[id] > 4) throw Error("Max 4 of " + id)
						}
					}
				}
				if (colors.length > 2) throw Error("Deck colors > 2: " + colors)
				if (this.deck.length !== 50) throw Error("Deck length not 50: " + this.deck.length)
				shuffle(this.deck)
			}

			constructor(name) {
				this.pid = ++pid
				this.name = name
				this.hand = []
				let deck = null
				if (pid === 1) deck = p1deck.value < 0 ? decks[rnd(0, decks.length - 1)] : decks[p1deck.value]
				if (pid === 2) deck = p2deck.value < 0 ? decks[rnd(0, decks.length - 1)] : decks[p2deck.value]

				this.loadDeck(deck)
				// Maybe still useful for fuzzing.
				// for (let i = 0; i < 50; ++i) {
				// 	const t = Type[rnd(1, 4)]
				// 	this.deck.push(new Card(t, t+i, rnd(1, 5), rnd(1, 5), rnd(1, 7), rnd(1, 5), "", "", "ST04-008_PR", "RED"))
				// }
				this.resource_deck = []
				for (let i = 0; i < 10; ++i) {
					// R-003 is hard to count while rested
					this.resource_deck.push(this.getCard("R-00" + rnd(4, 9)))
				}
				this.battle = []
				this.shield = []
				this.base = this.getCard("EXB-001")  // new Card("BASE", "EX Base", 0, 3)
				this.resource = []
				this.trash = []
				this.traits_eob = []
				this.traits_eot = []

				// Opening hand
				this.draw(5, false)
				// Shields
				for (let i = 0; i < 6; ++i) {
					const c = this.deck.pop()
					c.rested = true
					this.shield.push(c)
				}
			}

			async breakShield() {
				const c = this.shield.pop()
				if (!c) return false
				log(`💥Broke shield ${this.shield.length + 1}: ${c}`)
				activate(c)
				await boom.play().catch(ex => { })
				let toTrash = true
				let t = /Burst】([^.]+)/.exec(c.text)
				if (t) {
					t = t[1]
					await run(c, "Burst")
					toTrash = !(hasText(t, "Add this card to your hand") || hasText(t, "Deploy this card"))
				}
				if (toTrash) {
					// log("🗑️Trash " + c)
					trash(c)
				}
				await render()
				await sleep(1000)
				return true
			}

			canUse(c) {
				return (c.LEVEL() < this.resource.length && c.COST() < this.resource.length) &&
					((c.type === "BASE" && !this.base)
						|| (c.type === "UNIT" && this.battle.length < 6)
						|| (c.type === "PILOT" && this.battle.some(c2 => !c2.pilot && linksWith(c, c2)))
					)
			}

			async deploy(card) {
				if (card.type.indexOf("UNIT") < 0) throw Error("Not a unit: " + card)
				if (this.battle.length >= 6) {
					const weakest = mySort(this.battle, c => c.AP())[0]
					await destroy(weakest)
				}
				if (card.LEVEL() <= 3 && card.type == "UNIT" && p1.battle.concat(p2.battle).some(c => hasText(c.text, "All Units that are Lv.3 or lower other than Unit tokens are deployed rested.") && c.linked())) card.rested = true
				log(`🚀Deploy ${card.rested ? "rested " : ""}${card}`)
				card.sick = true
				card.damage = 0
				this.battle.push(card)
				this.traits_eot.push("Deployed " + card.traits)
			}

			async deployFromTrash(card) {
				this.trash = this.trash.filter(c => c !== card)
				card.from_trash = true
				await this.deploy(card)
				card.from_trash = false
			}

			draw(number = 1, effect = true) {
				if (effect) publish("When you draw with an effect, ", active_player.battle)
				number = parseInt(number)
				log("🎴" + this.name + " draw " + number)
				for (let i = 0; i < number; ++i) {
					if (this.deck.length < 1) {
						endGame(this === p1 ? p2 : p1)
						throw Error("💀" + this.name + " lost by empty deck")
					}
					this.hand.push(this.deck.pop())
				}
			}

			discard(number = 1) {
				number = parseInt(number)
				for (let i = 0; i < number; ++i) {
					const c = this.hand[Math.floor(Math.random() * this.hand.length)]
					if (!c) return
					log("🗑️" + this.name + " discards " + c)
					this.hand = this.hand.filter(item => item !== c)
					this.trash.push(c)
				}
			}

			getCard(id) {
				const d = cards[id]
				if (!d) {
					const msg = "Card not found: " + id
					log(msg)
					throw Error(msg)
				}
				const rv = Card.fromDict(d)
				// DeckPlanet bug workarounds. See also cards.json.
				rv.text = rv.text.replaceAll("<br />", "<br>").replaceAll("[action]", "【Action】").replaceAll("[br]", "<br>").replaceAll("[burst]", "【Burst】").replaceAll("[breach 3]", "【Breach 3】").replaceAll("[deploy]", "【Deploy】").replaceAll("[main]", "【Main】").replaceAll("[pilot]", "【Pilot】").replaceAll("[when paired]", "【When Paired】")

				cid += 1
				rv.cid = cid
				rv.owner = this
				return rv
			}

			getPairableUnits() {
				return this.battle.filter(c => !c.pilot && !hasText(c.text, "This Unit can't be paired with a Pilot."))
			}

			getToken(name) {
				// Yes, names are not unique.
				for (const k in cards) if (cards[k].name === name && hasText(cards[k].type, "TOKEN")) return this.getCard(k)
			}

			mill(number) {
				const top = this.deck.slice(-number)
				this.deck = this.deck.slice(0, -number)
				this.trash = this.trash.concat(top)
				return top
			}

			async paid(cost, card, text = "") {
				if (spent.length > 0) log(`💲Expend ${spent.length} EX resource`)
				log(`💲Pay ${cost} for ${text ? text + " of " : ""}${card}`)
				active_unit = card
				active_text = text
				active_cost = cost
				await publish("hen you pay ", this.battle.concat(this.base))
				active_unit = null
				active_text = ""
				active_cost = 0
			}

			/** Only log if payment won't be refunded! */
			async pay(cost, target, doLog = true, text = "") {
				spent = []
				cost = parseInt(cost)
				if (cost > this.resource.filter(r => !r.rested).length) return false
				let paid = 0
				// EX last
				for (const r of mySort(this.resource.filter(c => !c.rested), c => c.type.indexOf("EX"))) {
					rest(r, false)
					paid += 1
					if (hasText(r.type, "EX")) {
						spent.push(r)
						this.resource = this.resource.filter(item => item !== r)
						// Wait for rest animation and show gone.
						await sleep(300)
						await render()
					}
					if (paid >= cost) break
				}
				if (doLog) await this.paid(cost, target, text)
				return true
			}
		}

		async function render() {
			if (delay === 0) return
			while (window.pause) await sleep(1000)
			let html = ""
			for (const p of [p1, p2]) {
				let x = 0
				let y = 0

				let left = 0

					left = 2

					if (p === p2) {

			defender = def
			const enemy = att.owner === p1 ? p2 : p1
			log("🔫" + att + " attack " + (def ? "" + def : enemy.name))
			rest(att, false)
			await sleep(500)
			await run(att, "Attack")

			// Block Step
			let blocked = false
			for (const bc of enemy.battle) {
				if (!bc.rested && bc.hasTrait("Blocker") && !att.hasTrait("High-Maneuver")) {
					// Don't block if...
					if (defender) {
						if (defender.HP() > attacker.AP() || defender.AP() >= attacker.HP()) continue
					}
					log(`🛡️${bc} blocks ${att}`)
					rest(bc, false)
					defender = bc
					await sleep(500)
					await run(att, "", "blocked")
					break
				}
			}

			// Action Step
			await actionStep()

			// Player or shield
			if (!defender || defender.facedown) {
				if (enemy.shield.length < 1) {
					await battle(att, enemy.hand[0] || enemy.resource[0])
					log("💀" + enemy.name + " died")
					boom.playbackRate = 0.5
					await boom.play().catch(ex => { })
					await sleep(2000)
					boom.playbackRate = 1
					endGame(att.owner)
					await render()
					return
				} else {
					await battle(att, enemy.shield.slice(-1)[0])
					let sup = att.hasTrait("Suppression")
					if (sup) {
						log("❌Suppression")
					}
					for (let i = 0; i < (sup ? 2 : 1); ++i) {
						await enemy.breakShield()
					}
				}
				return
			}
			// Action step before this to change defender!
			await doBattle(att, defender)
		}

		function eobAP(unit, amount) {
			log(`🎯AP+${amount} EOB ${unit}`)
			unit.ap_eob += parseInt(amount)
		}
		function eobHP(unit, amount) {
			log(`🎯DMG-${amount} EOB ${unit}`)
			unit.hp_eob += parseInt(amount)
		}
		function eobTrait(unit, trait) {
			log(`🎯+${trait} EOB ${unit}`)
			unit.traits_eob.push(trait)
		}
		function eotAP(unit, amount) {
			log(`🎯AP+${amount} EOT ${unit}`)
			unit.ap_eot += parseInt(amount)
		}
		function eotHP(unit, amount) {
			log(`🎯HP+${amount} EOT ${unit}`)
			unit.hp_eot += parseInt(amount)
		}
		function eotTrait(unit, trait, note = true) {
			if (note) log(`🎯+${trait} EOT ${unit}`)
			unit.traits_eot.push(trait)
		}

		// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf section 9.
		// [Action] COMMAND cards and [Activate-Action] effects.
		async function actionStep() {
			// log("Action step")
			await render()
			let p = active_player
			let pass = 0
			while (pass < 2) {
				p = (p === p1 ? p2 : p1)
				let level = p.resource.length
				let ran = false
				const targets = p.hand.filter(c => c.type === "COMMAND").concat(p.battle).concat(p.base)
				shuffle(targets)
				for (const c of targets) {
					if (!c) continue
					let cost = c.COST()
					let refund = false
					if (c.type === "COMMAND") {
						if (c.LEVEL() > level || cost > level) continue
						if (await p.pay(cost, c, false)) {
							p.hand = p.hand.filter(item => item !== c)
							if (await run(c, "Action")) {
								ran = true
								c.owner.trash.push(c)
								await render()
								await p.paid(cost, c)  // log payment
							} else {
								refund = true
							}
						}
					} else {
						await run(c, "Activate･Action")
					}
					if (refund) {
						// No useful target, so don't play this and roll back payment.
						if (cost > 0) {
							let r = null
							while (r = spent.pop()) {
								r.rested = false
								p.resource.push(r)
								--cost
							}
							await render()
							for (let i = 0; i < cost; ++i) {
								activate(p.resource[i])
							}
						}
						p.hand.push(c)
					}
					spent = []
				}
				if (ran) pass = 0
				else pass += 1
			}
		}

		function getDamage(att, def) {
			if (!att.canDamage(def)) return 0
			let damage = Math.max(0, att.AP())
			if (hasText(def.text, "If you have a (CB) Pilot in play, when this Unit receives damage from an enemy, reduce it by 1.") && def.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) {
				if (damage > 0) damage -= 1
			}
			return damage
		}

		function chooseDmgTarget(source, targets, amount = 1, mandatory = false, kill = true) {
			targets = mySort(targets, c => kill ? c.HP() : -c.HP() - 9 * (c.damage < 1 && hasText(c.text, "is damaged")))
			if (!mandatory) targets = targets.filter(c => kill ? source.canDamage(c) : !source.canDamage(c))
			return (kill && mySort(targets.filter(c => c.HP() === amount), c => c.rested))[0] || targets[0]
		}

		async function doBattle(att, def) {
			attacker = att
			defender = def
			for (const trait of def.traits_eot) {
				const mo = trait.match(/redirect_battle_damage (\d+)/)
				if (mo) {
					for (const c of def.owner.battle) {
						if (c.cid == mo[1]) {
							log("↪Damage redirect to " + c)
							defender = c
						}
					}
				}
			}
			def = defender
			if (def.HP() < 1) {
				// Action or attack trigger could have killed it. TODO: vfx that instead?
				return
			}
			// Damage Step
			// vfx to show defender
			await battle(att, def)
			let afs = att.hasTrait("First Strike")
			let dfs = def.hasTrait("First Strike")
			let dmg_to_def = getDamage(att, def)
			let dmg_to_att = getDamage(def, att)
			if (dfs && !afs && dmg_to_att > att.HP()) {
				// att dies before dealing battle damage
			} else {
				// CR 10-1-6-6. If multiple effects belonging to both you and your opponent trigger, 
				// they do so simultaneously, and all of the active player’s triggered 
				// effects are resolved first, after which all of the standby player’s 
				// triggered effects are resolved.
				if (dmg_to_def > 0) {
					def.damage += dmg_to_def
					await run(att, "", "When this Unit deals battle damage")
				}
				// TODO Undying etc.
				if (def.owner.trash.includes(def) || def.HP() < 1) {
					def.traits_eob.push("dead")
					if (hasText(def.type, "UNIT")) {
						const breach = att.getBreach()
						if (breach) {
							if (def.owner.base) {
								log("➤Breach " + breach)
								await dealDamage(att, def.owner.base, breach)
							} else if (def.owner.shield.length > 0) {
								log("➤Breach " + breach)
								await def.owner.breakShield()
							}
						}
					}
					destroyer = att
					await destroy(def)
					if (hasText(def.type, "UNIT")) {
						await publish(" destroys an enemy Unit with battle damage, ", att.owner.base ? [att, att.owner.base] : [att])

						// TODO: getSectionText should handle this
						for (const trait of att.owner.traits_eot) {
							if (trait === "During this turn, if a friendly (Superpower Bloc)/(UN) Unit destroys an enemy Unit with battle damage, choose 1 rested friendly (Superpower Bloc)/(UN) Unit. Set it as active. It can't attack during this turn." && (att.hasTrait("Superpower Bloc") || att.hasTrait("UN"))) {
								const target = att.owner.battle.filter(c => c.rested && (c.hasTrait("Superpower Bloc") || c.hasTrait("UN")))[0]
								if (target) {
									activate(target)
									target.sick = true
								}
							}
						}
					}
				}
			}
			if (afs && def.hasTrait("dead")) dmg_to_att = 0
			if (dmg_to_att > 0) {
				att.damage += dmg_to_att
				await run(def, "", "When this Unit deals battle damage")
			}
			if (att.HP() < 1 && !att.owner.trash.includes(att)) {
				await destroy(att)
				if (hasText(def.type, "UNIT")) {
					await publish(" destroys an enemy Unit with battle damage, ", def.owner.base ? [def, def.owner.base] : [def])
				}
			}

			// End of Battle Step
			for (const c of p1.battle.concat(p2.battle)) {
				c.ap_eob = 0
				c.hp_eob = 0
				c.traits_eob = []
			}
			for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
				c.ap_eob = 0
				c.hp_eob = 0
				c.traits_eob = []
			}
			att.owner.traits_eob = []
			def.owner.traits_eob = []
			defender = null
			attacker = null
			await render()
		}

		async function dealDamage(source, target, amount = 1) {
			if (!target) return false
			amount = Math.max(0, parseInt(amount) - target.hp_eob)
			if (target.hp_eot > 0) {
				amount -= target.hp_eot
				target.hp_eot = Math.max(0, target.hp_eot - amount)
			}
			log(`🎯${source} deals ${amount} effect damage to ${target}`)
			if (amount > 0) {
				target.effect_damage = amount
				await run(target, "When this Unit receives effect damage from an enemy, ")
				target.damage += Math.max(0, target.effect_damage)
				if (target.HP() < 1) await destroy(target)
			}
			return true
		}

		function getSectionText(card, act = "Main", clause = "", limit = true) {
			// debug card
			// if (card.id === "GD04-087" && act == "Attack") {
			// 	log("FIXME: DEBUG " + act + " " + clause + " " + card)
			// }
			let mo = null
			const rex = new RegExp("(.*?)" + (clause ? clause : ("【([^】]*?)" + act + "([^】]*?)】")) + "([^.].+?)(?:<br|$)")
			for (let line of card.text.split("<br>")) if (mo = line.match(rex)) break
			else for (let line of card.traits_eot) if (mo = line.match(rex)) break
			if (!mo) return ""
			const limits = mo[1]
			if (hasText(limits, "During your turn") && active_player !== card.owner) return ""
			if (hasText(limits, "During Pair") && !(card.pilot || card.unit)) return ""
			if (hasText(limits, "During Link") && !card.linked()) return ""
			const limits2 = mo[2]
			const limits3 = mo[3]
			const text = mo.length === 3 ? mo[2] : mo[4]
			// if ((act === "During Pair" || act === "During Link") && (text.indexOf("【") === 0 || text.indexOf("During") === 0 || text.indexOf("When") === 0)) return ""

			let l3ok = !limits3
			let mo2 = null
			if (!l3ok) {
				// 【When Paired･(Cyber-Newtype)/(Newtype) Pilot】
				mo2 = limits3.match(/^･\((.+)\) Pilot$/)
				if (mo2 && (!card.pilot || !mo2[1].split(")/(").some(part => card.pilot.hasTrait(part)))) {
					// log(`🚫No link; ${card.pilot.traits} not in ${mo2[1]}`)
					return ""
				}
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(\d) or Higher Pilot$/)
				if (mo2 && !card.pilot.level >= parseInt(mo2[1])) return ""
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(\d) or Lower Pilot$/)
				if (mo2 && !card.pilot.level <= parseInt(mo2[1])) return ""
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(White|Blue|Purple|Red|Green) Pilot$/)
				if (mo2 && !card.pilot.color === mo2[1]) return ""
				l3ok = true
			}

			if (act != "Pilot") {
				if ((mo.length > 3 && limits2 && limits2 !== "Activate･") || !l3ok) log(`🚩FIXME: ${card} ACT${act}/CLAUSE${escapeHTML(clause)} LIMITS2` + escapeHTML(limits2) + "LIMITS3" + escapeHTML(limits3) + " MO" + escapeHTML("" + mo) + " TEXT" + text + " MO2" + mo2)
			}
			if (limit && once_per_turn.includes(text + card.cid)) return ""
			return text
		}
		/** runs card and pilot text */
		async function run(card, act = "Main", clause = "") {
			if (!card) return false
			if (card.type === "COMMAND") {
				// log("DEBUG Running " + card + " " + act + " " + clause)
			}
			let rv = await runCard(card, act, clause)
			if (card.pilot && card.pilot.type === "PILOT") {
				rv = rv | await runCard(card.pilot, act, clause)
				// if (!rv && hasText(clause, " deals damage to an ")) {
				// 	log("FIXME: SHOULD HAVE RAN " + card.pilot.name + " TEXT? act: " + act + " clause: " + clause + " text: " + getSectionText(card.pilot, act, clause) + " defender: " + defender)
				// 	await runCard(card.pilot, act, clause)
				// }
			}
			return rv
		}
		/** runs events */
		async function publish(clause, cards) {
			for (const c of cards) await run(c, "", clause)
		}
		/** logs ran */
		async function runCard(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t) return false
			let rv = await runCard2(card, act, clause)
			const context = (act && hasText(card.text, "Activate･" + act)) ? " " + card : ""
			if (rv || act === "Burst") {
				log(`⚡Ran${context} ${(act || clause)}: ${escapeHTML(t)}`)
				if (card.type === "COMMAND" && ["Action", "Main"].includes(act)) await publish("When you activate a Command's 【Main】/【Action】 effect, ", card.owner.battle)
			}
			return rv
		}
		async function runCard2(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t) {
				// if (clause || hasText(card.text, act)) log(`🚩No act ${act} or clause "${escapeHTML(clause)}" found in ${card.id} ${escapeHTML(card.text)}`)
				return false
			}
			// if (t === "Add 1 of your Shields to your hand. Then, if it is your turn, look at the top 2 cards of your deck and return 1 to the top. Place the remaining card into your trash.") {
			// 	log("FIXME: breakpoint")
			// }
			const p = card.owner
			const en = (p === p1 ? p2 : p1)
			const myturn = (active_player === p)
			const fu = p.battle
			const eu = mySort(en.battle, c => -c.COST())
			// make sure to apply effects to the unit card
			const u = card.unit || card
			let targets = []
			let target = null
			let mo = null

			// debug card rules
			if (card.id === "GD04-025" && act == "Destroyed") {
				// breakpoint here
				// log("FIXME: DEBUG " + act + " " + clause + " " + card)
			}

			// trim if and other cruft
			if (mo = t.match(/^\/.Action./)) t = t.slice(mo[0].length)
			if (mo = t.match(/^Add 1 of your Shields to your hand. ?/)) {
				// Always return true in this block to log handled acts.
				target = p.shield.pop()
				if (target) {
					log(`🎴${p.name} took shield`)
					target.rested = false
					p.hand.push(target)
				}
				t = t.slice(mo[0].length)
				if (t === "") return true
				if (t.indexOf("Then, ") === 0) t = t.slice(6)
			}

			if (mo = t.match(/^[Dd]uring your turn, /)) {
				if (!myturn) return false  // already checked in getSectionText
				t = t.slice(mo[0].length)
			}

			// Main
			if (t === "Choose 1 friendly (Academy) Unit. During this turn, it may choose an active enemy Unit with 5 or less AP as its attack target. If you use an EX Resource to play this card, choose 1 to 2 friendly (Academy) Units instead.") {
				targets = fu.filter(c => !c.rested && !c.sick && c.hasTrait("Academy")).slice(0, (spent.length > 0) ? 2 : 1)
				for (target of targets) eotTrait(target, "canAttack enemy.unit.ap5min")
				return targets.length > 0
			}

			// Attack
			if (t === "If this Unit is damaged, draw 1.") {
				if (u.damage < 1) return false
				p.draw()
				return true
			}
			if (t === "You may choose 1 of your (Academy) Units. During this battle, battle damage this Unit would receive is dealt to that Unit instead.") {
				if (!defender || defender.AP() < u.HP()) return false
				target = fu.filter(c => c !== u && c.hasTrait("Academy") && c.HP() > defender.AP())[0]
				if (!target) return false
				log("↪Battle damge to " + target)
				u.traits_eob.push("redirect_battle_damage " + target.cid)
				return true
			}

			// trim ifs
			if (mo = t.match(/^If you deploy this Unit from your trash, /)) {
				if (!card.from_trash) return false
				t = t.slice(mo[0].length)
			}
			// if (mo = t.match(/^During this turn, if it is your turn, /)) {
			// 	if (!myturn) return false
			// 	t = t.slice(mo[0].length)
			// }
			if (mo = t.match(/^[Ii]f it is your turn, /)) {
				if (!myturn) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If you are attacking the enemy player, /)) {
				if (!attacker || defender) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If this is an? \((.+)\) Unit, /)) {
				if (!u.hasTrait(mo[1])) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If you have an? \((.+)\) Unit in play, /) || t.match(/^if a friendly \((.+)\) Unit is in play, /)) {
				if (!fu.some(c => c.hasTrait(mo[1]))) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If another friendly \((.+)\) Unit is in play, /) || t.match(/^if you have another \((.+)\) Unit in play, /)) {
				if (!fu.some(c => c !== u && c.hasTrait(mo[1]))) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If you have (\d) or more other \((.+)\) Units in play, /)) {
				const types = mo[2].split(")/(")
				if (!fu.filter(c => c !== u && types.some(part => c.hasTrait(part))).length >= parseInt(mo[1])) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If you have an \(AEUG\) Link Unit in play, /)) {
				if (!fu.some(c => c.hasTrait("AEUG") && c.linked())) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^If an enemy \(CB\) Unit is in play, /)) {
				if (!eu.some(c => c.hasTrait("CB"))) return false
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^if there are (\d+) or more \((.+)\) cards in your trash, /)) {
				if (!p.trash.filter(c => c.hasTrait(mo[2])).length < parseInt(mo[1])) return false
				t = t.slice(mo[0].length)
			}

			if (t === "this gains <First Strike> during this turn.") {
				if (myturn && !eu.some(c => c.rested) && !u.traits.some(trait => trait.match(/^canAttack active/))) return false
				eotTrait(u, "First Strike")
				return true
			}
			if (t === "add this card to your hand.") {
				bounce(card)
				return true
			}
			// deploy
			if (t === "deal 3 damage to this Base.") {
				await dealDamage(u, u, 3)
				return true
			}
			if (t === "choose 1 of your Units. It gets AP+2 during this turn.") {
				target = mySort(fu, c => c.AP())[0]
				if (!target) return true
				eotAP(target, 2)
				return true
			}
			if (hasText(t, "deploy 1 rested [Char's Zaku Ⅱ]((Zeon)･AP3･HP1) Unit token.")) {
				target = p.getToken("Char's Zaku Ⅱ")
				target.rested = true
				await p.deploy(target)
				return true
			}
			if (hasText(t, "deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.")) {
				await p.deploy(p.getToken("Parts"))
				return true
			}
			if (hasText(t, "deploy 1 [Tallgeese]((OZ)･AP4･HP2) Unit token. If it is your turn and a card with \"Corsica Base\" in its card name is in your trash, deploy 2 [Leo]((OZ)･AP1･HP1) Unit tokens instead.")) {
				if (myturn && p.trash.filter(c => c.name.indexOf("Corsica Base")).length > 0) {
					await p.deploy(p.getToken("Leo"))
					await p.deploy(p.getToken("Leo"))
				} else {
					await p.deploy(p.getToken("Tallgeese"))
				}
				return true
			}
			if (mo = t.match(/[Cc]hoose 1 friendly \((.+)\) Unit. It gets AP\+(\d) during this turn./)) {
				target = mySort(fu.filter(c => c.hasTrait(mo[1])), c => myturn ? c.rested + c.sick : !c.rested)[0]
				if (!target) return false
				eotAP(target, mo[2])
				return true
			}

			// trim choose
			if (t === "you may choose 7 (Vulture) cards from your trash. Exile them from the game. If you do, choose 1 enemy Unit/Base that is Lv.8 or lower. Destroy it.") {
				const mine = p.trash.filter(c => c.hasTrait("Vulture"))
				if (mine.length < 7) return false
				const their = mySort(eu, c => -c.AP())[0] || en.base
				if (!their) return false
				exile(mine.slice(0, 7))
				await destroy(their)
				return true
			}
			if (t === "You may choose 1 enemy Pilot. Return it to its owner's hand.") {
				target = eu.filter(c => c.pilot)[0]
				if (!target) return false
				bounce(target.pilot)
				return true
			}

			// Burst - Optional, so why not Attack etc.?
			if (t === "Activate this card's 【Main】.") {
				await runCard(card, "Main")
				return true
			}

			// triggered
			if (t === "if this is a blue Unit, it gains <High-Maneuver> during this turn.") {
				if (u.color !== "BLUE") return false
				eotTrait(u, "High-High-Maneuver")
				return true
			}

			// Action
			// choose, not instead
			if (!hasText(t, "instead")) {
				if (mo = t.match(/^[Cc]hoose 1 enemy Unit\. /)) {
					targets = eu
					target = targets[0]
					if (!target) return false
					t = t.slice(mo[0].length)
				}

			if (mo = t.match(/^[Ll]ook at the top (\d+) cards of your deck\.? ?/)) {
				look = mo[1]
				t = t.slice(mo[0].length)
			}
			if (mo = t.match(/^[Ll]ook at the top card of your deck\.? ?/)) {
				look = 1
				t = t.slice(mo[0].length)
			}
			if (look > 0) {
				if (hasText(t, "may deploy") && fu.length >= 6) return false
				targets = p.deck.slice(-look)
				if (targets.length < 1) return false
				let target = null

				if (t === "and return 1 to the top and 1 to the bottom.") {
					if (!p.canUse(targets[1])) {
						p.deck = [targets[1]].concat(p.deck.slice(0, -1))
					} else {
						p.deck = [targets[0]].concat(p.deck.slice(0, -2)).concat(targets[1])
					}
					return true
				}
				if (t === "and return 1 to the top. Place the remaining card into your trash.") {
					if (!p.canUse(targets[1])) {
						log("🗑️" + p.name + " trashes " + targets[1])
						p.trash.push(targets[1])
						p.deck = p.deck.slice(0, -1)
					} else {
						log("🗑️" + p.name + " trashes " + targets[0])
						p.trash.push(targets[0])
						p.deck = p.deck.slice(0, -2).concat(targets[1])
					}
					return true
				}

				if (hasText(t, "If it is a (Zeon)/(Neo Zeon) Unit card, you may reveal it and add it to your hand.")) {
					target = targets.filter(c => c.type === "UNIT" && (c.hasTrait("Zeon") || c.hasTrait("Neo Zeon")))[0]
				}
				if (mo = t.match(/If it is a \((.+?)\) card, you may reveal it and add it to your hand./)) {
					for (const part of mo[1].split(")/(")) {
						target = targets.filter(c => c.hasTrait(mo[1]))[0]
						if (target) break
					}
				}
				if (mo = t.match(/You may deploy 1 \((.+?)\) Unit card that is Lv.4 or lower among them./)) {
					target = targets.filter(c => c.level <= 4 && c.hasTrait(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "PILOT")[0]
				}
				else if (hasText(t, "You may reveal 1 (Academy) Unit card/Command card among them and add it to your hand.")) {
					target = targets.filter(c => (c.type === "UNIT" || c.type === "COMMAND") && c.hasTrait("Academy"))[0]
				}
				if (mo = t.match(/You may reveal 1 \((.+?)\) Unit card\/Pilot card among them and add it to your hand./)) {
					target = targets.filter(c => (c.type === "UNIT" || c.type === "PILOT") && c.hasTrait(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 (CB) Unit card that is Lv.5 or lower among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "UNIT" && c.level <= 5 && c.hasTrait("CB"))[0]
				}
				else if (hasText(t, "You may reveal 1 green (Zeon) Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "PILOT" && c.color === "GREEN" && c.hasTrait("Zeon"))[0]
				}
				// TODO: /reveal (\d) (\(.*?\)) ((Unit|Pilot|Base|Command) card\/?)+/ card among them
				else if (hasText(t, "You may reveal 1 green (Earth Federation) Unit card/1 card with \"AGE Device\" in its card name among them and add it to your hand.")) {
					target = targets.filter(c => hasText(c.nme, "AGE Device") || (c.type === "UNIT" && c.color === "GREEN" && c.hasTrait("Earth Federation")))[0]
				}
				else if (hasText(t, "You may reveal 1 (Zeon)/(Neo Zeon) Unit card among them and add it to your hand.")) {
					target = targets.filter(c => c.hasTrait("Zeon") || c.hasTrait("Neo Zeon"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Clan) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.hasTrait("Clan") && (c.type === "UNIT" || c.type === "PILOT"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Operation Meteor)/(G Team) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => (c.hasTrait("Operation Meteor") || c.hasTrait("G Team")) && (c.type === "UNIT" || c.type === "PILOT"))[0]
				} else if (t == "Return it to the top or bottom of your deck.") {
					const c = targets[0]
					// TODO: Untapped resource length?
					if ((c.LEVEL() < p.resource.length && c.COST() < p.resource.length) &&
						(c.type === "BASE" && !p.base
							|| (c.type === "UNIT" && p.battle.length < 6)
							|| (c.type === "PILOT" && fu.some(c2 => !c2.pilot && linksWith(c, c2)))
						)) target = c
				} else if (target === null) {
					log(`🚩🚩FIXME No target for ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
					return false
				}

				if (target) {
					log(`🎴${p.name} reveals from top ${look}: ${target}`)
					if (hasText(t, "add it to your hand")) {
						toHand(target)
					} else if (hasText(t, "You may deploy")) {
						await p.deploy(target)
					}
					targets = targets.filter(c => c !== target)
				}
				log(`🎴${p.name} puts ${targets.length} shuffled cards on bottom`)
				shuffle(targets)
				p.deck = targets.concat(p.deck.slice(0, -look))
				return true
			}

			// Destroyed, so return true to log?
			if (t === "Return the card paired with this Unit to your hand.") {
				if (!u.pilot) return false
				toHand(u.pilot)
				u.pilot = null
				return true
			}
			if (t === "return this Unit's paired Pilot to its owner's hand.") {
				if (!u.pilot) return false
				toHand(u.pilot)
				u.pilot = null
				return true
			}
			if (t === "If a friendly white Base is in play, choose 1 enemy Unit whose Lv. is equal to or lower than this Unit. Return it to its owner's hand.") {
				if (!p.base || p.base.color !== "WHITE") return false
				target = eu.filter(c => c.LEVEL() <= u.LEVEL())[0]
				if (!target) return false
				bounce(target)
				return true
			}
			if (t === "If it is your opponent's turn and this is a (CB) Unit, draw 1.") {
				if (myturn || !u.hasTrait("CB")) return false
				p.draw()
				return true
			}
			// Destroyed
			if (t === "All players draw 1.") {
				if (p1.deck.length < 1 && p2.deck.length < 1) throw Error("Draw by empty decks.")
				p1.draw()
				p2.draw()
				return true
			}
			if (clause === "hen you pay ") {
				// ⓪ ① ② ③ ④ ⑤ ⑥ ⑦ ⑧ ⑨ ⑩
				// not dingbat circled sans-serif 🄋 ➀ ➁ ➂ ➃ ➄ ➅ ➆ ➇ ➈ ➉
				if (t === "① or more for a friendly Unit's effect, this Base recovers 2 HP.") {
					if (!active_text || active_cost < 1 || !hasText(active_unit.type, "UNIT") || active_unit.owner !== p) return false
					u.recover(2)
					return true
				}
				if (t === "① or more cost for one of your Units' effects, you may increase this Unit's AP during this turn by an amount equal to the cost paid.") {
					if (!active_text || active_cost < 1 || hasText(active_unit.type, "UNIT") || active_unit.owner !== p) return false
					eotAP(u, active_cost)
					return true
				}
			}

			log(`🚩🚩FIXME Not implemented ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
			return false
		}

		let games = ngames.value
		let game = 0
		let game_start = new Date()
		let game_over = false
		let stop = false
		let p1 = null
		let p2 = null

		async function playGame() {
			// prevent lag and make game start easier to find
			// FIXMEs stay in the browser console
			dlog.innerHTML = ''
			if (game > 0) showStats()
			game += 1
			game_start = new Date()
			log(`\n<br>🏁Game ${game}/${games} start: ${game_start.toISOString().replace('T', ' ')}`)
			setGameOver(false)
			pid = 0
			cid = 0
			p1 = new Player("Player 1")
			p2 = new Player("Player 2")
			let p = rndPick([p1, p2])
			active_player = p
			let enemy = p === p1 ? p2 : p1
			enemy.resource.push(enemy.getCard(rndPick(EX_RESOURCES)))
			await render()
			let turn = 0
			while (true) {
				turn += 1
				active_player = p
				// Start phase
				// Active Step
				if (p.base !== null) activate(p.base)
				for (const c of p.resource) {
					if (c.rested) activate(c)
				}
				for (const c of p.battle) {
					if (c.rested) activate(c)
					c.sick = false
				}
				await sleep(1000)
				log("")
				// Start Step
				// Effects that specify “at the start of the turn” activate.
				// During
				for (const c of p1.battle.concat(p2.battle)) {
					// await run(c, "During Pair")
					// await run(c, "During Link")
				}

				// Draw phase
				try {
					p.draw(1, false)
					await render()
				} catch (ex) {
					log("🚩" + ex)
					break
				}
				// Resource phase
				let r = p.resource_deck.pop()
				if (r) {
					p.resource.push(r)
					await render()
					await sleep(1500)
				}
				let level = p.resource.length
				log("📈Turn " + turn + " " + p.name + " level " + level)
				// Main phase
				let considered = []
				while (true) {
					let to_play = mySort(p.hand.filter(c => !considered.includes(c)), c => ["BASE", "UNIT", "PILOT", "COMMAND"].indexOf(c.type) * 10 + c.COST())
					if (to_play.length < 1) break
					const c = to_play[0]
					considered.push(c)
					// if (!p.canUse(c)) continue // only goes for link
					let cost = c.COST()
					if (c.LEVEL() > level || cost > level) continue
					// already have a base
					if (c.type === "BASE" && p.base !== null) continue
					// max 6 units
					if (c.type === "UNIT" && p.battle.length >= 6) continue

					let empty_units = p.getPairableUnits()
					let doPair = false
					if (empty_units.length < 1 && c.type === "PILOT") continue
					if (empty_units.length > 0 && (c.type === "PILOT" || hasText(c.text, "【Pilot】"))) {
						doPair = true
						empty_units.sort(u => !linksWith(u, c))
						if ((!linksWith(empty_units[0], c) && p.hand.filter(bc => linksWith(empty_units[0], bc)).length > 0)) {
							if (c.type === "PILOT") continue
							doPair = false
						}
					}
					// log(`🤔Considering ${c.type} #${c.cid} ${c.id} ${c.name}`)
					let free_res_count = p.resource.filter(bc => bc.type.indexOf("EX") < 0).length || 0
					let ex_res_count = p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
					// ensure cards have HTML elements
					await render()
					if (await p.pay(cost, c, false)) {
						// Remove card from hand
						p.hand = p.hand.filter(item => item !== c)
						await sleep(300)
						if (c.type === "COMMAND") {
							// Do pilot part of command 2/3 of the time.
							if ((!doPair || !hasText(c.text, "【Pilot】") || rnd(1, 3) > 2) && await run(c)) {
								p.trash.push(c)
								await render()
								await p.paid(cost, c)  // TODO: Paid before activate events?
								await sleep(800)
								continue
							} else {
								if (doPair) {
									await pair(empty_units[0], c)
									await render()
									await p.paid(cost, c)
									continue
								}
								// No useful target, so don't play this and roll back / refund payment.
								if (cost > 0) {
									let r = null
									while (r = spent.pop()) {
										r.rested = false
										p.resource.push(r)
										--cost
									}
									await render()
									for (let i = 0; i < cost; ++i) {
										activate(p.resource[i])
									}
								}
								spent = []
								p.hand.push(c)
								continue
							}
						}
						if (c.type === "BASE") {
							log("🟨Deploy base " + c)
							c.rested = false
							p.base = c
							await render()
							await run(c, "Deploy")
						} else if (c.type === "UNIT") {
							await p.deploy(c)
							await render()
							await run(c, "Deploy")
						} else if (c.type === "PILOT") {
							await pair(empty_units[0], c)
						}
						await p.paid(cost, c)
						await sleep(800)
					}
				}

				await run(p.base, "Activate･Main")
				for (const c of p.battle) await run(c, "Activate･Main")

				// Attack Step
				considered = []
				while (true) {
					const can_attack = mySort(p.battle.filter(bc => !bc.rested && !bc.sick && !considered.includes(bc)), bc => -bc.AP())
					if (can_attack.length < 1) break
					const att = can_attack[0]
					considered.push(att)
					if (att.AP() < 1) {
						// TODO: Might get boosted later
						att.sick = true  // skip for other effects
						continue
					}
					if (att.text === "This Unit can only attack during a turn when one of your (Superpower Bloc)/(UN) Units is deployed.") {
						if (!p.traits_eot.some(trait => trait.match(/^Deployed .*(Superpower Bloc|UN)/))) continue
					}
					enemy = p === p1 ? p2 : p1

					// Battle Area
					let prone = enemy.battle.filter(bc => bc.rested)
					if (att.traits_eot.includes("canAttack active.unit.damaged")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.damage > 0)
						if (extra) prone = extra.concat(prone)
					}
					if (att.traits_eot.includes("canAttack active.unit.apEqmin")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.ap <= att.ap)
						if (extra) prone = extra.concat(prone)
					}
					for (let i = 0; i <= 9; ++i) {
						if (att.traits_eot.includes(`canAttack active.unit.ap${i}min`)) {
							const extra = enemy.battle.filter(bc => !bc.rested && bc.AP() <= i)
							if (extra) prone = extra.concat(prone)
						}
						if (att.traits_eot.includes(`canAttack active.unit.lv${i}min`)) {
							const extra = enemy.battle.filter(bc => !bc.rested && bc.level <= i)
							if (extra) prone = extra.concat(prone)
						}
					}
					prone = mySort(prone, def => def.HP())

					// Base and shields also count as enemy player: https://www.gundam-gcg.com/en/cards/index.php?freeword=GD04-016#cards
					let must_attack_unit = hasText(att.text, "This Unit can't choose the enemy player as its attack target") || att.hasTrait("must_attack_unit")

					// TODO: Action can solve this in doBattle
					if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`noDmgShield enemy.unit.lv[${att.level}-9]`)))) {
						must_attack_unit = true
					}
					if (enemy.base && !att.canDamage(enemy.base)) {
						must_attack_unit = true
					}

					if (prone.length > 0 && (must_attack_unit || p.shield.length < enemy.shield.length || ((att.getBreach() || rnd(1, 2) > 1) && prone.some(def => att.AP() >= def.HP())))) {
						let def = prone[0]
						if (enemy.battle.some(bc => bc.text === "Enemy Units choose one of your rested (Maganac Corps) Units as their attack target if possible when attacking.")) {
							let newdef = enemy.battle.filter(bc => bc.rested && bc.hasTrait("Maganac Corps"))[0]
							def = newdef || def
						}
						await attackStep(att, def)
						continue
					}
					if (must_attack_unit) {
						continue
					}

					// Shield Area
					if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`noDmgShield enemy.unit.lv[${att.level}-9]`)))) {
						log("🛡️Shield area damage prevented.")
						continue
					}
					if (enemy.base) {
						if (!att.canDamage(enemy.base)) {
							log(`🛡️${enemy.base} would take no battle damage from ${att}`)
							continue
						}
						await attackStep(att, enemy.base)
					} else {
						if (enemy.shield.length > 0 && enemy.shield.slice(-1)[0].hasTrait("protection.enemy.units")) {
							log("🛡️" + enemy.name + " shield protected from enemy units")
							continue
						}
						await attackStep(att)
					}

					// Battle End
					for (const c of p1.battle.concat(p2.battle)) {
						c.ap_eob = 0
						c.hp_eob = 0
						c.traits_eob = []
					}
					for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
						c.ap_eob = 0
						c.hp_eob = 0
						c.traits_eob = []
					}
					p.traits_eob = []
					await render()
					if (game_over) break
				}
				if (game_over) break

				// End phase
				await actionStep()
				while (p.hand.length > 10) p.discard()
				for (const c of p1.battle.concat(p2.battle)) {
					await run(c, "", "At the end of the turn ")
					if (c.damage > 0) {
						const repair = c.getRepair()
						if (repair) {
							log(`🛠️Repair ${repair} ${c}`)
							c.damage -= repair
							if (c.damage < 0) c.damage = 0
						}
					}
					c.ap_eot = 0
					c.hp_eot = 0
					c.traits_eot = []
				}
				for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
					c.ap_eot = 0
					c.hp_eot = 0
					c.traits_eot = []
				}

				p.traits_eot = []
				once_per_turn = []
				// wait for untap animation
				await sleep(400)
				await render()
				// log(structuredClone(p))  // clone to keep current lists state
				p = p === p1 ? p2 : p1
			}
		}

		function setGameOver(b) {
			game_over = b
			bstart.disabled = !game_over
			bstop.disabled = game_over
		}

		let deck_stats = {}
		let player_wins = [0, 0]
		function endGame(winner) {
			setGameOver(true)
			if (winner) {
				let loser = (winner === p1 ? p2 : p1)
				player_wins[winner === p1 ? 0 : 1] += 1

				let wdl = deck_stats[winner.deckname] || [0, 0, 0]
				wdl[0] += 1
				deck_stats[winner.deckname] = wdl

				wdl = deck_stats[loser.deckname] || [0, 0, 0]
				wdl[2] += 1
				deck_stats[loser.deckname] = wdl
			} else {
				for (const p of [p1, p2]) {
					let wdl = deck_stats[p1.deckname] || [0, 0, 0]
					wdl[1] += 1
					deck_stats[p1.deckname] = wdl
				}
			}
			log(`🏁Game ${game}/${games} end: ${new Date().toISOString().replace('T', ' ')} in ${Math.round((new Date() - game_start) / 1000)}s`)
		}

		function sortWDL(a, b) {
			if (a[0] > b[0]) return -1
			if (a[0] < b[0]) return 1
			if (a[1] > b[1]) return -1
			if (a[1] < b[1]) return 1
			if (a[2] > b[2]) return 1
			if (a[2] < b[2]) return -1
			return 0
		}

		function sortStats(a, b) {
			return sortWDL(a[1], b[1])
		}

		function showStats() {
			// For CLI: let m = Number((new Date() - games_start) / 60000); JSON.stringify(Object.entries(deck_stats).sort(sortStats)) + " / " + game + " / " + m.toFixed(2) + " = " + (m/game*60).toFixed(2) + "s/game; " + ((games-game) * m/game).toFixed(2) + "m left"
			delay = 1
			const m = Number((new Date() - games_start) / 60000)
			let msg = `Game ${game}/${games} over in ${m.toFixed(2)}m; ${(m / game * 60).toFixed(2) + "s/game"}`
			if (game < games) msg += "; " + ((games - game) * m / game).toFixed(2) + "m left"
			msg += `<br>\n${p1.name}: ${player_wins[0]}; ${p2.name}: ${player_wins[1]}<br>\nDecks ranked by W/D/L:`
			const stats = Object.entries(deck_stats).sort(sortStats)
			for (let i = 0; i < stats.length; ++i) {
				const [name, s] = stats[i]
				msg += `<br>\n${1 + i}. <a href="#" onclick='showDeck(\"${escapeHTML(name)}\"); event.preventDefault()'>${name}</a>: ${s} ${(s[0] / (s[0] + s[1] + s[2]) * 100).toFixed(0)}%`
			}
			log(msg)
			setSpeed()
		}

		async function playGames() {
			if (Object.keys(cards).length < 1) await loadCards()
			window.games_start = new Date()
			while (!stop && game < games) {
				setSpeed()
				try {
					await playGame()
				} catch (ex) {
					log("🚩FIXME: " + ex + " " + ex.stack)
				}
				if (game > 1 && delay > 0 || game >= games) showStats()
				if (delay > 0) {
					delay = 1
					await render()
					if (games <= 10) await sleep(3000)
					else await sleep(350)
				}
			}
			stop = false
			game = 0
			deck_stats = {}
			player_wins = [0, 0]
		}

		function toggleSearch() {
			if (search.classList.contains('searchsmall')) {
				search.classList.remove('searchsmall')
				searchtext.focus()
			}
			else search.classList.add('searchsmall')
		}
		function toggleSettings() {
			if (settings.classList.contains("open")) settings.classList.remove("open")
			else settings.classList.add("open")
		}

		function findCards(query) {
			let html = ""
			let oldcid = cid
			let count = 0
			let results = []
			let tosearch = Object.entries(cards)
			let op = "AND"
			for (let q of query.split(/ (AND|OR) /)) {
				if (q === "AND") {
					if (count === 0) break
					op = "AND"
					tosearch = results
					continue
				}
				if (q === "OR") {
					op = "OR"
					continue
				}
				count = 0
				if (op === "AND") results = []
				const invert = q.indexOf("NOT ") === 0
				q = q.toLowerCase()
				for (const entry of tosearch.toSorted()) {
					const text = JSON.stringify(entry[1]).replaceAll(/(?<!\\)"/g, '').replaceAll('\\"', '"').toLowerCase()
					let add = false
					if ((invert ? !hasText(text, q.slice(4)) : hasText(text, q))
						|| (invert ? !hasText(text, q.slice(4).replaceAll('"', '')) : hasText(text, q.replaceAll('"', '')))) {
						if (results.includes(entry)) continue
						results.push(entry)
						++count
					}
				}
			}
			if (results.length < 1) html = "No results."
			else {
				count = 0
				cid = oldcid
				html = "" + results.length + " results:<br>"
				for (const entry of results) {
					let left = 5 + (count % 10) * 11
					let top = 10 + Math.floor(count / 10) * 15
					++count
					html += p1.getCard(entry[0]).toHTML(left, top, false, 0, true)
				}
			}
			searchresults.innerHTML = html
		}

		playGames()
	</script>
