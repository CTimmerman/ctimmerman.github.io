<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Gundam Card Game implementation by Cees Timmerman, 2026-05-11-18</title>
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%228 14 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>" />
	<style>
		a,
		html {
			--fgcolor: white;
			--bgcolor: black;
			background-color: var(--bgcolor);
			color: var(--fgcolor);
			scrollbar-color: auto;
			font-family: monospace;
		}

		a:visited {
			color: grey;
		}

		body {
			margin: 0;
		}

		#battlefield {
			background-image: url(GundamPlayMat.png);
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			width: 100vmin;
			height: 100vmin;
		}

		#dlog {
			position: absolute;
			margin: 0 0 0 85vmin;
			width: stretch;
			height: 100vmin;
			overflow-y: scroll;
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			background-color: #08080888;
			border: 1px solid var(--fgcolor);
		}

		#overlay {
			display: none;
			position: absolute;
			font-size: xx-large;
			z-index: 9000;
			width: 100%;
			height: 100%;
		}

		.card {
			background-size: contain;
			background-repeat: no-repeat;
			border: 1px solid brown;
			border-radius: 0.6vmin;
			color: yellow;
			cursor: pointer;
			position: absolute;
			width: 10vmin;
			height: 13.96vmin;
			font-size: small;
			text-align: center;
			text-shadow: 1px 1px #08080888;
			transition: 0.3s;
		}

		.facedown {
			background-image: url(https://gundams.dev/i/cardback.webp) !important;
			border-color: black !important;
		}

		.rested {
			transform: rotate(90deg);
			margin-top: -1.4vmin;
		}
	</style>
</head>

<body>
	<div id="overlay"></div>
	<div id="battlefield"></div>
	<div id="dlog">
		<a href="https://www.gundam-gcg.com/en/rules/">Gundam Card Game</a>
	</div>
	<audio id="pewpew" src="pewpew.opus"></audio>
	<audio id="boom" src="boom.opus"></audio>
	<script>
		"use strict"

		// Why doesn't upstream list EXR promos like other promos?
		// "EXR-001_PR", "EXR-001_PR2", "EXR-001_PR3", "EXR-001_PR4", "EXR-001_PR5"
		const EX_RESOURCES = ["EXR-001", "EXRP-001", "EXRP-002"]

		let cards = {}

		function escapeHTML(unsafe) {
			return unsafe
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;")
		}
		function unescapeHTML(unsafe) {
			return unsafe
				.replaceAll("&amp;", "&")
				.replaceAll("&lt;", "<")
				.replaceAll("&gt;", ">")
				.replaceAll("&quot;", '"')
				.replaceAll("&#039;", "'")
		}

		function bounce(card) {
			log("🔙Bounced " + card)
			card.rested = false
			if (card.pilot) {
				card.pilot.rested = false
				card.pilot.unit = null
				card.owner.hand.push(card.pilot)
				card.pilot = null
			}
			card.owner.hand.push(card)
			card.owner.battle = card.owner.battle.filter(bc => bc != card && bc != card.pilot)
		}

		async function destroy(card) {
			if (!card) return false
			log("💥Destroy " + card)
			if (card.pilot) {
				card.pilot.unit = null
				card.owner.trash.push(card.pilot)
				card.pilot = null
			}
			if (card.type.indexOf("TOKEN") < 0 && card.type.indexOf("EX") != 0) card.owner.trash.push(card)
			if (card.type.indexOf("BASE") > -1) {
				card.owner.base = null
			} else {
				card.owner.battle = card.owner.battle.filter(bc => bc != card)  // ??? && bc != card.pilot)
			}
			await run(card, "Destroyed")
			await render()
			boom.play().catch(ex => { })
			await sleep(900)
			return true
		}

		async function sleep(ms = 1000) {
			await new Promise(r => setTimeout(r, ms))
		}

		function getel(card) {
			return document.getElementById("c" + card.cid)
		}

		function activate(card) {
			card.rested = false
			try {
				getel(card).classList.remove("rested")
			} catch (ex) {
				log("🚩🚩ERR " + ex + " " + card)
				throw Error("FIXME")
			}
			if (card.pilot) {
				card.pilot.rested = false
				getel(card.pilot).classList.remove("rested")
			}
		}

		function rest(card) {
			// log("💤Rest " + card)
			card.rested = true
			getel(card).classList.add("rested")
			if (card.pilot) {
				card.pilot.rested = true
				getel(card.pilot).classList.add("rested")
			}
		}

		async function battle(att, def) {
			/* Too much hassle to move the pilots at well
			const e = getel(att)
			const old_top = e.style.top
			const old_left = e.style.left
			const e2 = getel(def)
			e.style.top = e2.style.top
			e.style.left = e2.style.left
			await sleep(800)
			e.style.top = old_top
			e.style.left = old_left
			*/
			const sa = getel(att).style
			const sd = getel(def).style
			let x1 = parseFloat(sa.left) + 5
			let y1 = parseFloat(sa.top) + 5
			let x2 = parseFloat(sd.left) + 5
			let y2 = parseFloat(sd.top) + 5
			// Laser time!
			overlay.style.display = "block"
			overlay.innerHTML = `<svg id="boardbg" style="height:100vmin;width:100vmin">
				<line x1="${x1}vmin" y1="${y1}vmin" x2="${x2}vmin" y2="${y2}vmin" stroke="white" stroke-width="4px" stroke-linecap="round">
					<animate attributeName="stroke" values="#880;#fff;#880;" dur="0.2s" repeatCount="indefinite"/>
					<animate attributeName="stroke-width" values="4px;8px;4px;" dur="0.2s" repeatCount="indefinite"/>
				</line>
			</svg>`
			pewpew.play().catch(ex => { })
			// vfx
			await sleep(400)
			overlay.style.display = "none"
			// sfx
			await sleep(200)
		}

		function showDeck(player) {
			window.pause = (window.pause || 0) + 1
			let html = `<div onclick="overlay.style.display = 'none'; window.pause = 0" style="width:100%; height:100%; background-color: #08080888">`
			overlay.style.display = "block"
			let deck = player.fulldeck.toSorted(
				(a, b) => {
					if (a.type > b.type) return 1
					if (a.type < b.type) return -1
					if (a.level > b.level) return 1
					if (a.level < b.level) return -1
					if (a.cost > b.cost) return 1
					if (a.cost < b.cost) return -1
					if (a.name > b.name) return 1
					if (a.name < b.name) return -1
					return 0
				}
			)
			let type = deck[0].type
			let left = 20
			let top = 10
			for (const c of deck) {
				if (c.type != type) {
					type = c.type
					left += 12
					top = 10
				}
				html += c.toHTML(left, top)
				top += 4
				if (top > 54) {
					left += 12
					top = 10
				}
			}
			overlay.innerHTML = html + "</div>"
		}

		function zoom(e) {
			event.preventDefault()
			event.stopPropagation()
			if (e.style.transform.indexOf("scale") > -1) {
				e.style.transform = e.old_transform
				e.style.zIndex = e.old_zIndex
				e.style.top = e.old_top
				e.style.left = e.old_left
				if (window.pause && window.pause > 0) window.pause -= 1
			} else {
				e.old_transform = e.style.transform
				e.old_zIndex = e.style.zIndex
				e.old_top = e.style.top
				e.old_left = e.style.left

				e.style.transform = "scale(5)"
				e.style.zIndex = 9000
				e.style.top = "40vmin"
				e.style.left = "40vmin"
				window.pause = (window.pause || 0) + 1
			}
		}

		function log(s) {
			dlog.innerHTML += s + "<br>"
			console.log(s)
			dlog.scrollTop = dlog.scrollHeight
		}

		function rnd(min, max) {
			return Math.floor(min + Math.random() * (1 + max - min))
		}

		function rndPick(arr) {
			return arr[Math.floor(Math.random() * arr.length)]
		}

		async function pair(unit, pilot) {
			log("🧑‍✈️Pair " + pilot + " with " + unit)
			unit.pilot = pilot
			pilot.unit = unit
			await render()
			await run(unit, "When Paired")
			await run(pilot, "When Paired")
			if (unit.link && linksWith(unit, pilot)) {
				log("🔗Link")
				unit.sick = false
				await run(unit, "When Linked")
				await run(pilot, "When Linked")
			}
		}

		function linksWith(unit, pilot) {
			if (!pilot) return false
			for (let part of unit.link.split("/")) {
				if (part == `[${pilot.name}]`) return true
			}
			return false
		}

		class Card {
			constructor(type = "UNIT",
				name = "",
				ap = 0,
				hp = 0,
				level = 0,
				cost = 0,
				text = "",
				zones = [],
				traits = [],
				link = "",
				id = "",
				color = "brown") {
				this.id = id
				this.color = ["WHITE", "BLUE", "PURPLE", "RED", "GREEN"].indexOf(color) >= 0 ? color : "brown"
				this.level = parseInt(level) || 0
				this.cost = parseInt(cost) || 0
				// let type_num = parseInt(type) || type == 0? Type.RESOURCE : Type.UNITTOKEN
				// if (Type[type]) {
				// 	// number or string, we want number here
				// 	type_num = parseInt(type)? type : Type[type]
				// }
				this.type = type || ""
				this.name = name || ""
				this.text = unescapeHTML(text || "")
				this.zones = zones || []
				this.traits = traits || []  // new for each, unlike in Python
				this.traits_eot = []
				this.link = link || ""
				this.ap = parseInt(ap) || 0
				this.ap_eot = 0
				this.hp = parseInt(hp) || 0
				this.damage = 0
				this.rested = false
				this.sick = false

			}
			getAP() {
				let rv = this.ap + this.ap_eot
				if (this.pilot) {
					rv += this.pilot.ap
					if (linksWith(this, this.pilot)) {
						if (this.pilot.text.indexOf("【During Link】This Unit gets AP+1 and HP+1.<br>") > -1) {
							rv += 1
						}
					}
				}
				return rv
			}
			getHP() {
				let rv = this.hp
				if (this.pilot) {
					rv += this.pilot.hp
					if (linksWith(this, this.pilot)) {
						if (this.pilot.text.indexOf("【During Link】This Unit gets AP+1 and HP+1.<br>") > -1) {
							rv += 1
						}
					}
				}
				return rv - this.damage
			}
			toString(simple = false) {
				let rv = simple ? "" : (this.type == "COMMAND" || this.type.indexOf("RESOURCE") > -1) ? `#${this.cid} ` : `${this.getAP()}/${this.getHP()} #${this.cid} `
				if (this.type == "COMMAND" && this.unit) return rv + getSectionText(this, "Pilot").slice(1, -1)
				if (this.type == "PILOT" && simple) return this.name
				let pilot_name = ""
				if (this.pilot) pilot_name = this.pilot.toString(true)
				return rv + `${this.name}${pilot_name ? " + " + pilot_name : ""}`
			}
			toDict() {
				return {
					"id": this.id,
					"color": this.color,
					"level": this.level,
					"cost": this.cost,
					"type": this.type,
					"name": this.name,
					"text": this.text,
					"zones": this.zones,
					"traits": this.traits,
					"link": this.link,
					"ap": this.ap,
					"hp": this.hp,
				}
			}
			static fromDict(d) {
				// log("Returning new card from dict " + JSON.stringify(d))
				return new Card(d.type, d.name, d.ap, d.hp, d.level, d.cost, d.text, d.zones, d.traits, d.link, d.id, d.color)
			}
			toHTML(left, top, facedown = false, z = 0) {
				const id = this.id.split("_")[0]
				//return `<div class="card" style="left:${left}vw; top:${top}vh; border-color: ${this.color}; ${this.rested ? "transform: rotate(90deg);" : ""}">L${this.level} C${this.cost} ${this.id}<br>${this.type}<br>${this.name}<br>${this.zones}<br>${this.traits}<br>Link: ${this.link}<br><img src="https://exburst.dev/gundam/cards/sd/${id}.webp"></div>`
				//return `<div class="card" style="left:${left}vmin; top:${top}vmin; border-color: ${this.color}; ${this.rested ? "transform: rotate(90deg);" : ""}"><img src="https://exburst.dev/gundam/cards/sd/${id}.webp"></div>`
				//return `<div class="card ${this.rested ? "rested" : ""} ${facedown ? "facedown" : ""}" style="left:${left}vmin; top:${top}vmin; border-color: ${this.color}; background-image: url(https://exburst.dev/gundam/cards/sd/${id}.webp);"><div class="rested">${this.type}</div></div>`
				return `<div id="c${this.cid}" class="card ${this.rested ? "rested" : ""} ${facedown ? "facedown" : ""}" style="z-index:${z}; left:${left}vmin; top:${top}vmin; border-color: ${this.color}; background-image: url(https://exburst.dev/gundam/cards/sd/${id}.webp);" onclick='zoom(this)'>${this.cid} ${this.ap_eot ? '<div style="color: red">' + this.ap_eot + " AP</div>" : ""} ${this.damage ? '<div style="color: red">' + this.damage + " DMG</div>" : ""} ${this.sick ? '<div style="color: red">not ready</div>' : ""}</div>`
			}

			hasTrait(trait) {
				if (trait == "protection.enemy.units" && this.facedown && this.owner.battle.filter(c => c.rested && c.text.indexOf("While this Unit is rested, friendly Shields can't receive battle damage from enemy Units.") > -1).length) return true

				if (trait == "Blocker" && this.owner.battle.filter(c => c.rested && c.text.indexOf("While this Unit is rested, all your (League Militaire) Unit tokens gain <Blocker>.") > -1).length && this.traits.concat(this.traits_eot).includes("League Militaire")) return true

				return this.traits.concat(this.traits_eot).includes(trait)
			}
		}

		const decks = [
			// 			`# ST01 - Heroic Beginnings

		// card id on the battlefield, link to render element
		let cid = 0

		// https://bost.ocks.org/mike/shuffle/compare.html
		function shuffle(array) {
			let m = array.length, t, i
			while (m) {
				i = Math.floor(Math.random() * m--)
				t = array[m]
				array[m] = array[i]
				array[i] = t
			}
		}

		let pid = 0
		class Player {
			constructor(name) {
				this.pid = ++pid
				this.name = name
				this.hand = []
				this.deck = []
				this.fulldeck = []
				const lines = decks[rnd(0, decks.length - 1)].split("\n")
				for (const line of lines) {
					if (line.indexOf("# ") == 0) log(`🎴${name} deck: <a href="#" onclick="showDeck(p${this.pid})">${line.slice(2)}</a>`)
					const [count, id] = line.split(" ")
					if (count >= 1) {
						for (let i = 0; i < count; ++i) {
							const c = this.getCard(id)
							c.owner = this
							this.deck.push(c)
							this.fulldeck.push(this.getCard(id))
						}
					}
				}
				if (this.deck.length != 50) throw Error("Deck length not 50: " + this.deck.length)
				shuffle(this.deck)
				// Maybe still useful for fuzzing.
				// for (let i = 0; i < 50; ++i) {
				// 	const t = Type[rnd(1, 4)]
				// 	this.deck.push(new Card(t, t+i, rnd(1, 5), rnd(1, 5), rnd(1, 7), rnd(1, 5), "", "", "ST04-008_PR", "RED"))
				// }
				this.resource_deck = []
				for (let i = 0; i < 10; ++i) {
					// R-003 is hard to count while rested
					this.resource_deck.push(this.getCard("R-00" + rnd(4, 9)))
				}
				this.battle = []
				this.shield = []
				this.base = this.getCard("EXB-001")  // new Card("BASE", "EX Base", 0, 3)
				this.resource = []
				this.trash = []
				this.traits_eot = []

				// Opening hand
				this.draw(5)
				// Shields
				for (let i = 0; i < 6; ++i) {
					const c = this.deck.pop()
					c.rested = true
					this.shield.push(c)
				}
			}

			async addToBattle(card) {
				if (card.type.indexOf("UNIT") < 0) throw Error("Not a unit: " + card)
				if (this.battle.length >= 6) {
					const weakest = this.battle.toSorted(c => c.ap)[0]
					await destroy(weakest)
				}
				log(`🚀Deploy ${card.rested ? "rested" : ""} ${card}`)
				card.sick = true
				this.battle.push(card)
			}

			draw(number = 1) {
				log("🎴" + this.name + " draws " + number)
				for (let i = 0; i < number; ++i) {
					if (this.deck.length < 1) {
						throw Error("💀" + this.name + " lost by empty deck")
					}
					this.hand.push(this.deck.pop())
				}
			}

			discard(number = 1) {
				for (let i = 0; i < number; ++i) {
					const c = this.hand[Math.floor(Math.random() * this.hand.length)]
					if (!c) return
					log("🗑️" + this.name + " discards " + c)
					this.trash.push(c)
					this.hand = this.hand.filter(item => item !== c)
				}
			}

			getCard(id) {
				const d = cards[id]
				if (!d) {
					const msg = "Card not found: " + id
					log(msg)
					throw Error(msg)
				}
				const rv = Card.fromDict(d)
				// DeckPlanet bug workarounds
				rv.text = rv.text.replaceAll("[action]", "【Action】").replaceAll("[br]", "<br>").replaceAll("[burst]", "【Burst】").replaceAll("[breach 3]", "【Breach 3】").replaceAll("[deploy]", "【Deploy】").replaceAll("[main]", "【Main】").replaceAll("[pilot]", "【Pilot】").replaceAll("[when paired]", "【When Paired】")
				if (rv.id == "ST02-009") {
					rv.color = "BLUE"
					rv.cost = 1
				}
				if (rv.id == "ST04-004_PR") {
					rv.color = "WHITE"
					rv.cost = 1
				}
				if (rv.id == "ST05-003") {
					rv.color = "PURPLE"
					rv.cost = 1
				}
				if (rv.id == "ST05-003_PR") {
					rv.color = "PURPLE"
					rv.cost = 1
				}
				if (rv.id == "ST06-012") {
					rv.color = "GREEN"
					rv.cost = 1
				}
				if (rv.id == "ST06-012_PR") {
					rv.color = "GREEN"
					rv.cost = 1
				}
				if (rv.id == "ST03-010") {
					rv.ap = 2
					rv.hp = 2
				}
				if (rv.id == "GD04-098") {
					rv.ap = 1
					rv.hp = 2
				}
				cid += 1
				rv.cid = cid
				rv.owner = this
				return rv
			}

			getToken(name) {
				// Yes, names are not unique.
				for (const k in cards) if (cards[k].name == name && cards[k].type.indexOf("TOKEN") > -1) return this.getCard(k)
			}

			async pay(cost) {
				if (cost > this.resource.filter(r => !r.rested).length) return false
				let paid = 0
				// EX last
				for (const r of this.resource.toSorted(c => c.type.indexOf("EX"))) {
					rest(r)
					paid += 1
					if (r.type.indexOf("EX") > -1) {
						this.resource = this.resource.filter(item => item !== r)
						// Wait for rest animation and show gone.
						await sleep(300)
						await render()
					}
					if (paid >= cost) break
				}
				return true
			}
		}

		let gameInfo = {}
		async function loadCards() {
			log("Loading")
			// localStorage.clear()
			gameInfo = JSON.parse(localStorage.getItem("gameInfo"))
			if (!gameInfo) {
				log("Fetching game info")
				// gameInfo = await fetch('https://raw.githubusercontent.com/CTimmerman/cgs/refs/heads/master/Gundam/cgs.json').then((response) => response.json())
				const response = await fetch('https://raw.githubusercontent.com/CTimmerman/cgs/refs/heads/master/Gundam/cgs.json')
				gameInfo = await response.json()
				localStorage.setItem("gameInfo", JSON.stringify(gameInfo))
			}
			cards = JSON.parse(localStorage.getItem("cards")) || {}
			if (Object.keys(cards).length > 1) {
				log(`Loaded ${Object.keys(cards).length} cards`)
			} else {
				cards = {}
				let pages = 1
				let page = 0
				let data = JSON.parse(localStorage.getItem("data")) || []
				if (!data.length > 0) {
					do {
						++page
						const link = `${gameInfo.allCardsUrl}&page=${page}`
						log(`Loading ${link}`)
						const response = await fetch(link)
						const json = await response.json()
						pages = json.meta.page_count
						data = data.concat(json.data)
						await sleep(500)  // rate limit to be nice to server
					} while (page < pages)
					localStorage.setItem("data", JSON.stringify(data))
				}
				for (const card of data) {
					const id = card.card_number
					cards[id] = new Card(
						card.card_type,
						card.card_name,
						card.card_ap,
						card.card_hp,
						card.card_level,
						card.card_cost,
						card.card_text_unstyled,
						card.card_zones,
						card.card_traits,
						card.card_link_requirement,
						id,
						card.card_color).toDict()
				}
				log("Cards: " + Object.keys(cards).length)
				localStorage.setItem("cards", JSON.stringify(cards))
			}
		}

		async function render() {
			while (window.pause) await sleep(1000)
			let html = ""
			for (const p of [p1, p2]) {
				let x = 0
				let y = 0
				let top = 0
				let left = 0
				// Trash
				for (let i = 0; i < p.trash.length; ++i) {
					left = 2
					top = 18 - 0.1 * i
					if (p == p2) {
						left += 70
						top += 48.6
					}
					const c = p.trash[i]
					c.rested = false
					html += c.toHTML(left, top, false, p == p2 ? 2 : 1)
				}
				// Deck - Could use actual card, but this might be useful for sending to a client.
				let resource = p.getCard("RP-004")
				for (let i = 0; i < p.deck.length; ++i) {
					left = 2
					top = 33 - 0.1 * i
					if (p == p2) {
						left = 72
						top += 18.5
					}
					html += resource.toHTML(left, top, true, 1)
				}
				// Resource Area
				for (const c of p.resource) {
					left = 2 + x * 5
					top = 2
					if (p == p2) {
						left += 26
						top += 80
					}
					html += c.toHTML(left, top)
					x += 1
				}
				for (let i = 0; i < p.resource_deck.length; ++i) {
					left = 57
					top = 2 - 0.1 * i
					if (p == p2) {
						left = 17
						top += 80
					}
					html += resource.toHTML(left, top, true)
				}
				// Shield Area
				y = 0
				for (const c of p.shield) {
					left = 70
					top = 0.5 + y
					if (p == p2) {
						left = 4
						top = 85 - y
					}
					html += c.toHTML(left, top, true)
					y += 4
				}
				if (p.base) {
					left = 72
					top = 33
					if (p == p2) {
						left = 1.9
						top = 51.3
					}
					html += p.base.toHTML(left, top)
				}
				// Battle Area
				x = 0
				y = 0
				for (const c of p.battle) {
					if (x == 3) {
						x = 0
						y += 0.9
					}
					left = 18 + x * 17
					top = 17 + y * 16.4
					if (p == p2) {
						left += 5
						top += 33
					}
					if (c.pilot) {
						c.pilot.rested = c.rested
						html += c.pilot.toHTML(left - 2, top + 3.5)
					}
					html += c.toHTML(left, top)
					x += 1
				}
				// Hand
				x = 0
				top = p == p2 ? 96 : -12
				for (const c of p.hand) {
					left = 8 + x * 8
					html += c.toHTML(left, top, p == p1)
					x += 1
				}
			}
			battlefield.innerHTML = html
		}

		async function doBattle(att, def) {
			await battle(att, def)
			def.damage += att.getAP()
			att.damage += def.getAP()
			if (def.getHP() < 1) {
				if (def.type.indexOf("UNIT") > -1) {
					const mo = /Breach (\d)/.exec(att.text + att.traits_eot)
					if (mo) {
						const breach = parseInt(mo[1])
						if (def.owner.base) {
							log("➤Breach " + breach)
							await dealDamage(att, def.owner.base, breach)
						} else if (def.owner.shield.length > 0) {
							log("➤Breach " + breach)
							await dealDamage(att, def.owner.shield.slice(-1)[0], breach)
						}
					}
				}
				await destroy(def)
				await run(att, "", "During your turn, when this Unit destroys an enemy Unit with battle damage,")
			}
			if (att.getHP() < 1) await destroy(att)
		}

		async function dealDamage(source, target, amount = 1) {
			if (!target) return false
			log(`🎯${source} deals ${amount} effect damage to ${target}`)
			target.damage += amount
			if (target.getHP() < 1) await destroy(target)
			return true
		}

		function getSectionText(card, act = "Main", clause = "") {
			const rex = new RegExp("(.*?)" + (clause ? clause : (act + "】")) + "([^.].+?)(<br|$)")
			const mo = card.text.match(rex)
			if (!mo) return ""
			const limits = mo[1]
			const text = mo[2]
			if (limits.indexOf("During Link") > -1 && !linksWith(card, card.pilot)) return ""
			if (limits.indexOf("During Pair") > -1 && !card.pilot) return ""
			return text
		}
		async function run(card, act = "Main", clause = "") {
			if (!card) return false
			if (card.type == "COMMAND") {
				// log("DEBUG Running " + card + " " + act + " " + clause)
			}
			let rv = await runCard(card, act, clause)
			if (card.pilot) rv = rv || await runCard(card.pilot, act, clause)
			return rv
		}
		async function runCard(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t && act == "Main") t = getSectionText(card, "Action")
			if (!t) {
				// if (clause || card.text.indexOf(act) > -1) log(`🚩No act ${act} or clause "${escapeHTML(clause)}" found in ${card.id} ${escapeHTML(card.text)}`)
				return false
			}
			const p = card.owner
			const en = (p == p1 ? p2 : p1)
			const fu = p.battle
			const eu = en.battle

			// Mandatory abilities (not Main/Action)
			if (t == "Activate this card's 【Main】.") {
				t = getSectionText(card, "Main")
			}
			if (t == "Deploy this card.") {
				card.rested = false
				p.base = card
				await render()
				await run(card, "Deploy")
				return true
			}
			if (t == "Add this card to your hand.") {
				log("To hand:" + card)
				card.rested = false
				card.pilot = null
				card.unit = null
				p.hand.push(card)
				return true
			}
			if (t.indexOf("Add 1 of your Shields to your hand.") == 0) {
				const target = p.shield.pop()
				if (target) {
					log(`🎴${p.name} took shield`)
					target.rested = false
					p.hand.push(target)
				}
			}
			if (t == "Add 1 of your Shields to your hand.") return true
			if (t == "Add 1 of your Shields to your hand. Then, choose 1 enemy Unit with 5 or less AP. Deal 1 damage to it.") {
				const target = eu.filter(c => c.getAP() <= 5)[0]
				return await dealDamage(card, target)
			}
			if (t == "Add 1 of your Shields to your hand. Then, look at the top 2 cards of your deck and return 1 to the top and 1 to the bottom.") {
				let empty_units = p.battle.filter(bc => bc.type == "UNIT" && bc.pilot == null)
				// TODO
				const c = p.deck.pop()
				if (!c) return false
				if (c.type == "PILOT" && empty_units.length < 1 && p.hand.filter(c => c.type == "UNIT").length < 1) {
					log(p.name + " puts top card on bottom")
					p.deck = [c].concat(p.deck)
				} else {
					log(p.name + " leaves top card")
					p.deck.push(c)
				}
				return true
			}
			if (t.indexOf("Add 1 of your Shields to your hand. Then, if it is your turn, deploy 1 rested [Char's Zaku Ⅱ]((Zeon)･AP3･HP1) Unit token.") > -1) {
				if (window.active_player != p) return false
				const target = p.getToken("Char's Zaku Ⅱ")
				target.rested = true
				await p.addToBattle(target)
				return true
			}
			if (t.indexOf("Add 1 of your Shields to your hand. Then, during your turn, if a friendly (League Militaire) Unit is in play, deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.") > -1) {
				if (window.active_player != p) return false
				if (fu.filter(c => c.traits.includes("League Militaire").length > 0)) {
					await p.addToBattle(p.getToken("Parts"))
				}
				return true
			}
			if (t.indexOf("Add 1 of your Shields to your hand. Then, if it is your turn, deploy 1 [Tallgeese]((OZ)･AP4･HP2) Unit token. If it is your turn and a card with \"Corsica Base\" in its card name is in your trash, deploy 2 [Leo]((OZ)･AP1･HP1) Unit tokens instead.") > -1) {
				if (window.active_player != p) return false
				if (p.trash.filter(c => c.name.indexOf("Corsica Base")).length > 0) {
					await p.addToBattle(p.getToken("Leo"))
					await p.addToBattle(p.getToken("Leo"))
				} else {
					await p.addToBattle(p.getToken("Tallgeese"))
				}
				return true
			}
			if (t == "Rest this Base：All friendly Link Units get AP+1 during this turn.") {
				const targets = fu.filter(c => !c.rested && !c.sick && c.pilot && linksWith(c, c.pilot))
				if (targets.length < 1) return false
				rest(card)
				log("🎯" + card + " " + t)
				targets.forEach(c => c.ap_eot += 1)
				await sleep(400)
				await render()
				return true
			}
			if (t == "Rest this Base：Choose 1 friendly Unit. It gets AP+1 during this turn.") {
				const target = fu.filter(c => !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯" + card + " AP+1 " + target)
				target.ap_eot += 1
				return true
			}
			if (t == "【Once per Turn】②：Deploy 1 [Gundam]((White Base Team)･AP3･HP3) Unit token if you have no Units in play, deploy 1 [Guncannon]((White Base Team)･AP2･HP2) Unit token if you have only 1 Unit in play, or deploy 1 [Guntank]((White Base Team)･AP1･HP1) Unit token if you have 2 or more Units in play.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				if (!await p.pay(2)) return false
				window.once_per_turn.push(t + card.cid)
				if (fu.length == 0) {
					await p.addToBattle(p.getToken("Gundam"))
				} else if (fu.length == 1) {
					await p.addToBattle(p.getToken("Guncannon"))
				} else {
					await p.addToBattle(p.getToken("Guntank"))
				}
				return true
			}
			if (t == "【Once per Turn】②：Choose 1 friendly Unit with <Blocker>. Set it as active. It can't attack during this turn.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				const target = fu.filter(c => c.rested && c.hasTrait("Blocker"))[0]
				if (!target || !await p.pay(2)) return false
				window.once_per_turn.push(t + card.cid)
				activate(target)
				target.sick = true
				return true
			}
			if (t == "Choose 1 active enemy Unit. It gains <Blocker> during this turn.") {
				const target = eu.filter(c => !c.rested)[0]
				const attacker_count = fu.filter(c => !c.rested && !c.sick).length
				if (!target || attacker_count < 1) return false
				target.traits_eot.push("Blocker")
				return false
			}
			if (t == "Deploy 1 rested [Zaku Ⅱ]((Zeon)･AP1･HP1) Unit token.") {
				const c = p.getToken("Zaku Ⅱ")
				c.rested = true
				c.sick = true
				await p.addToBattle(c)
				return true
			}
			if (t == "Choose 1 of your active (League Militaire) Units and 1 enemy Unit that is Lv.3 or lower. Rest them.") {
				const target = eu.filter(c => c.level <= 3).toSorted(c => -c.ap)[0]
				if (!target) return false
				const friend = fu.filter(c => c.traits.includes("League Militaire")).toSorted(c => c.ap)[0]
				if (!friend) return false
				rest(friend)
				rest(target)
				return true
			}
			if (t == "Deploy 1 rested [GQuuuuuuX (Omega Psycommu)]((Clan)･AP3･HP2) Unit token and 1 rested [Red Gundam]((Clan)･AP2･HP3) Unit token.") {
				if (fu.length >= 6) return false
				for (const token of ["GQuuuuuuX (Omega Psycommu)", "Red Gundam"]) {
					const c = p.getToken(token)
					c.rested = true
					c.sick = true
					await p.addToBattle(c)
				}
				return true
			}
			let mo = t.match(/^Draw (\d).$/)
			if (mo) {
				p.draw(mo[1])
				return true
			}
			mo = t.match(/^Draw (\d). Then, discard (\d).$/)
			if (mo) {
				p.draw(mo[1])
				p.discard(mo[2])
				return true
			}
			if (t == "Place 1 EX Resource.") {
				// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf?v#:~:text=You%20may%20have%20up%20to,view%20cards%20in%20this%20location.
				// TODO: Replace existing rested EX Resource?
				if (p.resource.filter(item => item.name == "EX Resource").length >= 5) return false
				p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
				await render()
				await sleep(500)
				for (const c of p.battle) {
					await run(c, "", "When you place an EX Resource, ")
				}
				return true
			}
			if (t == "【Once per Turn】Choose 1 of your Resources. Set it as active.") {
				if (window.once_per_turn.includes(t + card.cid)) return false
				window.once_per_turn.push(t + card.cid)
				for (const c of p.resource) {
					if (c.rested) {
						activate(c)
						return true
					}
				}
				return false
			}
			if (t == "This Unit gets AP+2 during this turn.") {
				card.ap_eot += 2
				return true
			}
			if (t == "During this turn, this Unit gets AP+1 and, if it is a Link Unit, it gains <High-Maneuver>.") {
				card.unit.ap_eot += 1
				if (linksWith(card.unit, card)) card.unit.traits_eot.push("High-Maneuver")
				return true
			}
			if (t == "You may deploy 1 (Neo Zeon)/(Zeon) Unit card that is Lv.4 or lower from your hand.") {
				const target = p.hand.filter(item => item.level <= 4 && item.type == "UNIT" && (item.traits.includes("Neo Zeon") || item.traits.includes("Zeon"))).toSorted(item => -item.cost)[0]
				if (!target || fu.length >= 6) return false
				log("🎯Deploying " + target)
				await p.addToBattle(target)
				p.hand = p.hand.filter(item => item !== target)
				return true
			}
			if (t.indexOf("During this battle, your shield area cards can't receive damage from enemy Units that are Lv.4 or lower.") > -1) {
				p.traits_eot.push("unit.enemy.lv4- nodmg ShieldArea")
				return true
			}
			if (t.indexOf("Choose 1 friendly Unit. It recovers 3 HP.") > -1) {
				const target = fu.filter(c => c.damage > 0).toSorted(c => -c.damage)[0]
				if (!target) return false
				if (target.damage < 1) return false
				log("🎯Healing " + target)
				target.damage -= 3
				if (target.damage < 0) target.damage = 0
				return true
			}
			if (t.indexOf("Choose 1 friendly Unit. It gets AP+2 during this turn.") > -1) {
				const target = fu.filter(c => !c.rested && !c.sick).toSorted(c => c.getAP())[0]
				if (!target) return false
				const strongest_enemy = eu.toSorted(c => -c.getHP())[0]
				const enemy_hp = strongest_enemy && strongest_enemy.getAP() || 0
				const enemy_base_hp = (en.base && en.base.getHP()) || 0
				if (Math.max(enemy_hp, enemy_base_hp) <= target.getAP()) return false
				log("🎯Boosting " + target)
				target.ap_eot += 2
				return true
			}
			if (t.indexOf("Choose 1 of your Units. It gains <Breach 3> during this turn.") > -1) {
				const target = fu.filter(c => !c.rested && !c.sick).toSorted(c => c.ap)[0]
				if (!target || (en.shield.length < 1 && !en.base)) return false
				log("🎯Boosting " + target)
				target.traits_eot.push("Breach 3")
				return true
			}
			if (t.indexOf("Choose 1 friendly Unit that is Lv.2 or lower. It gains <First Strike> during this turn.") > -1) {
				const target = fu.filter(c => c.level <= 2 && !c.rested && !c.sick).toSorted(c => c.ap)[0]
				if (!target) return false
				log("🎯Boosting " + target)
				target.traits_eot.push("First Strike")
				return true
			}
			if (t.indexOf("Choose 1 friendly Unit. It can't receive battle damage from enemy Units with 2 or less AP during this battle.") > -1) {
				const target = fu.toSorted(c => -c.ap)[0]
				const enemies = eu.filter(c => c.getAP() <= 2)
				if (!target && enemies.length < 1) return false
				log("🎯Protecting " + target)
				target.traits_eot.push("enemy.unit.lv2- nodmg")
				return true
			}

			if (t === "If you have 3 or more (League Militaire) Units in play, draw 1.") {
				if (fu.filter(c => c.traits.includes("League Militaire")).length < 3) return false
				p.draw(1)
				return true
			}
			if (t.indexOf("If this is a (League Militaire) Unit, deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.") > -1) {
				if (!card.unit.traits.includes("League Militaire")) return false
				await p.addToBattle(p.getToken("Parts"))
				return true
			}
			if (t.indexOf("Deploy 1 [Hy-Gogg]((Cyclops Team)･AP2･HP1) Unit token.") > -1) {
				if (fu.length >= 6) return false
				p.addToBattle(p.getToken("Hy-Gogg"))
				return true
			}
			if (t == "Choose 1 enemy Unit that is Lv.5 or lower. Deal damage to it equal to the number of friendly Unit tokens in play.") {
				const target = eu.filter(c => c.level <= 5)[0]
				const token_count = fu.filter(c => c.type.indexOf("TOKEN") > -1).length
				if (!target || token_count < 1) return false
				dealDamage(card, target, token_count)
				return true
			}
			if (t.indexOf("If you have no (Earth Alliance) Unit tokens in play,") > -1) {
				if (fu.filter(c => c.type.indexOf("TOKEN") > -1 && c.traits.includes("Earth Alliance")).length > 0) return false
				if (t.indexOf("deploy 1 [Sword Strike Gundam]((Earth Alliance)･AP4･HP2･<Blocker>) or 1 [Launcher Strike Gundam]((Earth Alliance)･AP2･HP4･<Blocker>) Unit token.") > -1) {
					await p.addToBattle(p.getToken("Sword Strike Gundam"))
					return true
				}
				if (t.indexOf("deploy 1 [Aile Strike Gundam]((Earth Alliance)･AP3･HP3･<Blocker>) Unit token.") > -1) {
					await p.addToBattle(p.getToken("Aile Strike Gundam"))
					return true
				}
			}

			if (t == "All enemy Units get AP-1 during this turn.") {
				eu.forEach(item => item.ap_eot -= 1)
				return true
			}
			if (t == "Choose 1 enemy Unit. It gets AP-2 during this battle.") {
				const target = eu.toSorted(c => -c.ap)[0]
				if (!target) return false
				log("🎯Afflicting " + target)
				target.ap_eot -= 2  // TODO battle instead of turn
				return true
			}
			if (t.indexOf("Choose 1 enemy Unit. Deal 2 damage to it.") > -1) {
				const target = eu.toSorted(c => -c.hp)[0]
				return await dealDamage(card, target, 2)
			}
			if (t.indexOf("Choose 1 rested enemy Unit. Deal 1 damage to it.") > -1) {
				const target = eu.filter(c => c.rested).toSorted(c => -c.hp)[0]
				return await dealDamage(card, target, 1)
			}
			if (t.indexOf("Choose 1 enemy Unit. It gets AP-3 during this turn.") > -1) {
				const target = eu.toSorted(c => -c.ap)[0]
				if (!target) return false
				log("🎯Afflicting " + target)
				target.ap_eot -= 3
				return true
			}
			if (t == "If this Unit has 5 or more AP, choose 1 enemy Unit that is Lv.5 or higher. Deal 3 damage to it.") {
				if (card.getAP() < 5) return false
				const target = eu.filter(c => c.getHP() <= 3).toSorted(c => -c.ap)[0]
				return await dealDamage(card, target, 3)
			}
			if (t == " deal 1 damage to all enemy Units that are Lv.3 or lower.") {
				const targets = eu.filter(c => c.level <= 3)
				if (targets.length < 1) return false
				await targets.forEach(target => dealDamage(card, target, 1))
				return true
			}
			if (t.indexOf("Choose 1 enemy Unit with 3 or less HP. Return it to its owner's hand.") > -1) {
				const target = eu.filter(c => c.getHP() <= 3).toSorted(c => -c.ap)[0]
				if (!target) return false
				log("🎯Bouncing " + target)
				bounce(target)
				return true
			}
			mo = t.match(/Choose 1 enemy Unit with (\d) or less HP. Rest it./)
			if (mo) {
				const target = eu.filter(c => c.getHP() <= mo[1]).toSorted(c => -c.ap)[0]
				if (!target) return false
				log("🎯Resting " + target + " by " + card)
				rest(target)
				return true
			}
			if (t == "During this turn, this Unit may choose an active enemy Unit that is Lv.5 or lower as its attack target.") {
				card.traits_eot.push = "canAttackActiveUnitLv5-"
				return true
			}
			if (t == "Look at the top 3 cards of your deck. You may reveal 1 (Zeon)/(Neo Zeon) Unit card among them and add it to your hand. Return the remaining cards randomly to the bottom of your deck.") {
				let targets = p.deck.slice(-3)
				if (targets.length < 1) return false
				const target = targets.filter(c => c.traits.includes("Zeon") || c.traits.includes("Neo Zeon"))[0]
				if (target) {
					log(p.name + " picks from top 3: " + target)
					p.hand.push(target)
					targets = targets.filter(c => c !== target)
				}
				shuffle(targets)
				p.deck = targets.concat(p.deck.slice(0, -3))
				return true
			}

			log(`🚩🚩FIXME Not implemented ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
			return false
		}

		let game_over = false
			; (async () => {
				await loadCards()

				const p1 = new Player("Player 1")
				const p2 = new Player("Player 2")
				// access via CLI
				window.p1 = p1
				window.p2 = p2

				let p = p1
				p2.resource.push(p2.getCard(rndPick(EX_RESOURCES)))

				await render()
				while (true) {
					window.active_player = p
					// Set active
					if (p.base != null) activate(p.base)

					for (const c of p.resource) {
						if (c.rested) activate(c)
					}
					for (const c of p.battle) {
						if (c.rested) activate(c)
						c.sick = false
					}
					await sleep(1000)

					// Draw card
					try {
						p.draw()
						await render()
					} catch (ex) {
						log(ex)
						break
					}

					// Place resource
					let r = p.resource_deck.pop()
					if (r) {
						p.resource.push(r)
						await render()
						await sleep(1500)
					}
					let level = p.resource.length

					// Main phase
					log("🎚️" + p.name + " level " + level)
					let considered = []
					while (true) {
						let to_play = p.hand.filter(c => considered.indexOf(c) < 0).toSorted(c => ["BASE", "UNIT", "PILOT", "COMMAND"].indexOf(c.type))
						if (to_play.length < 1) break
						const c = to_play[0]
						considered.push(c)

						// TODO: Discounts
						if (c.level > level || c.cost > level) continue
						// already have a base
						if (c.type == "BASE" && p.base != null) continue
						// no empty unit
						let empty_units = p.battle.filter(bc => bc.type == "UNIT" && bc.pilot == null)
						if (c.type == "PILOT" && empty_units.length < 1) continue
						// max 6 units
						if (c.type == "UNIT" && p.battle.length >= 6) continue
						// log("Consider L" + c.level + " C" + c.cost + " " + c)
						await sleep(400)
						// ensure cards have HTML elements
						await render()
						let free_res_count = p.resource.filter(bc => bc.type.indexOf("EX") < 0).length || 0
						let ex_res_count = p.resource.filter(bc => bc.type.indexOf("EX") > -1).length || 0
						if (await p.pay(c.cost)) {
							await sleep(400)
							// Remove card from hand
							p.hand = p.hand.filter(item => item !== c)
							await render()
							if (c.type == "COMMAND") {
								// Do pilot part of command 1/3 of the time.
								if ((!c.text.indexOf("【Pilot】") > -1 || rnd(1, 3) > 1) && await run(c)) {
									log(`⚡Ran ${c.toString(true)} Main/Action: ${escapeHTML(c.text)}`)
									p.trash.push(c)
									await render()
									continue
								} else {
									if (empty_units.length > 0 && c.text.indexOf("【Pilot】") > -1) {
										await pair(empty_units[0], c)
										empty_units = p.battle.filter(bc => bc.type == "UNIT" && bc.pilot == null)
										continue
									}
									// No useful target, so don't play this and roll back payment.
									ex_res_count -= p.resource.filter(bc => bc.type.indexOf("EX") > -1).length || 0
									for (let i = 0; i < ex_res_count; ++i) {
										p.resource.push(getCard(rndPick(EX_RESOURCES)))
									}
									for (let i = 0; i < Math.max(free_res_count, c.cost); ++i) {
										activate(p.resource[i])
									}
									p.hand.push(c)
									continue
								}
							}
							if (c.type == "BASE") {
								log("🟨Deploy base " + c)
								c.rested = false
								p.base = c
								await render()
								await run(c, "Deploy")
							} else if (c.type == "UNIT") {
								await p.addToBattle(c)
								await render()
								await run(c, "Deploy")
							} else if (c.type == "PILOT" > -1) {
								await pair(empty_units[0], c)
								empty_units = p.battle.filter(bc => bc.type == "UNIT" && bc.pilot == null)
							}
							await sleep(800)
						}
					}

					await run(p.base, "Main")

					// attack
					while (true) {
						const can_attack = p.battle.filter(bc => bc.rested == false && bc.sick == false).toSorted(bc => -bc.ap)
						if (can_attack.length < 1) break
						const att = can_attack[0]
						if (att.getAP() < 1) {
							// TODO: Might get boosted later
							att.sick = true
							continue
						}
						const enemy = p === p1 ? p2 : p1

						// Battle Area
						let prone = enemy.battle.filter(bc => bc.rested).toSorted(def => def.getHP())
						if (att.traits_eot.includes("canAttackActiveUnitLv5-")) {
							const extra = enemy.battle.filter(bc => !bc.rested && bc.level <= 5)
							if (extra) prone = extra.concat(prone).toSorted(def => def.getHP())
						}

						// Base and shields also count as enemy player: https://www.gundam-gcg.com/en/cards/index.php?freeword=GD04-016#cards
						let must_attack_unit = att.text.indexOf("This Unit can't choose the enemy player as its attack target") > -1

						if (prone.length > 0 && (must_attack_unit || enemy.shield.length > can_attack.length || (att.traits.concat(att.traits_eot).filter(trait => trait.indexOf("Breach") > -1).length && prone.filter(def => att.getAP() >= def.getHP()).length > 0).length > 0)) {
							const def = prone[0]
							log("🔫" + att + " attacks " + def)
							rest(att)
							await sleep(500)
							await run(att, "Attack")
							await doBattle(att, def)
							continue
						}
						if (must_attack_unit) continue

						// Shield Area
						if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`unit.enemy.lv[${att.level}-9] nodmg ShieldArea`)))) {
							log("🛡️Shield area damage prevented.")
							continue
						}
						if (enemy.base) {
							let target = enemy.base
							log("🔫" + att + " attacks " + target)
							rest(att)
							await sleep(500)
							await run(att, "Attack")
							await doBattle(att, target)
						} else {
							log("🔫" + att + " attacks shield area")
							if (enemy.shield.length < 1) {
								for (const bc of enemy.battle) {
									if (!bc.rested && bc.hasTrait("Blocker") && !att.traits.concat(att.traits_eot).includes("High-Maneuver")) {
										log(`🛡️${bc} blocks ${att}`)
										rest(bc)
										rest(att)
										await sleep(500)
										await run(att, "Attack")
										await run(att, "", "blocked")
										await battle(att, bc)
										await doBattle(att, bc)
										continue
									}
								}
								rest(att)
								await battle(att, enemy.hand[0] || enemy.resource[0])
								log("💀" + enemy.name + " died from " + att)
								boom.play().catch(ex => { })
								await sleep(2000)
								game_over = true
								await render()
								break
							}
							if (enemy.shield.slice(-1)[0].hasTrait("protection.enemy.units")) continue
							rest(att)
							await battle(att, enemy.shield.slice(-1)[0])
							const mo = /Suppression/.exec(att.text)
							if (mo) {
								log("Suppression")
							}
							for (let i = 0; i < (mo ? 2 : 1); ++i) {
								const c = enemy.shield.pop()
								if (!c) break
								log("💥Broke shield " + c)
								activate(c)
								boom.play().catch(ex => { })
								const mo = /Burst】([^.]+)/.exec(c.text)
								let toTrash = true
								if (mo) {
									log("⚡Burst: " + mo[1])
									toTrash = !(await run(c, "Burst"))
									if (toTrash) {
										log("FIXME: fizzled")
									}
								}
								if (toTrash) enemy.trash.push(c)
								await render()
								await sleep(1000)
							}
						}
						await render()
					}
					if (game_over) break

					// End phase
					while (p.hand.length > 10) p.discard()
					for (const c of p1.battle.concat(p2.battle)) {
						const mo = c.text.match(/<Repair (\d)>/)
						if (mo && c.damage > 0) {
							log("🛠️Repair " + mo[1] + " " + c)
							c.damage -= mo[1]
							if (c.damage < 0) c.damage = 0
						}
						c.ap_eot = 0
						c.traits_eot = []
					}
					p.traits_eot = []
					window.once_per_turn = []
					// wait for untap animation
					await sleep(400)
					await render()
					// log(structuredClone(p))  // clone to keep current lists state
					p = p == p1 ? p2 : p1
				}
			})() /* .catch(error => {
	log("ERR " + error)
	console.trace()
}) */
	</script>
</body>

</html>
