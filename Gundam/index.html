			}
			if (t === "Choose 1 Unit card that is Lv.5 or lower from your trash. Pay its cost to deploy it.") {
				target = p.trash.filter(c => c.level <= 5 && c.type === "UNIT" && c.COST() <= p.resource.filter(c => !c.rested).length)[0]
				if (!target) return false
				await p.pay(target.COST())
				log(`💲Pay ${target.COST()} for ${target.type} #${target.cid} ${target.id} ${target.name}`)
				await p.deployFromTrash(target)
				return true
			}

			mo = t.match(/^Look at the top (\d) cards of your deck./)
			let look = mo && mo[1] || 0
			if (t.indexOf("Look at the top card of your deck.") === 0) look = 1
			if (look > 0) {
				if (hasText(t, "may deploy") && fu.length >= 6) return false
				targets = p.deck.slice(-look)
				if (targets.length < 1) return false
				let target = null
				if (hasText(t, "If it is a (Clan) card, you may reveal it and add it to your hand.")) {
					target = targets.filter(c => c.traits.includes("Clan"))[0]
				}
				if (hasText(t, "If it is a (Zeon)/(Neo Zeon) Unit card, you may reveal it and add it to your hand.")) {
					target = targets.filter(c => c.type === "UNIT" && (c.traits.includes("Zeon") || c.traits.includes("Neo Zeon")))[0]
				}
				mo = t.match(/You may deploy 1 \((.+?)\) Unit card that is Lv.4 or lower among them./)
				if (mo) {
					target = targets.filter(c => c.level <= 4 && c.traits.includes(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "PILOT")[0]
				}
				else if (hasText(t, "You may reveal 1 (Academy) Unit card/Command card among them and add it to your hand.")) {
					target = targets.filter(c => (c.type === "UNIT" || c.type === "COMMAND") && c.traits.includes("Academy"))[0]
				}
				mo = t.match(/You may reveal 1 \((.+?)\) Unit card\/Pilot card among them and add it to your hand./)
				if (mo) {
					target = targets.filter(c => (c.type === "UNIT" || c.type === "PILOT") && c.traits.includes(mo[1]))[0]
				}
				else if (hasText(t, "You may reveal 1 (CB) Unit card that is Lv.5 or lower among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "UNIT" && c.level <= 5 && c.traits.includes("CB"))[0]
				}
				else if (hasText(t, "You may reveal 1 green (Zeon) Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.type === "PILOT" && c.color === "GREEN" && c.traits.includes("Zeon"))[0]
				}
				// TODO: /reveal (\d) (\(.*?\)) ((Unit|Pilot|Base|Command) card\/?)+/ card among them
				else if (hasText(t, "You may reveal 1 green (Earth Federation) Unit card/1 card with \"AGE Device\" in its card name among them and add it to your hand.")) {
					target = targets.filter(c => hasText(c.nme, "AGE Device") || (c.type === "UNIT" && c.color === "GREEN" && c.traits.includes("Earth Federation")))[0]
				}
				else if (hasText(t, "You may reveal 1 (Zeon)/(Neo Zeon) Unit card among them and add it to your hand.")) {
					target = targets.filter(c => c.traits.includes("Zeon") || c.traits.includes("Neo Zeon"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Clan) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => c.traits.includes("Clan") && (c.type === "UNIT" || c.type === "PILOT"))[0]
				}
				else if (hasText(t, "You may reveal 1 (Operation Meteor)/(G Team) Unit card/Pilot card among them and add it to your hand.")) {
					target = targets.filter(c => (c.traits.includes("Operation Meteor") || c.traits.includes("G Team")) && (c.type === "UNIT" || c.type === "PILOT"))[0]
				} else if (target === null) {
					log(`🚩🚩FIXME No target for ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
					return false
				}

				if (target) {
					log(`🎴${p.name} reveals from top ${look}: ${target}`)
					if (hasText(t, "add it to your hand")) {
						toHand(target)
					} else if (hasText(t, "You may deploy")) {
						await p.deploy(target)
					}
					targets = targets.filter(c => c !== target)
				}
				shuffle(targets)
				p.deck = targets.concat(p.deck.slice(0, -look))
				return true
			}

			mo = t.match(/Add 1 of your Shields to your hand. ?/)
			if (mo) {
				// Always return true in this block to log handled acts.
				target = p.shield.pop()
				if (target) {
					log(`🎴${p.name} took shield`)
					target.rested = false
					p.hand.push(target)
				}
				t = t.slice(mo[0].length)

				if (t === "") return true
				if (t === "Then, choose 1 of your Units. It gets AP+2 during this turn.") {
					target = mySort(fu, c => c.AP())[0]
					if (!target) return true
					target.ap_eot += 2
					return true
				}
				if (t === "Then, choose 1 enemy Unit with 5 or less AP. Deal 1 damage to it.") {
					target = eu.filter(c => c.AP() <= 5)[0]
					if (!target) return true
					return await dealDamage(card, target)
				}
				if (t === "Then, look at the top 2 cards of your deck and return 1 to the top and 1 to the bottom.") {
					// TODO
					const c = p.deck.pop()
					if (!c) return true
					if (c.type === "PILOT" && p.getPairableUnits().length < 1 && p.hand.filter(c => c.type === "UNIT").length < 1) {
						log("🎴" + p.name + " puts top card on bottom")
						p.deck = [c].concat(p.deck)
					} else {
						log("🎴" + p.name + " leaves top card")
						p.deck.push(c)
					}
					return true
				}
				// TODO: Process per sentence.
				if (t === "Then, if a friendly (Jupitris) Unit is in play, choose 1 enemy Unit that is Lv.3 or lower. Rest it.") {
					if(!fu.some(c => c.traits.includes("Jupitris"))) return true
					target = eu.filter(c => c.LEVEL() <= 3)[0]
					if (!target) return true
					rest(target)
					return true
				}
				if (t === "Then, if there are 7 or more (Vulture) cards in your trash, choose 1 enemy Unit with 2 or less AP. Destroy it.") {
					if (!p.trash.filter(c => c.traits.includes("Vulture")).length < 7) return true
					target = eu.filter(c => c.AP() <= 2)[0]
					if (!target) return true
					await destroy(target)
					return true
				}
				if (t === "Then, if it is your turn, look at the top 2 cards of your deck and return 1 to the top. Place the remaining card into your trash.") {
					if (!myturn) return true
					const c = p.deck.pop()
					if (!c) return true
					if (c.type === "PILOT" && p.getPairableUnits().length < 1 && p.hand.filter(c => c.type === "UNIT").length < 1) {
						log("🗑️" + p.name + " puts top card in trash")
						p.trash.push(c)
					} else {
						log("🎴" + p.name + " leaves top card")
						p.deck.push(c)
					}
					return true
				}
				if (hasText(t, "Then, if it is your turn, deploy 1 rested [Char's Zaku Ⅱ]((Zeon)･AP3･HP1) Unit token.")) {
					if (!myturn) return true
					target = p.getToken("Char's Zaku Ⅱ")
					target.rested = true
					await p.deploy(target)
					return true
				}
				if (hasText(t, "Then, during your turn, if a friendly (League Militaire) Unit is in play, deploy 1 [Parts]((League Militaire)･AP1･HP1･This Unit can't choose the enemy player as its attack target) Unit token.")) {
					if (!myturn) return true
					if (fu.filter(c => c.traits.includes("League Militaire").length > 0)) {
						await p.deploy(p.getToken("Parts"))
					}
					return true
				}
				if (hasText(t, "Then, if it is your turn, deploy 1 [Tallgeese]((OZ)･AP4･HP2) Unit token. If it is your turn and a card with \"Corsica Base\" in its card name is in your trash, deploy 2 [Leo]((OZ)･AP1･HP1) Unit tokens instead.")) {
					if (!myturn) return true
					if (p.trash.filter(c => c.name.indexOf("Corsica Base")).length > 0) {
						await p.deploy(p.getToken("Leo"))
						await p.deploy(p.getToken("Leo"))
					} else {
						await p.deploy(p.getToken("Tallgeese"))
					}
					return true
				}
				if (t === "Then, Choose 1 friendly (ZAFT) Unit. It gets AP+3 during this turn.") {
					target = mySort(fu.filter(c => c.traits.includes("ZAFT")), c => myturn ? c.rested + c.sick : !c.rested)[0]
					if (!target) return true
					target.ap_eot += 3
					return true
				}
			}

			// Destroyed, so return true to log?
			if (t === "If it is your turn, return this Unit's paired Pilot to its owner's hand.") {
				if (!myturn) return true
				toHand(u.pilot)
				u.pilot = null
				return true
			}
			if (t === "If it is your opponent's turn and this is a (CB) Unit, draw 1.") {
				if (myturn || u.traits.includes("CB")) return false
				p.draw()
				return true
			}
			if (t === "look at the top 2 cards of your deck and return 1 to the top. Place the remaining card into your trash.") {
				const c = p.deck.pop()
				if (!c) return false
				if (c.type === "PILOT" && p.getPairableUnits().length < 1 && p.hand.filter(c => c.type === "UNIT").length < 1) {
					log("🗑️" + p.name + " puts top card in trash")
					p.trash.push(c)
				} else {
					log("🎴" + p.name + " leaves top card")
					p.deck.push(c)
				}
				return true
			}
			if (t === "If you have a (Clan) Unit in play, look at the top card of your deck. Return it to the top or bottom of your deck.") {
				if (!fu.some(c => c.traits.includes("Clan"))) return false
				// TODO
				return true
			}
			// Destroyed
			if (t === "All players draw 1.") {
				if (p1.deck.length < 1 && p2.deck.length < 1) throw Error("Draw by empty decks.")
				p1.draw()
				p2.draw()
				return true
			}

			log(`🚩🚩FIXME Not implemented ${card.type} ${card.id} ${act}${clause} "${escapeHTML(t)}". p battle length: ${p.battle.length}`)
			return false
		}

		let games = ngames.value
		let game = 0
		let game_start = new Date()
		let game_over = false
		let stop = false
		let p1 = null
		let p2 = null

		async function playGame() {
			// prevent lag and make game start easier to find
			// FIXMEs stay in the browser console
			dlog.innerHTML = ''
			if (game > 0) showStats()
			game += 1
			game_start = new Date()
			log(`\n<br>🏁Game ${game}/${games} start: ${game_start.toISOString().replace('T', ' ')}`)
			setGameOver(false)
			pid = 0
			cid = 0
			p1 = new Player("Player 1")
			p2 = new Player("Player 2")
			let p = rndPick([p1, p2])
			active_player = p
			let enemy = p === p1 ? p2 : p1
			enemy.resource.push(enemy.getCard(rndPick(EX_RESOURCES)))
			await render()
			let turn = 0
			while (true) {
				turn += 1
				active_player = p
				// Start phase
				// Active Step
				if (p.base !== null) activate(p.base)
				for (const c of p.resource) {
					if (c.rested) activate(c)
				}
				for (const c of p.battle) {
					if (c.rested) activate(c)
					c.sick = false
				}
				await sleep(1000)
				log("")
				// Start Step
				// Effects that specify “at the start of the turn” activate.
				// During
				for (const c of p1.battle.concat(p2.battle)) {
					// await run(c, "During Pair")
					// await run(c, "During Link")
				}

				// Draw phase
				try {
					p.draw(1, false)
					await render()
				} catch (ex) {
					log(ex)
					break
				}
				// Resource phase
				let r = p.resource_deck.pop()
				if (r) {
					p.resource.push(r)
					await render()
					await sleep(1500)
				}
				let level = p.resource.length
				log("📈Turn " + turn + " " + p.name + " level " + level)
				// Main phase
				let considered = []
				while (true) {
					let to_play = mySort(p.hand.filter(c => !considered.includes(c)), c => ["BASE", "UNIT", "PILOT", "COMMAND"].indexOf(c.type) * 10 + c.COST())
					if (to_play.length < 1) break
					const c = to_play[0]
					considered.push(c)
					const cost = c.COST()
					if (c.level > level || cost > level) continue
					// already have a base
					if (c.type === "BASE" && p.base !== null) continue
					// max 6 units
					if (c.type === "UNIT" && p.battle.length >= 6) continue

					let empty_units = p.getPairableUnits()
					let doPair = false
					if (empty_units.length < 1 && c.type === "PILOT") continue
					if (empty_units.length > 0 && (c.type === "PILOT" || hasText(c.text, "【Pilot】"))) {
						doPair = true
						empty_units.sort(u => !linksWith(u, c))
						if ((!linksWith(empty_units[0], c) && p.hand.filter(bc => linksWith(empty_units[0], bc)).length > 0)) {
							if (c.type === "PILOT") continue
							doPair = false
						}
					}
					// log(`🤔Considering ${c.type} #${c.cid} ${c.id} ${c.name}`)
					let free_res_count = p.resource.filter(bc => bc.type.indexOf("EX") < 0).length || 0
					let ex_res_count = p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
					if (await p.pay(cost)) {
						// Remove card from hand
						p.hand = p.hand.filter(item => item !== c)
						// ensure cards have HTML elements
						await render()
						await sleep(300)
						if (c.type === "COMMAND") {
							// Do pilot part of command 2/3 of the time.
							if ((!doPair || !hasText(c.text, "【Pilot】") || rnd(1, 3) > 2) && await run(c)) {
								log(`💲Pay ${cost} for ${c.type} #${c.cid} ${c.id} ${c.name}`)
								p.trash.push(c)
								await publish("When you activate a Command's 【Main】/【Action】 effect, ", p.battle)
								await render()
								await sleep(800)
								continue
							} else {
								if (doPair) {
									await pair(empty_units[0], c)
									continue
								}
								// No useful target, so don't play this and roll back payment.
								p.hand.push(c)
								ex_res_count -= p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
								for (let i = 0; i < ex_res_count; ++i) {
									p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
								}
								await render()
								for (let i = 0; i < Math.max(free_res_count, cost); ++i) {
									activate(p.resource[i])
								}
								continue
							}
						}
						log(`💲Pay ${cost} for ${c.type} #${c.cid} ${c.id} ${c.name}`)
						if (c.type === "BASE") {
							log("🟨Deploy base " + c)
							c.rested = false
							p.base = c
							await render()
							await run(c, "Deploy")
						} else if (c.type === "UNIT") {
							await p.deploy(c)
							await render()
							await run(c, "Deploy")
						} else if (c.type === "PILOT") {
							await pair(empty_units[0], c)
						}
						await sleep(800)
					}
				}

				await run(p.base, "Activate･Main")
				for (const c of p.battle) await run(c, "Activate･Main")

				// attack
				considered = []
				while (true) {
					const can_attack = mySort(p.battle.filter(bc => !bc.rested && !bc.sick && !considered.includes(bc)), bc => -bc.AP())
					if (can_attack.length < 1) break
					const att = can_attack[0]
					considered.push(att)
					if (att.AP() < 1) {
						// TODO: Might get boosted later
						att.sick = true
						continue
					}
					enemy = p === p1 ? p2 : p1

					// Battle Area
					let prone = mySort(enemy.battle.filter(bc => bc.rested), def => def.HP())
					if (att.traits_eot.includes("canAttack active.unit.damaged")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.damage > 0)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}
					if (att.traits_eot.includes("canAttack active.unit.apEqmin")) {
						const extra = enemy.battle.filter(bc => !bc.rested && bc.ap <= att.ap)
						if (extra) prone = mySort(extra.concat(prone), def => def.HP())
					}
					for (let i = 0; i <= 9; ++i) {
						if (att.traits_eot.includes(`canAttack active.unit.ap${i}min`)) {
							const extra = enemy.battle.filter(bc => !bc.rested && bc.AP() <= i)
							if (extra) prone = mySort(extra.concat(prone), def => def.HP())
						}
						if (att.traits_eot.includes(`canAttack active.unit.lv${i}min`)) {
							const extra = enemy.battle.filter(bc => !bc.rested && bc.level <= i)
							if (extra) prone = mySort(extra.concat(prone), def => def.HP())
						}
					}
					// Base and shields also count as enemy player: https://www.gundam-gcg.com/en/cards/index.php?freeword=GD04-016#cards
					let must_attack_unit = hasText(att.text, "This Unit can't choose the enemy player as its attack target")

					// TODO: Action can solve this in doBattle
					if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`noDmgShield enemy.unit.lv[${att.level}-9]`)))) {
						must_attack_unit = true
					}
					if (enemy.base && !att.canDamage(enemy.base)) {
						must_attack_unit = true
					}

					if (prone.length > 0 && (must_attack_unit || enemy.shield.length > can_attack.length || ((att.getBreach() || rnd(1, 2) > 1) && prone.some(def => att.AP() >= def.HP())))) {
						let def = prone[0]
						if (enemy.battle.some(bc => bc.text === "Enemy Units choose one of your rested (Maganac Corps) Units as their attack target if possible when attacking.")) {
							let newdef = enemy.battle.filter(bc => bc.rested && bc.traits.includes("Maganac Corps"))[0]
							def = newdef || def
						}
						log("🔫" + att + " attack " + def)
						rest(att, false)
						await sleep(500)
						defender = def
						await run(att, "Attack")
						await doBattle(att, def)
						continue
					}
					if (must_attack_unit) {
						continue
					}

					// Shield Area
					if (att.level <= 4 && enemy.traits_eot.some(txt => txt.match(new RegExp(`noDmgShield enemy.unit.lv[${att.level}-9]`)))) {
						log("🛡️Shield area damage prevented.")
						continue
					}
					if (enemy.base) {
						if (!att.canDamage(enemy.base)) {
							log(`🛡️${enemy.base} would take no battle damage from ${att}`)
							continue
						}
						let target = enemy.base
						log("🔫" + att + " attack " + target)
						rest(att, false)
						await sleep(500)
						defender = target
						await run(att, "Attack")
						await doBattle(att, target)
					} else {
						if (enemy.shield.length < 1) {
							log("🔫" + att + " attack " + enemy.name)
							rest(att, false)
							let blocked = false
							for (const bc of enemy.battle) {
								if (!bc.rested && bc.hasTrait("Blocker") && !att.hasTrait("High-Maneuver")) {
									log(`🛡️${bc} blocks ${att}`)
									rest(bc, false)
									await sleep(500)
									await run(att, "Attack")
									defender = bc
									await run(att, "", "blocked")
									await doBattle(att, bc)
									blocked = true
									break
								}
							}
							if (blocked) continue
							await battle(att, enemy.hand[0] || enemy.resource[0])
							log("💀" + enemy.name + " died")
							boom.playbackRate = 0.5
							boom.play().catch(ex => { })
							await sleep(2000)
							boom.playbackRate = 1
							endGame(att.owner)
							await render()
							break
						}
						if (enemy.shield.slice(-1)[0].hasTrait("protection.enemy.units")) {
							log("🛡️" + enemy.name + " shield protected from enemy units")
							continue
						}
						log("🔫" + att + " attacks " + enemy.name)
						rest(att, false)
						await battle(att, enemy.shield.slice(-1)[0])
						let sup = att.hasTrait("Suppression")
						if (sup) {
							log("❌Suppression")
						}
						for (let i = 0; i < (sup ? 2 : 1); ++i) {
							await enemy.breakShield()
						}
					}
					// Battle End
					for (const c of p1.battle.concat(p2.battle)) {
						c.ap_eob = 0
						c.hp_eob = 0
						c.traits_eob = []
					}
					for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
						c.ap_eob = 0
						c.hp_eob = 0
						c.traits_eob = []
					}
					p.traits_eob = []
					await render()
					if (game_over) break
				}
				if (game_over) break

				// End phase
				await actionStep()
				while (p.hand.length > 10) p.discard()
				for (const c of p1.battle.concat(p2.battle)) {
					await run(c, "", "At the end of the turn ")
					if (c.damage > 0) {
						const repair = c.getRepair()
						if (repair) {
							log(`🛠️Repair ${repair} ${c}`)
							c.damage -= repair
							if (c.damage < 0) c.damage = 0
						}
					}
					c.ap_eot = 0
					c.hp_eot = 0
					c.traits_eot = []
				}
				for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
					c.ap_eot = 0
					c.hp_eot = 0
					c.traits_eot = []
				}

				p.traits_eot = []
				once_per_turn = []
				// wait for untap animation
				await sleep(400)
				await render()
				// log(structuredClone(p))  // clone to keep current lists state
				p = p === p1 ? p2 : p1
			}
		}

		function setGameOver(b) {
			game_over = b
			bstart.disabled = !game_over
			bstop.disabled = game_over
		}

		let deck_stats = {}
		let player_wins = [0, 0]
		function endGame(winner) {
			setGameOver(true)
			if (winner) {
				let loser = (winner === p1 ? p2 : p1)
				player_wins[winner === p1 ? 0 : 1] += 1

				let wdl = deck_stats[winner.deckname] || [0, 0, 0]
				wdl[0] += 1
				deck_stats[winner.deckname] = wdl

				wdl = deck_stats[loser.deckname] || [0, 0, 0]
				wdl[2] += 1
				deck_stats[loser.deckname] = wdl
			} else {
				for (const p of [p1, p2]) {
					let wdl = deck_stats[p1.deckname] || [0, 0, 0]
					wdl[1] += 1
					deck_stats[p1.deckname] = wdl
				}
			}
			log(`🏁Game ${game}/${games} end: ${new Date().toISOString().replace('T', ' ')} in ${Math.round((new Date() - game_start) / 1000)}s`)
		}

		function sortWDL(a, b) {
			if (a[0] > b[0]) return -1
			if (a[0] < b[0]) return 1
			if (a[1] > b[1]) return -1
			if (a[1] < b[1]) return 1
			if (a[2] > b[2]) return 1
			if (a[2] < b[2]) return -1
			return 0
		}

		function sortStats(a, b) {
			return sortWDL(a[1], b[1])
		}

		function showStats() {
			// For CLI: let m = Number((new Date() - games_start) / 60000); JSON.stringify(Object.entries(deck_stats).sort(sortStats)) + " / " + game + " / " + m.toFixed(2) + " = " + (m/game*60).toFixed(2) + "s/game; " + ((games-game) * m/game).toFixed(2) + "m left"
			delay = 1
			const m = Number((new Date() - games_start) / 60000)
			let msg = `Game ${game}/${games} over in ${m.toFixed(2)}m; ${(m / game * 60).toFixed(2) + "s/game"}`
			if (game < games) msg += "; " + ((games - game) * m / game).toFixed(2) + "m left"
			msg += `<br>\n${p1.name}: ${player_wins[0]}; ${p2.name}: ${player_wins[1]}<br>\nDecks ranked by W/D/L:`
			const stats = Object.entries(deck_stats).sort(sortStats)
			for (let i = 0; i < stats.length; ++i) {
				msg += `<br>\n${1 + i}. <a href="#" onclick='showDeck(\"${escapeHTML(stats[i][0])}\"); event.preventDefault()'>${stats[i][0]}</a>: ${stats[i][1]}`
			}
			log(msg)
			setSpeed()
		}

		async function playGames() {
			if (Object.keys(cards).length < 1) await loadCards()
			window.games_start = new Date()
			while (!stop && game < games) {
				setSpeed()
				try {
					await playGame()
				} catch (ex) {
					log("FIXME?: " + ex + " " + ex.stack)
				}
				if (game > 1 && delay > 0 || game >= games) showStats()
				if (delay > 0) {
					delay = 1
					await render()
					if (games <= 10) await sleep(3000)
					else await sleep(350)
				}
			}
			stop = false
			game = 0
			deck_stats = {}
			player_wins = [0, 0]
		}

		function toggleSearch() {
			if (search.classList.contains('searchsmall')) search.classList.remove('searchsmall')
			else search.classList.add('searchsmall')
		}
		function toggleSettings() {
			if (settings.classList.contains("open")) settings.classList.remove("open")
			else settings.classList.add("open")
		}

		function findCards(query) {
			let html = ""
			let oldcid = cid
			let count = 0
			for (const entry of Object.entries(cards)) {
				const text = JSON.stringify(entry[1])
				if (text.indexOf(query) > -1) {
					let left = 5 + (count % 10) * 12
					let top = 10 + Math.floor(count / 10) * 15
					count += 1
					html += p1.getCard(entry[0]).toHTML(left, top)
				}
			}
			if (count === 0) html = "No results."
			else {
				cid = oldcid
				html = "" + count + " results:<br>" + html
			}
			searchresults.innerHTML = html
		}

		playGames()
	</script>
</body>

</html>
