<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Gundam Card Game implementation by Cees Timmerman, 2026-05-11 - 2026-06-13</title>
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%228 14 100 100%22><text y=%22.9em%22 font-size=%2290%22>💥</text></svg>" />
	<style>
		button,
		html,
		input,
		select {
			--fgcolor: white;
			--bgcolor: black;
			--WHITE: #ffffff;
			--BLUE: #0077bb;
			--PURPLE: #884499;
			--RED: #bb0055;
			--GREEN: #669944;
			--BROWN: #664400;

			background-color: var(--bgcolor);
			color: var(--fgcolor);
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			font-family: monospace;
			height: 1.5em;
		}

		a {
			color: var(--fgcolor);
			font-family: monospace;
		}

		button:disabled {
			opacity: 75%;
		}

		input[type=range] {
			vertical-align: middle;
			width: 150px;
		}

		input[type=number]::-webkit-inner-spin-button,
		input[type=number]::-webkit-outer-spin-button {
			-webkit-appearance: visible;
			/* transform: rotate(90deg); */
			/* height: 40px; */
			/* opacity: 50%; */
			filter: invert(100%);
		}

		a:visited {
			color: grey;
		}

		body {
			margin: 0;
		}

		#battlefield {
			background-image: url(GundamPlayMat.png);
			background-size: contain;
			background-repeat: no-repeat;
			position: absolute;
			width: 100vmin;
			height: 100vmin;
		}

		#dlog {
			position: absolute;
			margin: 0 0 0 85vmin;
			width: stretch;
			height: 100vmin;
			overflow-y: scroll;
			scrollbar-width: thin;
			background-color: #08080888;
			border: 1px solid var(--fgcolor);
		}

		#overlay {
			display: none;
			position: absolute;
			font-size: xx-large;
			z-index: 9000;
			width: 100%;
			height: 100%;
		}

		#pricecheck {
			cursor: help;
			top: 40vmin;
			left: 60vmin;
			position: absolute;
			width: 10vmin;
			height: 2vmin;
			display: block;
			font-size: 3vmin;
			z-index: 9001;
		}

		#settings {
			z-index: 9001;
			position: absolute;
			left: 0.5vmin;
			top: 47vmin;
			width: 4vmin;
			height: 4vmin;
			text-align: center;
			overflow: hidden;
			transition: 0.2s;
		}

		#search {
			z-index: 9001;
			position: absolute;
			width: 130vmin;
			/* https://caniuse.com/?search=width%3Astretch */
			height: 100vmin;
			text-align: center;
			overflow: auto;
			transition: 0.1s;
			background-color: #08080888;
			border: 1px solid var(--fgcolor);
			scrollbar-color: var(--fgcolor) var(--bgcolor);
			scrollbar-width: thin;
			top: 0vmin;
		}

		#tadecklist {
			width: 65vmin;
			height: 20vmin;
			position: absolute;
			top: 70vmin;
			left: 10vmin;
			scrollbar-width: thin;
			color: var(--fgcolor);
			background-color: #08080888;
		}

		.searchsmall {
			height: 4vmin !important;
			width: 4vmin !important;
			overflow: hidden !important;
			border: none !important;
			top: 47vmin !important;
			left: 5vmin !important;
		}

		.icon {
			cursor: pointer;
			font-size: 3vmin;
		}

		#wheel {
			transition: 0.3s;
		}

		.open #wheel {
			transform: rotate(360deg);
		}

		.open {
			width: auto !important;
			height: auto !important;
			background-color: #08080888;
			border: 1px solid grey;
			padding: 0 1em 1em 1em;
		}

		.card {
			background-size: contain;
			background-repeat: no-repeat;
			border: 1px solid var(--BROWN);
			border-radius: 0.6vmin;
			color: yellow;
			cursor: pointer;
			position: absolute;
			width: 10vmin;
			height: 13.96vmin;
			font-size: small;
			text-align: center;
			text-shadow: 1px 1px #08080888;
			transition: 0.1s;
		}

		.facedown {
			background-image: url(sleeve.webp) !important;
			background-color: white !important;
			border-color: black !important;
		}

		.facedown.resource {
			background-image: url(ResourceCardBack.webp) !important;
			background-color: white !important;
		}

		.rested {
			transform: rotate(90deg);
			margin-top: -1.4vmin;
		}

		.rested.resource {
			transform: rotate(70deg);
			margin: auto;
		}
	</style>
</head>

<body>
	<div id="overlay"></div>
	<div id="search" class="searchsmall">
		<div onclick="toggleSearch()" class="icon"><label for="searchtext">🔎Search</label></div>
		<input id="searchtext" onchange="findCards(this.value)">
		<div id="searchresults"></div>
	</div>
	<div id="battlefield"></div>
	<div id="dlog">
		<a href="https://www.gundam-gcg.com/en/rules/">Gundam Card Game</a><br>
	</div>
	<audio id="pewpew" src="pewpew.opus"></audio>
	<audio id="boom" src="boom.opus"></audio>
	<div id="settings">
		<div id="wheel" class="icon" title="Settings" onclick="toggleSettings()">⚙️</div>
		<div>
			<label for="volume">Volume</label>
			<input id="volume" type="range" value="0.1" min="0" max="1" step="0.1" onchange="setVolume()" /><br>
		</div>
		<div>
			<button id="bstop" onclick="stop = true; setGameOver(true); log(`⛔Stop by user input`)">Stop</button>
			<button id="bstart" disabled="true"
				onclick="if (game_over) { setTimeout(playGames, 0) } else alert('Game in progress')">Start</button>
			<label for="ngames">Games</label> <input id="ngames" type="number" value="1" min="1" max="9999"
				style="width: 45px;" onchange="games = this.value" oninput="clamp(this)" />
			<label for="ndelay">Speed</label> <input id="ndelay" type="number" value="50" min="0" max="100"
				style="width: 40px;" onchange="setSpeed()" oninput="clamp(this)" />%
		</div><br>
		<div>
			<label for="p1deck">P1 deck</label>
			<select id="p1deck" value="-1"></select>
			<br>
			<label for="p2deck">P2 deck</label>
			<select id="p2deck" value="0"></select>
			<br>
			<label for="deckOrder">Decklist order</label>
			<select id="deckOrder" value="TLCN">
				<option value="TLCN">Type, Level, Cost, Name</option>
				<option value="LTCN">Level, Type, Cost, Name</option>
				<option value="CTLN">Cost, Type, Level, Name</option>
			</select>
		</div><br>
		<div><button onclick="dlog.innerHTML=''">Clear log</button></div>
	</div>
	<div id="pricecheck"
		onclick="window.open(`https://www.cardtrader.com/en/search?q=${escapeHTML(encodeURIComponent(zoomed && zoomed.getAttribute('name')))}`, '_blank'); event.stopPropagation();">
		&nbsp;</div>
	<script>
		"use strict"
		let zoomed = ""

		function dict2str(d) {
			let s = ""
			for (const k in d) s += "" + k + ": " + d[k] + ", ";
			return s
		}

		function clamp(e) {
			let v = parseInt(e.value)
			e.value = parseInt(v > e.max ? e.max : e.value < e.min ? e.min : e.value)
		}

		function setVolume() {
			// complete silence pauses execution while screen is locked
			boom.volume = Math.max(0.005, parseFloat(volume.value))
			pewpew.volume = boom.volume
		}
		setVolume()

		let active_player = null
		let active_unit = null
		let attacker = null
		let defender = null
		let destroyer = null
		let once_per_turn = []

		let cards = {}
		// Why doesn't upstream list EXR promos like other promos?
		// "EXR-001_PR", "EXR-001_PR2", "EXR-001_PR3", "EXR-001_PR4", "EXR-001_PR5"
		const EX_RESOURCES = ["EXR-001", "EXRP-001", "EXRP-002"]

		function hasText(body, s) {
			return body.indexOf(s) > -1
		}

		function mySort(arr, fun) {
			return arr.toSorted((a, b) => fun(a) - fun(b))
		}

		function escapeHTML(unsafe) {
			return (unsafe || "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#039;")
		}
		function unescapeHTML(unsafe) {
			return (unsafe || "")
				.replaceAll("&amp;", "&")
				.replaceAll("&lt;", "<")
				.replaceAll("&gt;", ">")
				.replaceAll("&quot;", '"')
				.replaceAll("&#039;", "'")
		}

		function clear(card) {
			card.ap_eob = 0
			card.ap_eot = 0
			card.damage = 0
			card.hp_eob = 0
			card.hp_eot = 0
			card.rested = false
			card.sick = false
			card.stunned = false
			card.traits_eob = []
			card.traits_eot = []
			card.pilot = null
			card.unit = null
		}

		function toHand(card, fromTrash = false) {
			log(`🎴${card.owner.name} took ${card}`)
			if (fromTrash) card.owner.trash = card.owner.trash.filter(c => c !== card)
			clear(card)
			card.owner.hand.push(card)
			return true
		}

		function bounce(card) {
			// log("🔙Bounce " + card)
			card.owner.battle = card.owner.battle.filter(c => c !== card && c !== card.pilot)
			if (card.pilot) toHand(card.pilot)
			toHand(card)
		}

		function exile(cards) {
			for (const card of cards) {
				const p = card.owner
				log(`♻️${card.owner.name} exiles ${card} from trash`)
				p.trash = p.trash.filter(c => !cards.includes(c))
			}
		}

		function trash(card) {
			clear(card)
			card.owner.trash.push(card)
		}

		async function destroy(card) {
			if (!card) return false
			log("💥Destroy " + card)
			if (hasText(card.type, "BASE")) {
				card.owner.base = null
			} else {
				card.owner.battle = card.owner.battle.filter(c => c !== card)
			}
			await run(card, "Destroyed")
			if (card.pilot) trash(card.pilot)
			// tokens don't go to trash
			if (card.type.indexOf("TOKEN") < 0 && card.type.indexOf("EX") !== 0) trash(card)
			await render()
			boom.play().catch(ex => { })
			await sleep(900)
			return true
		}

		let delay = 1
		let maxDelay = 2
		function setSpeed() {
			delay = maxDelay - maxDelay * parseFloat(ndelay.value) / parseFloat(ndelay.max)
			boom.playbackRate = Math.max(1, 2 * parseFloat(ndelay.value) / parseFloat(ndelay.max))
			pewpew.playbackRate = boom.playbackRate
		}
		setSpeed()
		async function sleep(ms = 1000) {
			do {
				await new Promise(r => setTimeout(r, delay * ms))
			} while (delay === maxDelay)
		}

		function getel(card) {
			return document.getElementById("c" + card.cid)
		}

		function activate(card, effect = false) {
			if (card.stunned) {
				card.stunned = false
				return
			}
			card.rested = false
			if (card.pilot) card.pilot.rested = false
			if (effect) {
				log("🎯Activate " + card)
				run(card, "", " is set as active by an effect, ")
			}

			if (delay === 0) return
			try {
				getel(card).classList.remove("rested")
				if (card.pilot) getel(card.pilot).classList.remove("rested")
			} catch (ex) {
				// Not rendered yet.
			}
		}

		function rest(card, effect = true) {
			if (effect) log("💤Rest " + card)
			card.rested = true
			if (card.pilot) card.pilot.rested = true
			if (delay === 0) return
			try {
				getel(card).classList.add("rested")
				if (card.pilot) getel(card.pilot).classList.add("rested")
			} catch (ex) {
				// Not rendered yet.
			}
		}

		async function battle(att, def) {
			if (delay === 0) return
			try {
				/* Too much hassle to move the pilots at well
				const e = getel(att)
				const old_top = e.style.top
				const old_left = e.style.left
				const e2 = getel(def)
				e.style.top = e2.style.top
				e.style.left = e2.style.left
				await sleep(800)
				e.style.top = old_top
				e.style.left = old_left
				*/
				const sa = getel(att).style
				const sd = getel(def).style
				let x1 = parseFloat(sa.left) + 5
				let y1 = parseFloat(sa.top) + 5
				let x2 = parseFloat(sd.left) + 5
				let y2 = parseFloat(sd.top) + 5
				// Laser time!
				overlay.style.display = "block"
				overlay.innerHTML = `<svg id="boardbg" style="height:100vmin;width:100vmin">
					<line x1="${x1}vmin" y1="${y1}vmin" x2="${x2}vmin" y2="${y2}vmin" stroke="white" stroke-width="4px" stroke-linecap="round">
						<animate attributeName="stroke" values="#880;#fff;#880;" dur="0.2s" repeatCount="indefinite"/>
						<animate attributeName="stroke-width" values="2px;8px;2px;" dur="0.2s" repeatCount="indefinite"/>
					</line>
				</svg>`
				pewpew.play().catch(ex => { })
				// vfx
				await sleep(400)
				overlay.style.display = "none"
				// sfx
				await sleep(200)
			} catch (ex) {
				// cosmetic
			}
		}

		function showDeck(name) {
			window.pause = (window.pause || 0) + 1
			let html = `<div onclick="overlay.style.display = 'none'; window.pause = 0" style="width:100%; height:100%; background-color: #08080888">`
			overlay.style.display = "block"
			let decklist = ""
			for (decklist of decks) {
				if (decklist.split("\n")[0].indexOf(name) > -1) {
					break
				}
			}
			let oldcid = cid
			let fulldeck = []
			let deckname = "Anonymous deck"

			const lines = decklist.split("\n")
			const colors = []
			for (const line of lines) {
				if (line.indexOf("# ") === 0) {
					deckname = line.slice(2)
				}
				const [count, id] = line.split(" ")
				if (count >= 1) {
					for (let i = 0; i < count; ++i) {
						const c = p1.getCard(id)
						fulldeck.push(p1.getCard(id))
						if (!colors.includes(c.color)) colors.push(c.color)
					}
				}
			}
			html += deckname
			if (colors.length > 2) alert("Deck colors > 2: " + colors)
			if (fulldeck.length !== 50) alert("Deck length not 50: " + fulldeck.length)

			let deck = fulldeck.toSorted(
				(a, b) => {
					for (const c of deckOrder.value) {
						if (c === "T") {
							if (a.type > b.type) return 1
							if (a.type < b.type) return -1
						} else if (c === "L") {
							if (a.level > b.level) return 1
							if (a.level < b.level) return -1
						} else if (c === "C") {
							if (a.cost > b.cost) return 1
							if (a.cost < b.cost) return -1
						} else if (c === "N") {
							if (a.name > b.name) return 1
							if (a.name < b.name) return -1
						}
					}
					return 0
				}
			)
			const cols = deckOrder.value[0]
			let spliton = cols === "T" ? deck[0].type : cols === "L" ? deck[0].level : deck[0].cost
			let left = 10
			let top = 10
			let sumCost = 0
			let sumLevel = 0
			let text = ""
			let idcount = 0
			let oldc = null
			for (const c of deck) {
				if (!oldc || c.id !== oldc.id) {
					if (oldc && oldc.id !== c.id) text += `${idcount} ${oldc.id} ${oldc.name}\n`
					idcount = 1
					oldc = c
				} else idcount += 1
				sumCost += c.cost
				sumLevel += c.level
				if ((cols === "T" && spliton !== c.type)
					|| (cols === "L" && spliton !== c.level)
					|| (cols === "C" && spliton !== c.cost)) {
					spliton = cols === "T" ? c.type : cols === "L" ? c.level : c.cost
					left += 11
					top = 10
				}
				html += c.toHTML(left, top, false, 0, true)
				top += 4
				if (top > 54) {
					left += 11
					top = 10
				}
			}
			overlay.innerHTML = html + `<br>avg cost ${(sumCost / 50).toFixed(2)}; avg level ${(sumLevel / 50).toFixed(2)}
<textarea id="tadecklist" onclick="event.stopPropagation()">${text}${idcount} ${oldc.id} ${oldc.name}\n</textarea></div>`
		}

		function zoom(e) {
			zoomed = e
			event.preventDefault()
			event.stopPropagation()
			if (hasText(e.style.transform, "scale")) {
				pricecheck.style.display = "none"
				e.style.transform = e.old_transform
				e.style.zIndex = e.old_zIndex
				e.style.top = e.old_top
				e.style.left = e.old_left
				if (window.pause && window.pause > 0) window.pause -= 1
			} else {
				e.old_transform = e.style.transform
				e.old_zIndex = e.style.zIndex
				e.old_top = e.style.top
				e.old_left = e.style.left

				e.style.transform = "scale(5)"
				e.style.zIndex = 9000
				if (parseInt(e.old_top) < 40) e.style.top = "40vmin"
				e.style.left = "40vmin"
				window.pause = (window.pause || 0) + 1
				pricecheck.style.left = `${parseFloat(e.style.left) + 19}vmin`
				pricecheck.style.top = `${parseFloat(e.style.top) - 27}vmin`
				pricecheck.style.display = "block"
			}
		}

		function log(s = "") {
			if (delay > 0 || s.indexOf(" start:") > -1) {
				dlog.innerHTML += s + "<br>"
				dlog.scrollTop = dlog.scrollHeight
			}
			if (hasText("" + s, "FIXME")
				|| hasText("" + s, "o link")
			) console.log(s)
		}

		function rnd(min, max) {
			return Math.floor(min + Math.random() * (1 + max - min))
		}

		function rndPick(arr) {
			return arr[Math.floor(Math.random() * arr.length)]
		}
		// var Type;
		// (function (Type) {
		// 	Type[Type["RESOURCE"] = 0] = "RESOURCE";
		//     Type[Type["BASE"] = 1] = "BASE";
		//     Type[Type["COMMAND"] = 2] = "COMMAND";
		//     Type[Type["PILOT"] = 3] = "PILOT";
		// 	Type[Type["UNIT"] = 4] = "UNIT";
		// 	Type[Type["UNITTOKEN"] = 5] = "UNITTOKEN";	
		// })(Type || (Type = {}));

		function getPilotName(card) {
			if (card.type === "PILOT") {
				let brace = card.name.indexOf(" (")
				if (brace > -1) return card.name.slice(0, card.name.indexOf(" ("))
				return card.name
			}
			let rv = getSectionText(card, "Pilot")
			return rv.slice(1, rv.indexOf(" ("))
		}

		async function pair(unit, pilot) {
			log(`🧑‍✈️Pair ${pilot.AP()}/${pilot.HP()} #${pilot.cid} ${getPilotName(pilot)} with ${unit}`)
			unit.pilot = pilot
			pilot.unit = unit
			await render()
			await run(unit, "When Paired")
			await publish("When you pair ", active_player.battle)
			// await run(unit, "During Pair")
			if (unit.link && linksWith(unit, pilot)) {
				log("🔗Link")
				unit.sick = false
				await run(unit, "When Linked")
				active_unit = unit
				await run(unit.owner.base, "", " Unit links, ")
				// await run(unit, "During Link")
			}
		}

		function linksWith(unit, pilot) {
			if (!pilot) return false
			let pilot_name = getPilotName(pilot)
			for (let part of unit.link.split(" / ")) {
				if (part === `[${pilot_name}]`) return true // (Neil)
				if (part === `[${pilot.name}]`) return true // (Machu)
				if (pilot_name === "Quattro Bajeena" && part === "Char Aznable") return true
				if (part.indexOf(" Trait") > -1) part = part.slice(0, -6)
				if (unit.traits.includes(part.slice(1, -1))) return true
			}
			return false
		}

		class Card {
			constructor(type = "UNIT",
				name = "",
				ap = 0,
				hp = 0,
				level = 0,
				cost = 0,
				text = "",
				zones = [],
				traits = [],
				link = "",
				id = "",
				color = "BROWN") {
				this.id = id
				this.color = ["WHITE", "BLUE", "PURPLE", "RED", "GREEN"].indexOf(color) >= 0 ? color : "BROWN"
				this.level = parseInt(level) || 0
				this.cost = parseInt(cost) || 0
				// let type_num = parseInt(type) || type === 0? Type.RESOURCE : Type.UNITTOKEN
				// if (Type[type]) {
				// 	// number or string, we want number here
				// 	type_num = parseInt(type)? type : Type[type]
				// }
				this.type = type || ""
				this.name = name || ""
				this.text = unescapeHTML(text || "")
				this.zones = zones || []
				this.traits = traits || []  // new for each, unlike in Python
				this.traits_eob = []
				this.traits_eot = []
				this.link = link || ""
				this.ap = parseInt(ap) || 0
				this.ap_eob = 0
				this.ap_eot = 0
				this.hp_eob = 0
				this.hp_eot = 0
				this.hp = parseInt(hp) || 0
				this.damage = 0
				this.rested = false
				this.sick = false
				this.stunned = false
			}
			LEVEL() {
				let rv = this.level
				if (this.owner.hand.includes(this)) {
					if (this.text === "While you have no Units that are Lv.6 or higher in play, this card in your hand gets Lv. -1 and cost -1 for each enemy Unit in play." && !this.owner.battle.some(c => c.level >= 6)) {
						rv -= (this.owner === p1 ? p2 : p1).battle.length
					}
				}
				return rv
			}
			COST() {
				let rv = this.cost
				if (this.owner.hand.includes(this)) {
					if (this.text === "While you have a (CB) Link Unit in play, this card in your hand gets cost -1." && this.owner.battle.some(c => c.traits.includes("CB") && c.linked())) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Titans) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.traits.includes("Titans")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Earth Federation) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.traits.includes("Earth Federation")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have 2 or more (Superpower Bloc)/(UN) Units in play, this card in your hand gets cost -1." && this.owner.battle.filter(c => c.traits.includes("Superpower Bloc") || c.traits.includes("UN")).length >= 2) {
						rv -= 1
					}
					if (this.text === "While you have no Units that are Lv.6 or higher in play, this card in your hand gets Lv. -1 and cost -1 for each enemy Unit in play." && !this.owner.battle.some(c => c.level >= 6)) {
						rv -= (this.owner === p1 ? p2 : p1).battle.length
					}
				} else if (this.owner.trash.includes(this)) {
					if (this.text === "This card in your trash gets cost -1.") {
						rv -= 1
					}
				}
				return rv
			}
			AP() {
				let rv = this.ap + this.ap_eob + this.ap_eot
				const t = this.text + (this.pilot && this.pilot.text || "")
				if (this.owner.resource.length >= 7 && hasText(t, "While you are Lv.7 or higher, this Unit gets AP+2.")) rv += 2
				if (this.damage > 0 && hasText(t, "While this Unit is damaged, it gets AP+2.")) {
					rv += 2
				}
				if (this.pilot) {
					rv += this.pilot.ap
					if (this.linked()) {
						if (hasText(t, "【During Link】 This Unit gets AP+2.")) rv += 2
						if (hasText(t, "【During Link】 This Unit gets AP+1 and HP+1.")) rv += 1
					}
				}
				if (hasText(t, "While this Unit has <Repair>, it gets AP+1.") && this.getRepair() > 0) rv += 1
				if (hasText(t, "While you have another (Titans) Unit in play, this gets AP+1.") && this.owner.battle.some(c => c !== this && c.hasTrait("Titans"))) rv += 1
				if (hasText(t, "While you have another (Triple Ship Alliance) Unit in play, this Unit gets AP+1 and <Blocker>.") && this.owner.battle.some(c => c !== this && c.hasTrait("Triple Ship Alliance"))) rv += 1
				if (hasText(t, "While you have another Unit with <High-Maneuver> in play, this Unit gets AP+1.") && this.owner.battle.some(c => c !== this && c.hasTrait("High-Maneuver"))) rv += 1
				if (hasText(t, "While there is a friendly white Base in play, this Unit gets AP+2.") && this.owner.base && this.owner.base.color === "WHITE") rv += 2
				if (hasText(t, "While no enemy Base is in play, this Unit gets AP+1.") && !(this.owner == p1 ? p2 : p1).base) rv += 1
				if (hasText(t, "While you have another (Jupitris) Unit in play, this Unit gets AP+1 and <Repair 1>.") && this.owner.battle.some(c => c !== this && c.hasTrait("Jupitris"))) rv += 1
				if (t === "During your turn, while you have a (CB) Pilot in play, this Unit gets AP+2." && active_player === this.owner && this.owner.battle.some(c => c.pilot && c.pilot.traits.includes("CB"))) rv += 2
				if (hasText(t, "【During Link】This Unit gets AP+2 for each of your rested (CB) Units.") && this.linked()) rv += this.owner.battle.filter(c => c.rested && c.hasTrait("CB")).length * 2
				if (hasText(t, "While you have a Unit token in play, this Unit gets AP+1.") && this.owner.battle.some(c => hasText(c.type, "TOKEN"))) rv += 1
				if (active_player !== this.owner && hasText(this.type, "TOKEN")) {
					// "Friendly" instead of "your" implies team base counts too.
					rv += this.owner.battle.filter(c => hasText(c.text, "All friendly Unit tokens get AP+1 during your opponent's turn.")).length
				}
				if (hasText(t, "While there are 4 or more Command cards in your trash, this Unit gets AP+1 and HP+1.<br>") && this.owner.trash.filter(c => c.type === "COMMAND").length >= 4) {
					rv += 1
				}
				// bonus from other units
				for (const c of this.owner.battle) {
					if (active_player == this.owner && this.owner.trash.length >= 7 && this.traits.includes("Vulture") && hasText(t, "【During Link】During your turn, while there are 7 or more cards in your trash, all your other (Vulture) Units get AP+2.") && c.linked()) rv += 2
				}
				return rv
			}
			HP() {
				let rv = this.hp
				if (this.pilot) {
					rv += this.pilot.hp
					if (this.linked()) {
						if (hasText(this.text, "【During Link】This Unit gets AP+1 and HP+1.")
							|| hasText(this.text, "【During Link】This Unit gets HP+1.")) {
							rv += 1
						}
					}
				}
				if (hasText(this.text, "While there are 4 or more Command cards in your trash, this Unit gets AP+1 and HP+1.<br>") && this.owner.trash.filter(c => c.type === "COMMAND").length >= 4) {
					rv += 1
				}
				return rv - this.damage
			}
			canDamage(def) {
				if (hasText(def.text, "During your turn, while this Unit has <Breach>, it can't receive battle damage from enemy Units with 3 or less AP.") && active_player === def.owner && def.getBreach() && this.AP() <= 3) return false

				if (hasText(def.text, "During your turn, while you have a (CB) Link Unit in play, this Unit can't receive battle damage from enemy Units with 3 or less AP.") && this.AP() <= 3 && active_player === def.owner && def.battle.some(c => c.hasTrait("CB") && c.linked())) return false

				if (def.facedown && def.owner.battle.some(c => c.text === "While this Unit is rested, friendly Shields can't receive battle damage from enemy Units.")) return false

				if ((def.facedown || def === def.owner.base) && this.level <= 4 && def.owner.traits_eob.includes("noDmgShield enemy.unit.lv4min")) return false

				if (hasText(def.text, "While you have a rested (Zeon) Unit in play, this Base can't receive battle damage from enemy Units that are Lv.4 or lower.") && this.level <= 4 && def.owner.battle.some(c => c.rested && c.hasTrait("Zeon"))) return false

				if (def.traits_eob.some(txt => txt.match(new RegExp(`noDmg enemy.unit.ap[${this.level}-9]min`)))) return false
				if (def.traits_eob.some(txt => txt.match(new RegExp(`noDmg enemy.unit.lv[${this.level}-9]min`)))) return false
				if (def.traits_eot.some(txt => txt.match(new RegExp(`noDmg enemy.unit.ap[${this.level}-9]min`)))) return false
				if (def.traits_eot.some(txt => txt.match(new RegExp(`noDmg enemy.unit.lv[${this.level}-9]min`)))) return false
				return true
			}
			linked() {
				return (this.pilot && linksWith(this, this.pilot)) || (this.unit && linksWith(this.unit, this))
			}
			recover(number) {
				if (this.damage < 1 || number < 1) return false
				log("🛠️Recover " + number + " " + this)
				this.damage -= parseInt(number)
				if (this.damage < 0) this.damage = 0
				if (this.linked && !once_per_turn.includes(this.text + this.cid) && hasText(this.text, "【During Link】【Once per Turn】During your turn, when this Unit recovers HP, if you have 4 or less cards in your hand, draw 1.") && this.owner.hand.length <= 4) {
					this.owner.draw()
					once_per_turn.push(this.text + this.cid)
				}
				return true
			}
			toString(simple = false) {
				let rv = simple ? "" : (this.type === "COMMAND" || hasText(this.type, "RESOURCE")) ? `#${this.cid} ` : `${this.AP()}/${this.HP()} #${this.cid} `
				if (this.type === "COMMAND" && this.unit) return rv + getPilotName(this)
				if (this.type === "PILOT" && simple) return getPilotName(this)
				let pilot_name = ""
				if (this.pilot) pilot_name = getPilotName(this.pilot)
				return rv + `${this.name}${pilot_name ? " + " + pilot_name : ""}`
			}
			toDict() {
				return {
					"id": this.id,
					"color": this.color,
					"level": this.level,

					"name": this.name,

					"zones": this.zones,

				return `<div id="c${this.cid}" name="${escapeHTML(this.name)}" class="card ${this.rested ? "rested" : ""}${facedown ? " facedown" : ""}${this.type === "RESOURCE" ? " resource" : ""}" style="z-index:${z}; left:${left}vmin; top:${top}vmin; border-color: var(--${this.color}); background-color: var(--${this.color});background-image: url(https://exburst.dev/gundam/cards/sd/${id}.webp);" onclick='zoom(this)'>${this.cid} ${this.damage ? '<div style="color: red">' + this.damage + " DMG</div>" : ""} ${this.sick ? '<div style="color: red">not ready</div>' : ""}${this.AP()}/${this.HP()}${raw ? dict2str(this) : ""}</div>`

			hasTrait(trait) {
				if (trait === "protection.enemy.units" && this.facedown && this.owner.battle.filter(c => c.rested && hasText(c.text, "While this Unit is rested, friendly Shields can't receive battle damage from enemy Units.")).length > 0) {

				let t = this.text
				if (this.pilot && this.pilot.type == "PILOT") {  // COMMANDs lack PILOT abilities.
					t += "<br>" + this.pilot.text
				}
				if (trait === "Blocker") {

					if (hasText(t, "While you have a (CB) Pilot in play, this Unit gains <Blocker>.")) {
						if (this.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) return true
					}
					if (hasText(t, "While you have another (Triple Ship Alliance) Unit in play, this Unit gets AP+1 and <Blocker>.") && this.owner.battle.some(c => c !== this && c.hasTrait("Triple Ship Alliance"))) return true
					if (hasText(t, "While 3 or more enemy Units are in play, this Unit gains <Blocker>.") && (this.owner == p1 ? p2 : p1).battle.length >= 3) return true
					if (hasText(t, "While this Unit has 5 or more AP, it gains <Blocker>.") && this.AP() >= 5) return true

				}
				if (trait === "First Strike") {
					if (this.owner.resource.length >= 7 && hasText(t, "【During Link】While you are Lv.7 or higher, this Unit gains <First Strike>.") && this.linked()) return true
					if (active_player === this.owner && hasText(t, "During your turn, while this Unit is battling an enemy Unit that is Lv.2 or lower, it gains <First Strike>.") && defender && defender.level <= 2 && hasText(defender.type, "UNIT")) return true

				if (trait === "High-Maneuver") {

				}

				if (trait === "Suppression") {

		// https://bost.ocks.org/mike/shuffle/compare.html
		function shuffle(array) {
			let m = array.length, t, i
			while (m) {
				i = Math.floor(Math.random() * m--)
				t = array[m]
				array[m] = array[i]
				array[i] = t
			}
		}

		let pid = 0
		class Player {
			loadDeck(deck) {
				this.deckname = "Anonymous deck"
				this.deck = []
				this.fulldeck = []
				const lines = deck.split("\n")
				const colors = []
				for (const line of lines) {
					if (line.indexOf("# ") === 0) {
						this.deckname = line.slice(2)
						log(`🎴${this.name} deck: <a href="#" onclick='showDeck(\"${escapeHTML(this.deckname)}\"); event.preventDefault()'>${this.deckname}</a>`)
					}
					const [count, id] = line.split(" ")
					if (count >= 1) {
						for (let i = 0; i < count; ++i) {
							const c = this.getCard(id)
							c.owner = this
							this.deck.push(c)
							this.fulldeck.push(this.getCard(id))
							if (!colors.includes(c.color)) colors.push(c.color)
						}
					}
				}
				if (colors.length > 2) throw Error("Deck colors > 2: " + colors)
				if (this.deck.length !== 50) throw Error("Deck length not 50: " + this.deck.length)
				shuffle(this.deck)
			}

			constructor(name) {
				this.pid = ++pid
				this.name = name
				this.hand = []
				let deck = null
				if (pid === 1) deck = p1deck.value < 0 ? decks[rnd(0, decks.length - 1)] : decks[p1deck.value]
				if (pid === 2) deck = p2deck.value < 0 ? decks[rnd(0, decks.length - 1)] : decks[p2deck.value]

				this.loadDeck(deck)
				// Maybe still useful for fuzzing.
				// for (let i = 0; i < 50; ++i) {
				// 	const t = Type[rnd(1, 4)]
				// 	this.deck.push(new Card(t, t+i, rnd(1, 5), rnd(1, 5), rnd(1, 7), rnd(1, 5), "", "", "ST04-008_PR", "RED"))
				// }
				this.resource_deck = []
				for (let i = 0; i < 10; ++i) {
					// R-003 is hard to count while rested
					this.resource_deck.push(this.getCard("R-00" + rnd(4, 9)))
				}
				this.battle = []
				this.shield = []
				this.base = this.getCard("EXB-001")  // new Card("BASE", "EX Base", 0, 3)
				this.resource = []
				this.trash = []
				this.traits_eob = []
				this.traits_eot = []

				// Opening hand
				this.draw(5, false)
				// Shields
				for (let i = 0; i < 6; ++i) {

				const c = this.shield.pop()

				log(`💥Broke shield ${this.shield.length + 1}: ${c}`)
				activate(c)
				boom.play().catch(ex => { })
				let toTrash = true
				let t = /Burst】([^.]+)/.exec(c.text)
				if (t) {
					t = t[1]
					await run(c, "Burst")
					toTrash = !(hasText(t, "Add this card to your hand") || hasText(t, "Deploy this card"))
				}
				if (toTrash) {
					// log("🗑️Trash " + c)
					trash(c)
				}
				await render()
				await sleep(1000)
				return true
			}

			async deploy(card) {
				if (card.type.indexOf("UNIT") < 0) throw Error("Not a unit: " + card)
				if (this.battle.length >= 6) {
					const weakest = mySort(this.battle, c => c.AP())[0]
					await destroy(weakest)
				}
				if (card.LEVEL() <= 3 && card.type == "UNIT" && p1.battle.concat(p2.battle).some(c => hasText(c.text, "All Units that are Lv.3 or lower other than Unit tokens are deployed rested.") && c.linked())) card.rested = true
				log(`🚀Deploy ${card.rested ? "rested " : ""}${card}`)
				card.sick = true
				card.damage = 0
				this.battle.push(card)
			}

			async deployFromTrash(card) {
				this.trash = this.trash.filter(c => c !== card)
				card.from_trash = true
				await this.deploy(card)
				card.from_trash = false
			}

			draw(number = 1, effect = true) {
				if (effect) publish("When you draw with an effect, ", active_player.battle)
				number = parseInt(number)
				log("🎴" + this.name + " draw " + number)
				for (let i = 0; i < number; ++i) {
					if (this.deck.length < 1) {
						endGame(this === p1 ? p2 : p1)
						throw Error("💀" + this.name + " lost by empty deck")
					}
					this.hand.push(this.deck.pop())
				}
			}

			discard(number = 1) {
				number = parseInt(number)
				for (let i = 0; i < number; ++i) {
					const c = this.hand[Math.floor(Math.random() * this.hand.length)]
					if (!c) return
					log("🗑️" + this.name + " discards " + c)
					this.hand = this.hand.filter(item => item !== c)
					this.trash.push(c)
				}
			}

			getCard(id) {
				const d = cards[id]
				if (!d) {
					const msg = "Card not found: " + id
					log(msg)
					throw Error(msg)
				}
				const rv = Card.fromDict(d)
				// DeckPlanet bug workarounds. See also cards.json.
				rv.text = rv.text.replaceAll("<br />", "<br>").replaceAll("[action]", "【Action】").replaceAll("[br]", "<br>").replaceAll("[burst]", "【Burst】").replaceAll("[breach 3]", "【Breach 3】").replaceAll("[deploy]", "【Deploy】").replaceAll("[main]", "【Main】").replaceAll("[pilot]", "【Pilot】").replaceAll("[when paired]", "【When Paired】")

				cid += 1
				rv.cid = cid
				rv.owner = this
				return rv
			}

			getPairableUnits() {
				return this.battle.filter(c => !c.pilot && !hasText(c.text, "This Unit can't be paired with a Pilot."))
			}

			getToken(name) {
				// Yes, names are not unique.
				for (const k in cards) if (cards[k].name === name && hasText(cards[k].type, "TOKEN")) return this.getCard(k)
			}

			mill(number) {
				const top = this.deck.slice(-number)
				this.deck = this.deck.slice(0, -number)
				this.trash = this.trash.concat(top)
				return top
			}

			async pay(cost, doLog = false) {
				// Payment can be rolled back if command has no target.
				cost = parseInt(cost)
				if (cost > this.resource.filter(r => !r.rested).length) return false
				if (doLog) log("💲Pay " + cost)
				let paid = 0
				// EX last
				for (const r of mySort(this.resource.filter(c => !c.rested), c => c.type.indexOf("EX"))) {
					rest(r, false)
					paid += 1
					if (hasText(r.type, "EX")) {
						// log("💲Spending EX Resource " + r.id)
						this.resource = this.resource.filter(item => item !== r)
						// Wait for rest animation and show gone.
						await sleep(300)
						await render()
					}
					if (paid >= cost) break
				}
				return true
			}
		}

		// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf section 9.
		// [Action] COMMAND cards and [Activate-Action] effects.
		async function actionStep() {
			// log("Action step")
			await render()
			let p = active_player
			let pass = 0
			while (pass < 2) {
				p = (p === p1 ? p2 : p1)
				let level = p.resource.length
				let ran = false
				const targets = p.hand.filter(c => c.type === "COMMAND").concat(p.battle).concat(p.base)
				shuffle(targets)
				for (const c of targets) {
					if (!c) continue
					let cost = c.COST()
					let free_res_count = p.resource.filter(c => c.type.indexOf("EX") < 0).length || 0
					let ex_res_count = p.resource.filter(c => hasText(c.type, "EX")).length || 0
					let refund = false
					if (c.type === "COMMAND") {
						if (c.LEVEL() > level || cost > level) continue
						if (await p.pay(cost)) {
							p.hand = p.hand.filter(item => item !== c)
							if (await run(c, "Action")) {
								ran = true
								log(`💲Pay ${cost} for ${c.type} #${c.cid} ${c.id} ${c.name}`)
								c.owner.trash.push(c)
								await render()
							} else {
								refund = true
							}
						}
					} else {
						await run(c, "Activate･Action")
					}
					if (refund) {
						// No useful target, so don't play this and roll back payment.
						ex_res_count -= p.resource.filter(bc => hasText(bc.type, "EX")).length || 0
						for (let i = 0; i < ex_res_count; ++i) {
							p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
						}
						await render()
						for (let i = 0; i < Math.max(free_res_count, cost); ++i) {
							activate(p.resource[i])
						}
						p.hand.push(c)
						continue
					}
				}
				if (ran) pass = 0
				else pass += 1
			}
		}

		function getDamage(att, def) {
			if (!att.canDamage(def)) return 0
			let damage = Math.max(0, att.AP())
			if (hasText(def.text, "If you have a (CB) Pilot in play, when this Unit receives damage from an enemy, reduce it by 1.") && def.owner.battle.some(c => c.pilot && c.pilot.hasTrait("CB"))) {
				if (damage > 0) damage -= 1
			}
			return damage
		}

		async function doBattle(att, def) {
			attacker = att
			defender = def
			for (const trait of def.traits_eot) {
				const mo = trait.match(/redirect_battle_damage (\d+)/)
				if (mo) {
					for (const c of def.owner.battle) {
						if (c.cid == mo[1]) defender = def
					}
				}
			}
			await actionStep()
			def = defender

			// vfx
			await battle(att, def)
			let afs = att.hasTrait("First Strike")
			let dfs = def.hasTrait("First Strike")
			let dmg_to_def = getDamage(att, def)
			let dmg_to_att = getDamage(def, att)
			// TODO deathtouch
			if (dfs && !afs && dmg_to_att > att.HP()) {
			} else {
				if (dmg_to_def > 0) {
					def.damage += dmg_to_def
					if (dmg_to_att > 0) await run(def, "", "When this Unit deals battle damage")
				}
				// TODO Undying etc.
				if (def.owner.trash.includes(def) || def.HP() < 1) {
					def.traits_eob.push("dead")
					if (hasText(def.type, "UNIT")) {
						const breach = att.getBreach()
						if (breach) {
							if (def.owner.base) {
								log("➤Breach " + breach)
								await dealDamage(att, def.owner.base, breach)
							} else if (def.owner.shield.length > 0) {
								log("➤Breach " + breach)
								await def.owner.breakShield()
							}
						}
					}
					destroyer = att
					await destroy(def)
					// await run(att, "", "During your turn, when this Unit destroys an enemy Unit with battle damage, ")
					await run(att, "", " destroys an enemy Unit with battle damage, ")
					if (att.owner.base) await run(att.owner.base, "", " destroys an enemy Unit with battle damage, ")
				}
			}
			if (afs && def.traits.includes("dead")) dmg_to_att = 0
			att.damage += dmg_to_att
			if (dmg_to_att > 0) await run(def, "", "When this Unit deals battle damage")
			if (att.HP() < 1 && !att.owner.trash.includes(att)) await destroy(att)

			// end of battle
			for (const c of p1.battle.concat(p2.battle)) {
				c.ap_eob = 0
				c.hp_eob = 0
				c.traits_eob = []
			}
			for (const c of p1.trash.concat(p2.trash).concat(p1.hand).concat(p2.hand)) {
				c.ap_eob = 0
				c.hp_eob = 0
				c.traits_eob = []
			}
			att.owner.traits_eob = []
			def.owner.traits_eob = []
			defender = null
			attacker = null
			await render()
		}

		async function dealDamage(source, target, amount = 1) {
			if (!target) return false
			amount = Math.max(0, parseInt(amount) - target.hp_eob)
			if (target.hp_eot > 0) {
				amount -= target.hp_eot
				target.hp_eot = Math.max(0, target.hp_eot - amount)
			}
			log(`🎯${source} deals ${amount} effect damage to ${target}`)
			if (amount > 0) {
				target.effect_damage = amount
				await run(target, "When this Unit receives effect damage from an enemy, ")
				target.damage += Math.max(0, target.effect_damage)
				if (target.HP() < 1) await destroy(target)
			}
			return true
		}

		function getSectionText(card, act = "Main", clause = "", limit = true) {
			// debug card
			// if (card.id === "GD04-058" && act == "Destroyed") {
			// 	log("FIXME: DEBUG " + act + " " + clause + " " + card)
			// }
			let mo = null
			for (let line of card.text.split("<br>")) {
				const rex = new RegExp("(.*?)" + (clause ? clause : ("【([^】]*?)" + act + "([^】]*?)】")) + "([^.].+?)(?:<br|$)")
				mo = card.text.match(rex)
				if (mo) break
			}
			if (!mo) return ""
			const limits = mo[1]
			if (hasText(limits, "During your turn") && !active_player === card.owner) return ""
			if (hasText(limits, "During Pair") && !(card.pilot || card.unit)) return ""
			if (hasText(limits, "During Link") && !card.linked()) return ""
			const limits2 = mo[2]
			const limits3 = mo[3]
			const text = mo.length === 3 ? mo[2] : mo[4]
			// if ((act === "During Pair" || act === "During Link") && (text.indexOf("【") === 0 || text.indexOf("During") === 0 || text.indexOf("When") === 0)) return ""

			let l3ok = !limits3
			let mo2 = null
			if (!l3ok) {
				// 【When Paired･(Cyber-Newtype)/(Newtype) Pilot】
				mo2 = limits3.match(/^･\((.+)\) Pilot$/)
				if (mo2 && (!card.pilot || !mo2[1].split(")/(").some(part => card.pilot.traits.includes(part)))) {
					log(`🚫No link; ${card.pilot.traits} not in ${mo2[1]}`)
					return ""
				}
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(\d) or Higher Pilot$/)
				if (mo2 && !card.pilot.level >= parseInt(mo2[1])) return ""
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(\d) or Lower Pilot$/)
				if (mo2 && !card.pilot.level <= parseInt(mo2[1])) return ""
				l3ok = true
			}
			if (!l3ok) {
				mo2 = limits3.match(/^･Lv.(White|Blue|Purple|Red|Green) Pilot$/)
				if (mo2 && !card.pilot.color === mo2[1]) return ""
				l3ok = true
			}

			if (act != "Pilot") {
				if ((mo.length > 3 && limits2 && limits2 !== "Activate･") || !l3ok) log(`🚩FIXME: ${card} ACT${act}/CLAUSE${escapeHTML(clause)} LIMITS2` + escapeHTML(limits2) + "LIMITS3" + escapeHTML(limits3) + " MO" + escapeHTML("" + mo) + " TEXT" + text + " MO2" + mo2)
			}
			if (limit && once_per_turn.includes(text + card.cid)) return ""
			return text
		}
		async function run(card, act = "Main", clause = "") {
			if (!card) return false
			if (card.type === "COMMAND") {
				// log("DEBUG Running " + card + " " + act + " " + clause)
			}
			let rv = await runCard(card, act, clause)
			if (card.pilot && card.pilot.type === "PILOT") rv = rv || await runCard(card.pilot, act, clause)
			return rv
		}
		async function publish(clause, cards) {
			for (const c of cards) await run(c, "", clause)
		}
		async function runCard(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t) return false
			let rv = await runCard2(card, act, clause)
			const context = (act && hasText(card.text, "Activate･" + act)) ? " " + card : ""
			if (rv) log(`⚡Ran${context} ${(act || clause)}: ${escapeHTML(t)}`)
			return rv
		}
		async function runCard2(card, act, clause) {
			let t = getSectionText(card, act, clause)
			if (!t) {
				// if (clause || hasText(card.text, act)) log(`🚩No act ${act} or clause "${escapeHTML(clause)}" found in ${card.id} ${escapeHTML(card.text)}`)
				return false
			}
			const p = card.owner
			const en = (p === p1 ? p2 : p1)
			const myturn = (active_player === p)
			const fu = p.battle
			const eu = mySort(en.battle, c => -c.COST())
			// make sure to apply effects to the unit card
			const u = card.unit || card
			let targets = []
			let target = null
			let mo = null

			mo = t.match(/\/.Action./)
			if (mo) t = t.slice(mo[0].length)

			if (t.slice(0, 40) === "If you deploy this Unit from your trash,") {
				if (!card.from_trash) return false
				t = t[41].toUpperCase + t.slice(42)
			}

			mo = t.match(/^If you are attacking the enemy player, /)
			if (mo) {
				if (!attacker || defender) return false
				t = t.slice(mo[0].length)
			}
			
			mo = t.match(/^If you have (\d) or more other \((.+)\) Units in play, /)
			if (mo) {
				const types = mo[2].split(")/(")
				if(!fu.filter(c => c !== u && types.some(part => c.traits.includes(part))).length >= parseInt(mo[1])) return false
				t = t.slice(mo[0].length)
			}

			if (t === "you may choose 7 (Vulture) cards from your trash. Exile them from the game. If you do, choose 1 enemy Unit/Base that is Lv.8 or lower. Destroy it.") {
				const mine = p.trash.filter(c => c.traits.includes("Vulture"))
				if (mine.length < 7) return false
				const their = mySort(eu, c => -c.AP())[0] || en.base
				if (!their) return false
				exile(mine.slice(0, 7))
				await destroy(their)
				return true
			}

			// Burst - Optional, so why not Attack etc.?
			if (t === "Activate this card's 【Main】.") {
				await runCard(card, "Main")
				return true
			}

			// triggered
			if (t === "if this is a blue Unit, it gains <High-Maneuver> during this turn.") {
				if (u.color !== "BLUE") return false
				u.traits_eot.push("High-High-Maneuver")
				return true
			}

			// Action
			if (!hasText(t, "instead")) {
				mo = t.match(/^[Cc]hoose 1 enemy Unit with (\d) or less AP. /)
				if (mo) {
					targets = eu.filter(c => c.AP() <= mo[1])
					target = targets[0]
					if (!target) return false
					t = t.slice(mo[0].length)
				}
				mo = t.match(/^[Cc]hoose 1 enemy Unit with (\d) or less HP. /)
				if (mo) {
					targets = eu.filter(c => c.HP() <= mo[1])
					target = targets[0]
					if (!target) return false
					t = t.slice(mo[0].length)
				}
				mo = t.match(/^[Cc]hoose 1 enemy Unit that is Lv.(\d) or lower. /)
				if (mo) {
					targets = eu.filter(c => c.LEVEL() <= mo[1])
					target = targets[0]
					if (!target) return false
					t = t.slice(mo[0].length)
				}
				mo = t.match(/^[Cc]hoose 1 of your \(Titans\) Link Units battling an enemy Unit. /)
				if (mo) {
					if (!defender || defender.type == "BASE") return false
					target = fu.filter(c => c.traits.includes("Titans") && c.linked())[0]
					if (!target) return false
					t = t.slice(mo[0].length)
				}

				if (t === "Deal damage to it equal to the number of friendly Unit tokens in play.") {
					const token_count = fu.filter(c => hasText(c.type, "TOKEN")).length
					if (token_count < 1) return false
					return await dealDamage(card, target, token_count)
				} else if (t === "Destroy it.") {
					await destroy(target)
					return true
				} else if (t === "Rest it.") {
					rest(target)
					return true
				} else if (t === "Set it as active.") {
					activate(target)
					return true
				}
			}
			if (hasText(t, `Choose 1 enemy Unit that is Lv.4 or lower. Deal 3 damage to it. If there are 2 or more cards with "Improved Technique" in their card name in your trash, choose 1 enemy Unit instead.`)) {
				target = p.trash.filter(c => hasText(c.name, "Improved Technique")).length >= 2 ? mySort(eu, c => -c.HP())[0] : mySort(eu.filter(c => c.level <= 4), c => -c.HP())[0]
				if (!target) return false
				await dealDamage(card, target, 3)
				return true
			} else if (hasText(t, "choose 1 enemy Unit instead.")) {
				log("FIXME: t===" + t)
			}
			// Main / battle Action
			if (t === "Choose 1 of your Units. During this battle, reduce battle damage it receives by 3.") {
				if (attacker && attacker.owner == p && defender) {
					log("🎯EOB DMG-3 " + attacker)
					attacker.hp_eob += 3
					return true
				}
				return false
			}

			// Activate Main
			mo = t.match(/^<Support (\d)>/)
			if (mo) {
				let support = parseInt(mo[1])
				if (u.rested || !u.sick && u.AP() > support) return false
				target = mySort(fu.filter(c => !c.rested && !c.sick), c => c.AP())[0]
				if (!target) return false
				rest(u)
				target.ap_eot += support
				return true
			}
			if (t === "【Once per Turn】④：Set this Unit as active.") {
				if (!u.rested || !await p.pay(4)) return false
				once_per_turn.push(t + card.cid)
				activate(u)
				return true
			}
			if (t === "【Once per Turn】Exile 3 (Titans) cards from your trash: This Unit gains <Breach 4> during this turn.") {
				targets = p.trash.filter(c => c.traits.includes("Titans")).slice(0, 3)
				if (targets.length < 3) return false
				once_per_turn.push(t + card.cid)
				exile(targets)
				u.traits_eot.push("Breach 4")
				return true
			}
			if (t === "【Once per Turn】Rest 1 of your (Earth Federation) Units：Choose 1 enemy Unit that is Lv.3 or lower. Rest it.") {
				target = eu.filter(c => c.LEVEL <= 3)[0]
				if (!target) return false
				target2 = fu.filter(c => !c.rested && c.traits.includes("Earth Federation"))[0]
				if (!target2) return false
				once_per_turn.push(t + card.cid)
				rest(target2)
				rest(target)
				return true
			}
			if (t === "You may choose 2 (Titans) cards from your trash. Exile them from the game. If you do, choose 1 enemy Unit that is Lv.4 or lower. Rest it.") {
				target = eu.filter(c => c.LEVEL() <= 4)[0]
				if (!target) return false
				targets = p.trash.filter(c => c.traits.includes("Titans")).slice(0, 2)
				if (targets.length < 2) return false
				once_per_turn.push(t + card.cid)
				exile(targets)
				rest(target)
				return true
			}
			if (t === "Exile 3 blue cards from your trash：Set this Unit as active. It can't choose the enemy player as its attack target during this turn.") {
				if (!u.rested) return false
				targets = p.trash.filter(c => c.color === "BLUE").slice(0, 3)
				if (targets.length < 3) return false
				exile(targets)
				u.traits_eot.push("must_attack_unit")
				activate(u)
				return true
			}
			if (t === `②, return this Unit to the bottom of its owner's deck：Choose 1 Unit card with "Impulse Gundam" in its card name that is Lv.4 or higher from your trash. Deploy it.`) {
				if (u.pilot || p.resource.filter(c => !c.rested).length < 2) return false
				// TODO: Improve target
				target = p.trash.filter(c => c.level >= 4 && hasText(c.name, "Impulse Gundam"))[0]
				if (!target || !u.rested || !await p.pay(2, true)) return false
				p.battle = p.battle.filter(c => c !== u)
				p.deck = [u].concat(p.deck)
				await p.deployFromTrash(target)
				return true
			}
			if (hasText(t, "During this turn, all Units paired with a Pilot get AP+2.")) {
				const mine = fu.filter(c => c.pilot && (myturn ? !c.rested : c.rested))
				const their = eu.filter(c => c.pilot && (myturn ? c.rested : !c.rested))
				if (mine.length <= their.length) return false
				fu.concat(eu).filter(c => c.pilot).forEach(c => c.ap_eot += 2)
				return true
			}
			if (hasText(t, "Deploy 1 EX Base.")) {
				if (p.base) return false
				p.base = p.getCard("EXB-001")
				return true
			}
			if (hasText(t, "Choose 1 active friendly Unit. Rest it. If you do, choose 1 enemy Unit whose Lv. is equal to or lower than the Unit rested with this ability. Deal 3 damage to it.")) {
				const afu = fu.filter(c => !c.rested)[0]
				if (!afu) return false
				target = eu.filter(c => c.level <= afu.level)[0]
				if (!target) return false
				rest(afu)
				await dealDamage(card, target, 3)
				return true
			}
			// Activated Attack
			if (t === "If you are attacking an enemy Unit, this Unit gets AP+2 during this battle.") {
				if (!defender || !hasText(defender.type, "UNIT")) return false
				u.ap_eob += 2
				return true
			}
			if (t === "If you are attacking a damaged enemy Unit, this Unit gains <Breach 3> during this battle.") {
				if (!defender || defender.damage < 1) return false
				u.traits_eob.push("Breach 3")
				return true
			}

			if (hasText(card.text, " to an enemy Unit that is Lv.5 or lower, destroy that enemy Unit.")) {
				if (!defender || !defender.LEVEL() <= 5) return false
				await destroy(defender)
				return true
			}
			if (hasText(card.text, " to an enemy Unit that is Lv.5 or lower, if you have a (CB) Pilot in play, destroy that enemy Unit.")) {
				if (!defender || !defender.level <= 5 || !fu.some(c => c.pilot && c.pilot.hasTrait("CB"))) return false
				await destroy(defender)
				return true
			}
			if (t === "this Unit recovers 2 HP.") {
				return u.recover(2)
			}
			if (t === "【Once per Turn】②：Choose 1 of your Units. It recovers 2 HP.") {
				target = mySort(fu.filter(c => c.damage > 0), c => -c.damage)[0]
				if (!target) return false
				if (!await p.pay(2)) return false
				once_per_turn.push(t + card.cid)
				target.recover(2)
				return true
			}
			// blocked
			if (t === " by an enemy Unit that is Lv.4 or lower, it can't receive battle damage during this battle.") {
				u.traits_eob.push("noDmg enemy.unit.lv4min")
				return true
			}
			// battle Action command
			if (t === "Choose 1 rested friendly (CB) Unit. Change the attack target of the battling enemy Unit to it.") {
				if (myturn) return false
				target = fu.filter(c => c.rested && c !== defender && c.traits.includes("CB"))[0]
				if (!target) return false
				log("🎯" + target + " is new attack target")
				defender = target
				return true
			}
			if (t === "Choose 1 to 2 friendly (Clan) Units. They can't receive battle damage from enemy Units that are Lv.2 or lower during this turn.") {
				targets = fu.filter(c => c.traits.includes("Clan")).slice(0, 2)
				const enemy_count = eu.filter(c => c.level <= 2 && myturn ? c.rested : (!c.rested && !c.sick)).length
				if (!targets.length > 0 || enemy_count < 1) return false
				log("🎯" + targets + " battle damage protection from Lv2- this turn")
				for (const target of targets) target.traits_eot.push("noDmg enemy.unit.lv2min")
				return false
			}
			// Burst
			if (t === "Deploy this card." && card.type === "BASE") {
				card.rested = false
				p.base = card
				await render()
				await run(card, "Deploy")
				return true
			}
			if (t === "Add this card to your hand.") {
				return toHand(card)
			}
			if (t === "Rest this Base：All friendly Link Units get AP+1 during this turn.") {
				if (card.rested) return false
				// Main ability so check for can attack.
				targets = fu.filter(c => !c.rested && !c.sick && c.linked())
				if (targets.length < 1) return false
				rest(card)
				log("🎯" + card + " " + t)
				targets.forEach(c => c.ap_eot += 1)
				await sleep(400)
				await render()
				return true
			}
			if (t === "Rest this Base：Choose 1 friendly Unit. It gets AP+1 during this turn.") {
				if (card.rested) return false
				target = fu.filter(c => !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯AP+1 " + target)
				target.ap_eot += 1
				return true
			}
			if (t === "Rest this Base：Choose 1 of your damaged Units. It gets AP+2 during this turn.") {
				if (card.rested) return false
				target = fu.filter(c => c.damage > 0 && !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯AP+2 " + target)
				target.ap_eot += 2
				return true
			}
			if (t === "Rest this Base：If a friendly (Clan) Link Unit is in play, choose 1 friendly Unit. It gets AP+2 during this turn.") {
				if (card.rested || !fu.some(c => c.hasTrait("Clan") && c.linked())) return false
				target = fu.filter(c => !c.rested && !c.sick)[0]
				if (!target) return false
				rest(card)
				log("🎯AP+2 " + target)
				target.ap_eot += 2
				return true
			}
			if (t === "【Once per Turn】②：Deploy 1 [Gundam]((White Base Team)･AP3･HP3) Unit token if you have no Units in play, deploy 1 [Guncannon]((White Base Team)･AP2･HP2) Unit token if you have only 1 Unit in play, or deploy 1 [Guntank]((White Base Team)･AP1･HP1) Unit token if you have 2 or more Units in play.") {
				if (!await p.pay(2, true)) return false
				once_per_turn.push(t + card.cid)
				if (fu.length === 0) {
					await p.deploy(p.getToken("Gundam"))
				} else if (fu.length === 1) {
					await p.deploy(p.getToken("Guncannon"))
				} else {
					await p.deploy(p.getToken("Guntank"))
				}
				return true
			}
			if (t === "【Once per Turn】②：Choose 1 friendly Unit with <Blocker>. Set it as active. It can't attack during this turn.") {
				target = fu.filter(c => c.rested && c.hasTrait("Blocker"))[0]
				if (!target || !await p.pay(2)) return false
				once_per_turn.push(t + card.cid)
				activate(target, true)
				target.sick = true
				return true
			}
			if (t === "Choose 1 active enemy Unit. It gains <Blocker> during this turn.") {
				target = eu.filter(c => !c.rested).toSorted(c => c.AP())[0]
				if (!target) return false
				log("🎯+Blocker " + target)
				target.traits_eot.push("Blocker")
				return true
			}
			if (t === "Choose 1 of your (ZAFT) Units with 5 or more AP. It gains <First Strike> during this turn.") {
				target = fu.filter(c => !c.rested && c.traits.includes("ZAFT") && c.AP() >= 5)[0]
				if (!target || eu.length < 1) return false
				target.traits_eot.push("First Strike")
				return true
			}
			if (t === "Choose 1 of your (Titans) Units whose Lv. is equal to or lower than this Unit. It gets AP+1 during this turn.") {
				target = mySort(fu.filter(c => !c.sick && c.traits.includes("Titans") && c.LEVEL() <= u.LEVEL()), c => c.rested)[0]
				if (!target || eu.length < 1) return false
				target.ap_eot += 1
				return true
			}
			mo = t.match(/Deploy 1 rested \[(.*?)\].*? Unit token./)
			if (mo) {
				const c = p.getToken(mo[1])
				c.rested = true
				await p.deploy(c)
				return true
			}
			if (t === "Choose 1 of your active (League Militaire) Units and 1 enemy Unit that is Lv.3 or lower. Rest them.") {
				target = mySort(eu.filter(c => c.level <= 3), c => -c.AP())[0]
				if (!target) return false
				const friend = mySort(fu.filter(c => !c.rested && c.traits.includes("League Militaire")), c => c.AP())[0]
				if (!friend) return false
				rest(friend)
				rest(target)
				return true
			}
			if (t === "Deploy 1 rested [GQuuuuuuX (Omega Psycommu)]((Clan)･AP3･HP2) Unit token and 1 rested [Red Gundam]((Clan)･AP2･HP3) Unit token.") {
				if (fu.length >= 6) return false
				for (const token of ["GQuuuuuuX (Omega Psycommu)", "Red Gundam"]) {
					const c = p.getToken(token)
					c.rested = true
					c.sick = true
					await p.deploy(c)
				}
				return true
			}
			mo = t.match(/^Draw (\d).$/)
			if (mo) {
				p.draw(mo[1])
				return true
			}
			mo = t.match(/^Draw (\d). Then, discard (\d).$/)
			if (mo) {
				p.draw(mo[1])
				p.discard(mo[2])
				return true
			}
			if (t === "Place 1 EX Resource.") {
				// https://www.gundam-gcg.com/en/pdf/comprehensiverules_en.pdf?v#:~:text=You%20may%20have%20up%20to,view%20cards%20in%20this%20location.
				// TODO: Replace existing rested EX Resource?
				if (p.resource.filter(item => item.name === "EX Resource").length >= 5) return false
				p.resource.push(p.getCard(rndPick(EX_RESOURCES)))
				await render()
				await sleep(500)
				for (const c of p.battle) {
					await run(c, "", "When you place an EX Resource, ")
				}
				return true
			}
			if (t === "【Once per Turn】Choose 1 of your Resources. Set it as active.") {
				for (const c of p.resource) {
					if (c.rested) {
						once_per_turn.push(t + card.cid)
						activate(c, true)
						return true
					}
				}
				return false
			}
			if (t === "This Unit gets AP+2 during this turn.") {
				u.ap_eot += 2
				return true
			}
			// Pilot Attack
			if (t === "This Unit gets AP+1 during this turn. If there are 7 or more (CB) cards in your trash, all your (CB) Units get AP+1 instead.") {
				if (p.trash.filter(c => c.traits.includes("CB")).length >= 7) {
					log("🎯AP+1 all my (CB) units")
					fu.filter(c => c.traits.includes("CB")).forEach(c => c.ap_eot += 1)
				} else {
					log("🎯AP+1 " + u)
					u.ap_eot += 1
				}
				return true
			}
			if (t === "During this turn, this Unit gets AP+1 and, if it is a Link Unit, it gains <High-Maneuver>.") {
				u.ap_eot += 1
